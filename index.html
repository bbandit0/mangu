<html lang="es" style="--bg1: #0d0d0f; --bg2: #16161a; --bg3: #1c1c22; --bg4: #24242c; --bgi: #1a1a20; --t1: #e8e6e3; --t2: #8a8a96; --t3: #55555f; --bd: #2a2a32; --bdl: #33333d; --am: #e74c6f; --amd: rgba(231,76,111,.13); --aa: #4ca6e7; --aad: rgba(76,166,231,.13);"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Manga &amp; Anime Tracker</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root{
  --bg1:#0d0d0f;--bg2:#16161a;--bg3:#1c1c22;--bg4:#24242c;--bgi:#1a1a20;
  --am:#e74c6f;--amd:rgba(231,76,111,.13);
  --aa:#4ca6e7;--aad:rgba(76,166,231,.13);
  --t1:#e8e6e3;--t2:#8a8a96;--t3:#55555f;
  --bd:#2a2a32;--bdl:#33333d;
  --dng:#e74c4c;--suc:#22c55e;--wrn:#eab308;--inf:#06b6d4;--fav:#f59e0b;
  --r:6px;--rm:10px;
}

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg1);color:var(--t1);font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}
.app{max-width:720px;margin:0 auto;padding:24px 16px 100px;min-height:100vh}

/* ─── Header ─── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--bd)}
.logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t2);display:flex;align-items:center;gap:10px}
.logo b{background:linear-gradient(135deg,var(--am),var(--aa));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:15px}
.hdr-r{display:flex;gap:4px}
.ib{width:34px;height:34px;border:none;background:transparent;color:var(--t3);cursor:pointer;border-radius:var(--r);display:flex;align-items:center;justify-content:center;transition:.15s}
.ib:hover{background:var(--bg4);color:var(--t2)}.ib.on{background:var(--bg4);color:var(--t1)}.ib.dng:hover{background:rgba(231,76,76,.09);color:var(--dng)}

/* ─── Settings ─── */
.sett{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:16px;margin-bottom:20px;display:none;animation:slideDown .2s}
.sett.open{display:block}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.sett-top{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:14px}
.sett-sec{margin-bottom:16px}.sett-sec:last-child{margin-bottom:0}
.sett-lbl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.clr-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.csw{width:28px;height:28px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:.15s;flex-shrink:0}
.csw:hover{transform:scale(1.1)}.csw.sel{border-color:var(--t1);box-shadow:0 0 0 2px var(--bg1),0 0 0 4px var(--t2)}
.cpick{position:relative;width:28px;height:28px;flex-shrink:0}
.cpick input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.cpick-v{width:28px;height:28px;border-radius:6px;border:2px dashed var(--bdl);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:14px;pointer-events:none;background:var(--bg2)}
.bgr{display:flex;gap:6px;flex-wrap:wrap}
.bgb{padding:7px 14px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-radius:var(--r);transition:.15s}
.bgb:hover{background:var(--bg4);color:var(--t1)}.bgb.on{border-color:var(--am);color:var(--am);background:var(--amd)}
.rst{padding:6px 12px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-family:'Outfit',sans-serif;font-size:11px;cursor:pointer;border-radius:var(--r)}.rst:hover{color:var(--dng);border-color:var(--dng)}

/* ─── Tabs ─── */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border-radius:var(--rm);padding:4px;border:1px solid var(--bd)}
.tab{flex:1;padding:10px 16px;border:none;background:transparent;color:var(--t2);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border-radius:var(--r);display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.tab:hover{color:var(--t1)}.tab.am{background:var(--amd);color:var(--am);border:1px solid var(--am)}.tab.aa{background:var(--aad);color:var(--aa);border:1px solid var(--aa)}
.tab-c{font-family:'Space Mono',monospace;font-size:11px;opacity:.7}

/* ─── Toolbar ─── */
.tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.tb-l{display:flex;align-items:center;gap:6px;flex:1;min-width:140px}
.tb-r{display:flex;align-items:center;gap:6px}
.srt{padding:6px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);color:var(--t2);font-family:'Outfit',sans-serif;font-size:12px;outline:none;cursor:pointer}
.sb{position:relative;flex:1;min-width:120px}
.sb svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3)}
.sb input{width:100%;padding:8px 12px 8px 36px;background:var(--bgi);border:1px solid var(--bd);border-radius:var(--r);color:var(--t1);font-family:'Outfit',sans-serif;font-size:13px;outline:none}
.sb input::placeholder{color:var(--t3)}

/* ─── Filter chips ─── */
.fbar{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fchip{padding:5px 12px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;cursor:pointer;border-radius:20px;transition:.15s;white-space:nowrap}
.fchip:hover{background:var(--bg4);color:var(--t1)}
.fchip.on{border-color:var(--am);color:var(--am);background:var(--amd)}
.fchip.anime.on{border-color:var(--aa);color:var(--aa);background:var(--aad)}
.fsep{width:1px;height:20px;background:var(--bd);margin:0 2px}

/* ─── Stats ─── */
.sr{display:flex;gap:8px;margin-bottom:20px}
.stc{flex:1;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:12px 14px;text-align:center}
.stv{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}
.stl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* ─── Add form ─── */
.add{margin-bottom:20px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:14px}
.add-m{display:flex;gap:8px}
.add-m input,.add-m select{flex:1;padding:10px 14px;background:var(--bgi);border:1px solid var(--bd);border-radius:var(--r);color:var(--t1);font-family:'Outfit',sans-serif;font-size:14px;outline:none}
.add-m input::placeholder{color:var(--t3)}
.add-m input.sm{width:80px;flex:none;text-align:center}
.add-m select{color:var(--t2);cursor:pointer}
.add-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.add-c{display:flex;align-items:center;gap:8px;margin-top:10px}
.bup{padding:8px 14px;border:1px dashed var(--bdl);background:var(--bg2);color:var(--t2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-radius:var(--r);display:flex;align-items:center;gap:6px;white-space:nowrap}
.bup:hover{background:var(--bg4);color:var(--t1);border-color:var(--t3)}
.cvmn{width:34px;height:48px;border-radius:var(--r);object-fit:cover;border:1px solid var(--bd);flex-shrink:0}
.bcx{padding:4px 8px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-size:11px;border-radius:var(--r)}.bcx:hover{color:var(--dng)}
.badd{padding:10px 16px;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap;color:#fff}
.badd:hover{filter:brightness(1.1)}

/* ─── Tags ─── */
.tag-row{display:flex;gap:4px;flex-wrap:wrap}
.tag{padding:3px 10px;border-radius:14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);cursor:pointer;transition:all .2s ease;user-select:none}
.tag:hover{border-color:var(--bdl);color:var(--t1)}
.tag:active{transform:scale(.94)}
.tag.on{border-color:var(--am);color:var(--am);background:var(--amd)}
.tag.anime.on{border-color:var(--aa);color:var(--aa);background:var(--aad)}

/* ─── Status badge ─── */
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sbadge.reading{background:rgba(76,166,231,.15);color:#4ca6e7}
.sbadge.completed{background:rgba(34,197,94,.15);color:#22c55e}
.sbadge.paused{background:rgba(234,179,8,.15);color:#eab308}
.sbadge.dropped{background:rgba(231,76,76,.15);color:#e74c4c}
.sbadge.plan{background:rgba(139,92,246,.15);color:#8b5cf6}

/* ─── Score ─── */
.score-row{display:flex;align-items:center;gap:4px}
.score-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s ease;color:var(--t3);background:var(--bg2)}
.score-dot:hover{border-color:var(--bdl);color:var(--t1);transform:scale(1.1)}
.score-dot:active{transform:scale(.9)}
.score-dot.on{color:#fff;border-color:transparent}
.score-val{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;margin-left:8px}

/* ─── Series list ─── */
.slist{display:flex;flex-direction:column;gap:8px}
.scard{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);overflow:hidden;transition:.2s}
.scard:hover{border-color:var(--bdl)}
.shdr{display:flex;align-items:center;padding:12px 16px;cursor:pointer;gap:12px;user-select:none}
.cthm{width:48px;height:68px;border-radius:var(--r);object-fit:cover;flex-shrink:0;border:1px solid var(--bd);background:var(--bg2)}
.cph{width:48px;height:68px;border-radius:var(--r);flex-shrink:0;border:1px solid var(--bd);background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:20px}
.sinf{flex:1;min-width:0}
.stit{font-size:15px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.fav-star{color:var(--fav);font-size:14px;flex-shrink:0}
.smeta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.sprg{font-family:'Space Mono',monospace;font-size:12px;color:var(--t2)}
.slast{font-size:10px;color:var(--t3)}
.sscore{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--bg4)}
.pbar{width:100px;height:4px;background:var(--bg1);border-radius:2px;overflow:hidden;margin-top:6px}
.pfill{height:100%;border-radius:2px;transition:width .3s}
.sact{display:flex;align-items:center;gap:2px;flex-shrink:0}

/* Quick +1 btn */
.qnext{width:30px;height:30px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);cursor:pointer;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;transition:all .15s;font-family:'Space Mono',monospace}
.qnext:hover{background:var(--bg4);color:var(--t1);border-color:var(--bdl)}
.qnext:active{transform:scale(.88)}

/* ─── Expanded panel ─── */
.cpnl{padding:0 16px 14px;border-top:1px solid var(--bd)}
.dsec{padding:12px 0;border-bottom:1px solid var(--bd)}
.dsec:last-child{border-bottom:none}
.dsec-lbl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.dsec-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cved{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bd)}
.cvei{width:60px;height:84px;border-radius:var(--r);object-fit:cover;border:1px solid var(--bd);background:var(--bg2);flex-shrink:0}
.cvee{width:60px;height:84px;border-radius:var(--r);border:1px dashed var(--bdl);background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--t3)}
.cvec{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.cvec .lbl{font-size:12px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.cveb{display:flex;gap:4px;flex-wrap:wrap}

/* Notes */
.notes-area{width:100%;padding:10px 12px;background:var(--bgi);border:1px solid var(--bd);border-radius:var(--r);color:var(--t1);font-family:'Outfit',sans-serif;font-size:13px;outline:none;resize:vertical;min-height:60px;line-height:1.5}
.notes-area::placeholder{color:var(--t3)}

/* Date inputs */
.dinput{padding:6px 10px;background:var(--bgi);border:1px solid var(--bd);border-radius:var(--r);color:var(--t2);font-family:'Outfit',sans-serif;font-size:12px;outline:none;cursor:pointer}

/* Selects in detail */
.status-sel{padding:6px 10px;background:var(--bgi);border:1px solid var(--bd);border-radius:var(--r);color:var(--t2);font-family:'Outfit',sans-serif;font-size:12px;outline:none;cursor:pointer}

/* Chapter controls */
.cctl{display:flex;align-items:center;justify-content:space-between;padding:10px 0;gap:8px;flex-wrap:wrap}
.cclbl{font-size:12px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.bs{padding:5px 10px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;cursor:pointer;border-radius:var(--r);transition:.15s;display:inline-flex;align-items:center;gap:4px}.bs:hover{background:var(--bg4);color:var(--t1)}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:4px}
.cell{aspect-ratio:1;border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s ease;color:var(--t3);background:var(--bg2);user-select:none}
.cell:hover{border-color:var(--bdl);background:var(--bg4)}
.cell.rd{color:#fff;font-weight:700}
.cell:active{transform:scale(.92)}
.erow{display:flex;align-items:center;gap:8px;padding:8px 0 4px}
.erow input{width:70px;padding:5px 8px;background:var(--bgi);border:1px solid var(--bd);border-radius:var(--r);color:var(--t1);font-family:'Space Mono',monospace;font-size:12px;text-align:center;outline:none}
.erow label{font-size:12px;color:var(--t2)}

/* Season label */
.season-lbl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-top:12px;margin-bottom:6px;padding:6px 0;border-top:1px dashed var(--bd);display:flex;justify-content:space-between;align-items:center}
.season-lbl:first-of-type{margin-top:4px;border-top:none}
.season-inp{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.season-inp input{width:60px;padding:5px 8px;background:var(--bgi);border:1px solid var(--bd);border-radius:var(--r);color:var(--t1);font-family:'Space Mono',monospace;font-size:12px;text-align:center;outline:none}
.season-inp label{font-size:11px;color:var(--t3)}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty .icn{font-size:40px;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px;line-height:1.6}

/* ─── Catalog ─── */
.catalog{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.catc{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);overflow:hidden;cursor:pointer;transition:.2s;display:flex;flex-direction:column;position:relative}
.catc:hover{border-color:var(--bdl);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.catcv{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--bg2);display:block}
.catph{width:100%;aspect-ratio:2/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:36px}
.cati{padding:10px 12px}
.catt{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.catp{font-family:'Space Mono',monospace;font-size:11px;color:var(--t2);margin-top:3px}
.catb{width:100%;height:3px;background:var(--bg1);border-radius:2px;overflow:hidden;margin-top:6px}
.catf{height:100%;border-radius:2px}
.cat-fav{position:absolute;top:6px;right:6px;font-size:14px}
.cat-score{position:absolute;top:6px;left:6px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(0,0,0,.7);color:var(--t1)}

/* ─── Activity Calendar ─── */
.acal{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:16px;margin-bottom:20px}
.acal-t{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.acal-t span{font-family:'Space Mono',monospace;font-size:11px;color:var(--t2);font-weight:400}
.acal-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:3px}
.acal-cell{aspect-ratio:1;border-radius:2px;background:var(--bg2);border:1px solid var(--bd);position:relative}
.acal-cell.l1{background:rgba(var(--acrgb),.25);border-color:rgba(var(--acrgb),.3)}
.acal-cell.l2{background:rgba(var(--acrgb),.45);border-color:rgba(var(--acrgb),.5)}
.acal-cell.l3{background:rgba(var(--acrgb),.65);border-color:rgba(var(--acrgb),.7)}
.acal-cell.l4{background:rgba(var(--acrgb),.85);border-color:rgba(var(--acrgb),.9)}
.acal-legend{display:flex;align-items:center;gap:4px;margin-top:8px;justify-content:flex-end}
.acal-legend span{font-size:10px;color:var(--t3)}
.acal-lc{width:12px;height:12px;border-radius:2px;border:1px solid var(--bd)}

/* ─── Dashboard ─── */
.dash{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:20px;margin-bottom:20px}
.dash-t{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:16px}
.dash-g{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:500px){.dash-g{grid-template-columns:1fr}}
.dash-c{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px}
.dash-cl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;text-align:center}
.dash-full{grid-column:1/-1}
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}.bar-item:last-child{margin-bottom:0}
.bar-name{font-size:11px;color:var(--t2);width:100px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:18px;background:var(--bg1);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s;min-width:1px}
.bar-val{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);width:50px;flex-shrink:0}
.donut-wrap{display:flex;justify-content:center;padding:10px 0}
.donut-legend{display:flex;gap:16px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.donut-leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2)}

function migrate(s){return{
  id:s.id, title:s.title, total:s.total||1, completed:s.completed||[], cover:s.cover||"",

function initData(){
  let raw=loadJ(SKEY);

  if(raw){
    ["manga","anime"].forEach(t=>{if(!raw[t])raw[t]=[];raw[t]=raw[t].map(migrate);});

  }else{data={manga:[],anime:[]};}

}

function loadJ(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}}
function save(){localStorage.setItem(SKEY,JSON.stringify(data));localStorage.setItem(TKEY,JSON.stringify(theme));}
function hx(c){return`${parseInt(c.slice(1,3),16)},${parseInt(c.slice(3,5),16)},${parseInt(c.slice(5,7),16)}`;}

  }).forEach(([k,v])=>s.setProperty(`--${k}`,v));

function resizeImg(file,cb){
  const r=new FileReader();r.onload=e=>{const i=new Image();i.onload=()=>{
    let w=i.width,h=i.height;if(w>200||h>280){const s=Math.min(200/w,280/h);w=Math.round(w*s);h=Math.round(h*s);}
    const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(i,0,0,w,h);cb(c.toDataURL("image/jpeg",.85));
  };i.src=e.target.result;};r.readAsDataURL(file);
}

function timeAgo(ts){
  const d=Date.now()-ts;
  if(d<60000)return"ahora";if(d<3600000)return Math.floor(d/60000)+"m";
  if(d<86400000)return Math.floor(d/3600000)+"h";if(d<2592000000)return Math.floor(d/86400000)+"d";
  return new Date(ts).toLocaleDateString("es-CL",{day:"numeric",month:"short"});
}

function scoreColor(s){
  if(s>=9)return"#22c55e";if(s>=7)return"#4ca6e7";if(s>=5)return"#eab308";if(s>=3)return"#f97316";return"#e74c4c";
}

function logActivity(series,count){
  if(!series.activity)series.activity={};
  const d=today();series.activity[d]=(series.activity[d]||0)+count;
}

function nextChapter(s){
  for(let i=1;i<=s.total;i++){if(!s.completed.includes(i))return i;}
  return null;
}

function sortList(arr){
  const a=[...arr];
  switch(sortKey){
    case"name-asc":return a.sort((x,y)=>x.title.localeCompare(y.title));
    case"name-desc":return a.sort((x,y)=>y.title.localeCompare(x.title));
    case"progress-desc":return a.sort((x,y)=>(y.total>0?y.completed.length/y.total:0)-(x.total>0?x.completed.length/x.total:0));
    case"progress-asc":return a.sort((x,y)=>(x.total>0?x.completed.length/x.total:0)-(y.total>0?y.completed.length/y.total:0));
    case"total-desc":return a.sort((x,y)=>y.total-x.total);
    case"updated":return a.sort((x,y)=>(y.lastUpdated||0)-(x.lastUpdated||0));
    case"score":return a.sort((x,y)=>(y.score||0)-(x.score||0));
    default:return a.sort((x,y)=>+y.id - +x.id);
  }
}

function filterList(arr){
  return arr.filter(s=>{
    if(search&&!s.title.toLowerCase().includes(search.toLowerCase()))return false;
    if(filterStatus!=="all"&&s.status!==filterStatus)return false;
    if(filterTag!=="all"&&(!s.tags||!s.tags.includes(filterTag)))return false;
    if(showFavsOnly&&!s.favorite)return false;
    return true;
  });
}

function h(tag,cls,html,attrs){
  const el=document.createElement(tag);if(cls)el.className=cls;
  if(html!=null)el.innerHTML=String(html);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k.startsWith("on"))el[k]=v;else el.setAttribute(k,v);});
  return el;
}

// ═══════════════════════════════════════════
// ACTIVITY CALENDAR
// ═══════════════════════════════════════════
function renderActivityCal(root,ac){
  const acrgb=hx(ac);
  const cal=h("div","acal");
  // Aggregate all activity from all series in both tabs
  const allAct={};
  [...data.manga,...data.anime].forEach(s=>{
    if(!s.activity)return;
    Object.entries(s.activity).forEach(([d,c])=>{allAct[d]=(allAct[d]||0)+c;});
  });
  const totalAct=Object.values(allAct).reduce((a,b)=>a+b,0);
  cal.innerHTML=`<div class="acal-t">Actividad <span>${totalAct} total</span></div>`;
  const grid=h("div","acal-grid");
  grid.style.setProperty("--acrgb",acrgb);
  const now=new Date();
  const days=91; // ~13 weeks
  const maxV=Math.max(...Object.values(allAct),1);
  for(let i=days-1;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const dk=d.toISOString().slice(0,10);
    const v=allAct[dk]||0;
    let lvl="";
    if(v>0){
      const pct=v/maxV;
      if(pct<=.25)lvl="l1";else if(pct<=.5)lvl="l2";else if(pct<=.75)lvl="l3";else lvl="l4";
    }
    const cell=h("div",`acal-cell ${lvl}`);
    cell.title=`${dk}: ${v} capítulos`;
    grid.appendChild(cell);
  }
  cal.appendChild(grid);
  // Legend
  const leg=h("div","acal-legend");
  leg.innerHTML=`<span>Menos</span>`;
  ["","l1","l2","l3","l4"].forEach(l=>{const c=h("div",`acal-lc ${l}`);c.style.setProperty("--acrgb",acrgb);leg.appendChild(c);});
  leg.innerHTML+=`<span>Más</span>`;
  cal.appendChild(leg);
  root.appendChild(cal);
}

      // Cover
      const ce=h("div","cved");
      ce.innerHTML=`${s.cover?`<img class="cvei" src="${s.cover}">`:`<div class="cvee">${svg.img}</div>`}`;
      const cec=h("div","cvec");cec.innerHTML=`<span class="lbl">Portada</span>`;
      const ceb=h("div","cveb");
      const efi=h("input","hidden",null,{type:"file",accept:"image/*",id:"ecf-"+s.id});
      efi.onchange=e=>{const f=e.target.files?.[0];if(!f)return;resizeImg(f,b=>{const x=data[tab].find(z=>z.id===s.id);if(x){x.cover=b;x.lastUpdated=Date.now();}save();render();});e.target.value="";};
      ceb.appendChild(efi);
      ceb.appendChild(h("button","bs",svg.up+(s.cover?" Cambiar":" Subir"),{onclick:()=>document.getElementById("ecf-"+s.id).click()}));
      if(s.cover)ceb.appendChild(h("button","bs",svg.trash+" Quitar",{onclick:()=>{const x=data[tab].find(z=>z.id===s.id);if(x){x.cover="";x.lastUpdated=Date.now();}save();render();}}));
      cec.appendChild(ceb);ce.appendChild(cec);cp.appendChild(ce);

      // Status + Favorite
      const dSt=h("div","dsec");dSt.innerHTML=`<div class="dsec-lbl">Estado</div>`;
      const dRow=h("div","dsec-row");
      const stSel2=h("select","status-sel");STATUSES.forEach(st=>{const o=h("option","",st.icon+" "+st.label,{value:st.key});if(st.key===s.status)o.selected=true;stSel2.appendChild(o);});
      stSel2.onchange=e=>{const x=data[tab].find(z=>z.id===s.id);if(x){x.status=e.target.value;x.lastUpdated=Date.now();}save();render();};
      dRow.appendChild(stSel2);
      const favBtn=h("button","bs",`${s.favorite?svg.star:svg.starO} ${s.favorite?"Quitar fav":"Favorito"}`);
      if(s.favorite)favBtn.style.color="var(--fav)";
      favBtn.onclick=()=>{const x=data[tab].find(z=>z.id===s.id);if(x){x.favorite=!x.favorite;x.lastUpdated=Date.now();}save();render();};
      dRow.appendChild(favBtn);dSt.appendChild(dRow);cp.appendChild(dSt);

      // Score
      const dSc=h("div","dsec");dSc.innerHTML=`<div class="dsec-lbl">Puntuación</div>`;
      const scRow=h("div","score-row");
      const dots=[];
      for(let i=1;i<=10;i++){
        const dot=h("div",`score-dot${s.score>=i?" on":""}`,String(i));
        if(s.score>=i)dot.style.background=scoreColor(i);
        dot.onclick=()=>{
          const x=data[tab].find(z=>z.id===s.id);if(!x)return;
          x.score=x.score===i?0:i;x.lastUpdated=Date.now();save();
          dots.forEach((d,idx)=>{
            if(idx<x.score){d.classList.add("on");d.style.background=scoreColor(idx+1);}
            else{d.classList.remove("on");d.style.background="";}
          });
          const sv=scRow.querySelector(".score-val");
          if(sv){if(x.score>0){sv.textContent=x.score+"/10";sv.style.color=scoreColor(x.score);sv.style.display="";}else sv.style.display="none";}
          const card=dot.closest(".scard");if(card){const ss=card.querySelector(".sscore");if(ss){if(x.score>0){ss.textContent=x.score;ss.style.color=scoreColor(x.score);}else ss.textContent="";}}
        };
        dots.push(dot);scRow.appendChild(dot);
      }
      const svSpan=h("span","score-val",s.score>0?s.score+"/10":"");
      if(s.score>0)svSpan.style.color=scoreColor(s.score);else svSpan.style.display="none";
      scRow.appendChild(svSpan);
      dSc.appendChild(scRow);cp.appendChild(dSc);

      // Tags
      const dTg=h("div","dsec");dTg.innerHTML=`<div class="dsec-lbl">Géneros</div>`;
      const tgR=h("div","tag-row");
      ALL_TAGS.forEach(t=>{const isOn=(s.tags||[]).includes(t);const btn=h("button",`tag${animeCls}${isOn?" on":""}`,t);btn.onclick=()=>{const x=data[tab].find(z=>z.id===s.id);if(!x)return;if(!x.tags)x.tags=[];if(x.tags.includes(t)){x.tags=x.tags.filter(g=>g!==t);btn.classList.remove("on");}else{x.tags.push(t);btn.classList.add("on");}x.lastUpdated=Date.now();save();};tgR.appendChild(btn);});
      dTg.appendChild(tgR);cp.appendChild(dTg);

      // Dates
      const dDt=h("div","dsec");dDt.innerHTML=`<div class="dsec-lbl">Fechas</div>`;
      const dtRow=h("div","dsec-row");
      dtRow.innerHTML=`<label style="font-size:11px;color:var(--t3)">Inicio:</label>`;
      const d1=h("input","dinput",null,{type:"date",value:s.startDate||""});
      d1.onchange=e=>{const x=data[tab].find(z=>z.id===s.id);if(x){x.startDate=e.target.value;x.lastUpdated=Date.now();}save();};
      dtRow.appendChild(d1);
      dtRow.innerHTML+=`<label style="font-size:11px;color:var(--t3)">Fin:</label>`;
      const d2=h("input","dinput",null,{type:"date",value:s.endDate||""});
      d2.onchange=e=>{const x=data[tab].find(z=>z.id===s.id);if(x){x.endDate=e.target.value;x.lastUpdated=Date.now();}save();};
      dtRow.appendChild(d2);dDt.appendChild(dtRow);cp.appendChild(dDt);

      // Notes
      const dNo=h("div","dsec");dNo.innerHTML=`<div class="dsec-lbl">Notas</div>`;
      const nta=h("textarea","notes-area",null,{placeholder:"Opiniones, notas, dónde vas...",rows:"3"});
      nta.value=s.notes||"";let nt;
      nta.oninput=e=>{clearTimeout(nt);nt=setTimeout(()=>{const x=data[tab].find(z=>z.id===s.id);if(x){x.notes=e.target.value;x.lastUpdated=Date.now();save();}},500);};
      dNo.appendChild(nta);cp.appendChild(dNo);

      // ─── Seasons (anime only) ───
      if(tab==="anime"){
        const dSe=h("div","dsec");dSe.innerHTML=`<div class="dsec-lbl">Temporadas</div>`;
        const seRow=h("div","dsec-row");
        seRow.appendChild(h("button","bs","+ Agregar temporada",{onclick:()=>{
          const x=data[tab].find(z=>z.id===s.id);if(!x)return;
          if(!x.seasons)x.seasons=[];
          const lastEnd=x.seasons.length>0?x.seasons[x.seasons.length-1].to:0;
          x.seasons.push({name:`T${x.seasons.length+1}`,from:lastEnd+1,to:Math.min(lastEnd+12,x.total)});
          x.lastUpdated=Date.now();save();render();
        }}));
        if(s.seasons&&s.seasons.length>0){
          seRow.appendChild(h("button","bs","Quitar todas",{onclick:()=>{const x=data[tab].find(z=>z.id===s.id);if(x){x.seasons=[];x.lastUpdated=Date.now();}save();render();}}));
        }
        dSe.appendChild(seRow);
        // Edit existing seasons
        if(s.seasons&&s.seasons.length>0){
          s.seasons.forEach((sn,idx)=>{
            const si=h("div","season-inp");
            si.innerHTML=`<label>Nombre:</label>`;
            const nm=h("input","",null,{type:"text",value:sn.name});nm.style.width="70px";
            nm.onchange=e=>{const x=data[tab].find(z=>z.id===s.id);if(x&&x.seasons[idx]){x.seasons[idx].name=e.target.value;x.lastUpdated=Date.now();save();}};
            si.appendChild(nm);si.innerHTML+=`<label>Ep:</label>`;
            const f=h("input","",null,{type:"number",value:String(sn.from),min:"1"});
            f.onchange=e=>{const x=data[tab].find(z=>z.id===s.id);if(x&&x.seasons[idx]){x.seasons[idx].from=parseInt(e.target.value)||1;x.lastUpdated=Date.now();save();render();}};
            si.appendChild(f);si.innerHTML+=`<label>a</label>`;
            const t2=h("input","",null,{type:"number",value:String(sn.to),min:"1"});
            t2.onchange=e=>{const x=data[tab].find(z=>z.id===s.id);if(x&&x.seasons[idx]){x.seasons[idx].to=parseInt(e.target.value)||1;x.lastUpdated=Date.now();save();render();}};
            si.appendChild(t2);
            const rb=h("button","bs",svg.trash);rb.onclick=()=>{const x=data[tab].find(z=>z.id===s.id);if(x){x.seasons.splice(idx,1);x.lastUpdated=Date.now();}save();render();};
            si.appendChild(rb);dSe.appendChild(si);
          });
        }
        cp.appendChild(dSe);
      }

      // ─── Chapter controls ───
      const ctl=h("div","cctl");
      ctl.appendChild(h("span","cclbl",tab==="manga"?"Capítulos":"Episodios"));
      const cbtns=h("div","");cbtns.style.cssText="display:flex;gap:4px;flex-wrap:wrap";
      cbtns.appendChild(h("button","bs",svg.edit+" Total",{onclick:()=>{editTotal=editTotal===s.id?null:s.id;editTotalVal=String(s.total);render();}}));
      cbtns.appendChild(h("button","bs","✓ Todos",{onclick:()=>{const x=data[tab].find(z=>z.id===s.id);if(x){x.completed=Array.from({length:x.total},(_,i)=>i+1);x.status="completed";x.lastUpdated=Date.now();logActivity(x,x.total-s.completed.length);}save();render();}}));
      cbtns.appendChild(h("button","bs","Limpiar",{onclick:()=>{const x=data[tab].find(z=>z.id===s.id);if(x){x.completed=[];x.lastUpdated=Date.now();}save();render();}}));
      ctl.appendChild(cbtns);cp.appendChild(ctl);
      // Edit total
      if(editTotal===s.id){
        const er=h("div","erow");er.appendChild(h("label","",`Total ${lbl}:`));
        const einp=h("input","",null,{type:"number",min:"1",value:editTotalVal});
        einp.oninput=e=>{editTotalVal=e.target.value;};einp.onkeydown=e=>{if(e.key==="Enter")doUpdTotal(s.id);};
        er.appendChild(einp);er.appendChild(h("button","bs","Guardar",{onclick:()=>doUpdTotal(s.id)}));cp.appendChild(er);
      }
      // ─── Chapter grid (with seasons) ───
      const seasons=(tab==="anime"&&s.seasons&&s.seasons.length>0)?s.seasons:null;
      if(seasons){
        seasons.forEach(sn=>{
          cp.appendChild(h("div","season-lbl",`${sn.name} <span style="font-weight:400;color:var(--t3)">(${sn.from}-${sn.to})</span>`));
          const cg=h("div","cgrid");
          for(let n=sn.from;n<=Math.min(sn.to,s.total);n++){
            const isR=s.completed.includes(n);const cl=h("div",`cell${isR?" rd":""}`,String(n));
            if(isR){cl.style.background=ac;cl.style.borderColor=ac;}
            cl.onclick=()=>{markChapter(s.id,n,cl,ac);};cg.appendChild(cl);
          }
          cp.appendChild(cg);
        });
        const covered=new Set();seasons.forEach(sn=>{for(let i=sn.from;i<=sn.to;i++)covered.add(i);});
        const uncovered=[];for(let i=1;i<=s.total;i++){if(!covered.has(i))uncovered.push(i);}
        if(uncovered.length>0){
          cp.appendChild(h("div","season-lbl","Sin temporada"));
          const cg=h("div","cgrid");
          uncovered.forEach(n=>{const isR=s.completed.includes(n);const cl=h("div",`cell${isR?" rd":""}`,String(n));if(isR){cl.style.background=ac;cl.style.borderColor=ac;}cl.onclick=()=>{markChapter(s.id,n,cl,ac);};cg.appendChild(cl);});
          cp.appendChild(cg);
        }
      }else{
        const cg=h("div","cgrid");
        for(let n=1;n<=s.total;n++){
          const isR=s.completed.includes(n);const cl=h("div",`cell${isR?" rd":""}`,String(n));
          if(isR){cl.style.background=ac;cl.style.borderColor=ac;}
          cl.onclick=()=>{markChapter(s.id,n,cl,ac);};cg.appendChild(cl);
        }
        cp.appendChild(cg);
      }
      sc.appendChild(cp);
    }
    sl.appendChild(sc);
  });
  root.appendChild(sl);
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function markChapter(sid,n,cellEl,ac){
  const x=data[tab].find(z=>z.id===sid);if(!x)return;
  const wasRead=x.completed.includes(n);
  if(wasRead){x.completed=x.completed.filter(c=>c!==n);}
  else{x.completed.push(n);x.completed.sort((a,b)=>a-b);logActivity(x,1);}
  x.lastUpdated=Date.now();
  if(x.completed.length===x.total&&x.total>0)x.status="completed";
  else if(x.completed.length>0&&x.status==="plan")x.status="reading";
  save();
  // Direct DOM update — no full re-render
  if(cellEl){
    if(wasRead){cellEl.classList.remove("rd");cellEl.style.background="";cellEl.style.borderColor="";}
    else{cellEl.classList.add("rd");cellEl.style.background=ac;cellEl.style.borderColor=ac;}
  }
  const card=cellEl?.closest(".scard");
  if(card){
    const prg=card.querySelector(".sprg");if(prg)prg.textContent=`${x.completed.length}/${x.total}`;
    const pfill=card.querySelector(".pfill");if(pfill)pfill.style.width=`${x.total>0?(x.completed.length/x.total)*100:0}%`;
    const badge=card.querySelector(".sbadge");if(badge&&x.status==="completed"){badge.className="sbadge completed";badge.textContent="✅";}
  }
}

function doAdd(){
  const ti=document.getElementById("add-title");
  const t=ti?.value.trim();if(!t)return;
  const ni=document.getElementById("add-total");
  const now=Date.now();
  data[tab].push(migrate({
    id:now.toString(),title:t,total:Math.max(parseInt(ni?.value)||0,1),
    completed:[],cover:newCover||"",status:newStatus||"reading",
    tags:[...newTags],notes:"",score:0,favorite:false,
    lastUpdated:now,createdAt:now,startDate:"",endDate:"",seasons:[],activity:{}
  }));
  newCover="";newTags=[];newStatus="reading";save();render();showToast(`"${t}" agregado`);
}

function doUpdTotal(sid){
  const v=parseInt(editTotalVal);if(!v||v<1)return;
  const x=data[tab].find(z=>z.id===sid);
  if(x){x.total=v;x.completed=x.completed.filter(c=>c<=v);x.lastUpdated=Date.now();}
  editTotal=null;save();render();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
applyTheme();
render();
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
