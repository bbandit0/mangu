.onb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}.onb-box{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:28px 24px;max-width:380px;width:100%;text-align:center;animation:slideDown .25s}.onb-steps{display:flex;justify-content:center;gap:8px;margin-bottom:20px}.onb-dot{width:8px;height:8px;border-radius:50%;background:var(--bd);transition:.2s}.onb-dot.active{background:var(--am);transform:scale(1.25)}.onb-dot.done{background:var(--aad);border:1px solid var(--am)}.onb-icon{font-size:36px;margin-bottom:12px}.onb-title{font-size:17px;font-weight:700;color:var(--t1);margin-bottom:8px}.onb-desc{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:22px}.onb-btns{display:flex;gap:8px;justify-content:center}.onb-btn-skip{padding:9px 18px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;cursor:pointer;border-radius:var(--r);transition:.15s}.onb-btn-skip:hover{color:var(--t2);border-color:var(--bdl)}.onb-btn-next{padding:9px 22px;border:none;border-radius:var(--r);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#fff;transition:.15s}.onb-btn-next:hover{filter:brightness(1.12);transform:scale(1.02)}
/* ── CHAR COLLAPSIBLE ── */
.char-details{margin-top:6px}.char-details summary{font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;padding:6px 8px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);list-style:none;display:flex;align-items:center;gap:6px;user-select:none}.char-details summary::-webkit-details-marker{display:none}.char-details summary::before{content:"▶";font-size:9px;color:var(--t3);transition:.15s}.char-details[open] summary::before{content:"▼"}
/* ── COVER COLLAPSIBLE ── */
.cover-toggle{cursor:pointer;font-size:11px;font-weight:600;color:var(--t2);background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:5px 10px;display:inline-flex;align-items:center;gap:5px;transition:.15s}.cover-toggle:hover{color:var(--t1);background:var(--bg4)}.cover-collapsed{display:none}
/* ── CATALOG ── */
.catalog{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}.catc{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:16px;overflow:hidden;cursor:pointer;transition:.22s;display:flex;flex-direction:column;position:relative}.catc:hover{border-color:rgba(255,255,255,.13);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.5)}.catcv{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--bg2);display:block}.catph{width:100%;aspect-ratio:2/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:36px}.cati{padding:10px 12px}.catt{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.catp{font-family:'Space Mono',monospace;font-size:11px;color:var(--t2);margin-top:3px}.catb{width:100%;height:3px;background:var(--bg1);border-radius:2px;overflow:hidden;margin-top:6px}.catf{height:100%;border-radius:2px}.cat-fav{position:absolute;top:6px;right:6px;font-size:14px}.cat-score{position:absolute;top:6px;left:6px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(0,0,0,.7);color:var(--t1)}
.cat-pct{position:absolute;bottom:6px;right:5px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(0,0,0,.78);color:#fff;pointer-events:none}
.cat-status-ov{position:absolute;top:6px;right:6px;font-size:11px;padding:2px 5px;border-radius:4px;background:rgba(0,0,0,.78);pointer-events:none}
/* ── CUSTOM TAGS ── */
.tag-add-btn{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border:1px dashed var(--bdl);background:transparent;color:var(--t3);cursor:pointer;transition:all .2s ease}.tag-add-btn:hover{border-color:var(--am);color:var(--am);background:rgba(34,197,94,.07)}.tag-custom{position:relative}.tag-custom .tag-del-x{position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;background:var(--dng);color:#fff;font-size:9px;font-weight:700;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}.tag-custom:hover .tag-del-x{display:flex}
/* ── DASHBOARD ── */
.dash{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:var(--rm);padding:20px;margin-bottom:20px}.dash-t{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:16px;display:flex;align-items:center;gap:8px}.dash-g{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:500px){.dash-g{grid-template-columns:1fr}}.dash-c{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px}.dash-cl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}.dash-full{grid-column:1/-1}.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}.bar-item:last-child{margin-bottom:0}.bar-name{font-size:11px;color:var(--t2);width:100px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar-track{flex:1;height:18px;background:var(--bg1);border-radius:3px;overflow:hidden}.bar-fill{height:100%;border-radius:3px;transition:width .3s;min-width:1px}.bar-val{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);width:50px;flex-shrink:0}.donut-wrap{display:flex;justify-content:center;padding:10px 0}.donut-legend{display:flex;gap:16px;justify-content:center;margin-top:12px;flex-wrap:wrap}.donut-leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2)}.donut-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* ── NEW: Score histogram ── */
.hist-wrap{display:flex;align-items:flex-end;gap:3px;height:60px;margin-bottom:8px;padding:0 2px}
.hist-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.hist-bar{width:100%;border-radius:2px 2px 0 0;min-height:3px;transition:all .3s}
.hist-num{font-family:'Space Mono',monospace;font-size:8px;color:var(--t3);line-height:1}
/* ── NEW: Genre bars ── */
.gbar{display:flex;align-items:center;gap:8px;margin-bottom:7px}.gbar:last-child{margin-bottom:0}
.gbar-nm{font-size:11px;color:var(--t2);width:90px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gbar-tr{flex:1;height:14px;background:var(--bg1);border-radius:2px;overflow:hidden}
.gbar-fl{height:100%;border-radius:2px;transition:width .3s}
.gbar-vl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);width:20px;text-align:right;flex-shrink:0}
/* ── NEW: Best rated ── */
.ri{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--bd)}.ri:last-child{border-bottom:none}
.ri-n{font-family:'Space Mono',monospace;font-size:10px;color:var(--t3);width:16px;text-align:center;flex-shrink:0}
.ri-t{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.ri-s{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff;flex-shrink:0}
.ri-type{font-size:10px;color:var(--t3);flex-shrink:0}
/* ── NEW: Velocity / mini stat ── */
.mini-stat{text-align:center;padding:8px 0}
.mini-stat-v{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.mini-stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.dual-stat{display:flex;gap:8px;margin-top:12px}
.dual-cell{flex:1;text-align:center;padding:10px 8px;background:var(--bg3);border-radius:var(--r)}
.dual-cell-v{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;line-height:1;margin-bottom:3px}
.dual-cell-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
/* ── MODAL / TOAST ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}@keyframes fadeIn{from{opacity:0}to{opacity:1}}.modal{background:rgba(20,20,40,.95);border:1px solid rgba(255,255,255,.1);border-radius:var(--rm);padding:24px;max-width:360px;width:100%;text-align:center;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}.modal-icon{font-size:32px;margin-bottom:12px;opacity:.6}.modal-title{font-size:16px;font-weight:600;margin-bottom:6px}.modal-desc{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.5}.modal-btns{display:flex;gap:8px;justify-content:center}.mbtn{padding:10px 20px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:var(--r);transition:.15s}.mbtn:hover{background:var(--bg4);color:var(--t1)}.mbtn.dng{background:rgba(231,76,76,.15);color:var(--dng);border-color:rgba(231,76,76,.3)}.mbtn.dng:hover{background:rgba(231,76,76,.25)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--bd);border-radius:var(--rm);padding:10px 20px;font-size:13px;color:var(--t1);z-index:1001;animation:toastIn .3s;box-shadow:0 8px 32px rgba(0,0,0,.4)}@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}.hidden{display:none}
/* ── JIKAN AUTOCOMPLETE ── */
.jikan-wrap{position:relative;flex:1}
.jikan-drop{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--bdl);border-radius:var(--rm);z-index:200;max-height:280px;overflow-y:auto;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,.4);-webkit-overflow-scrolling:touch}
.jikan-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--bd);transition:.12s}

.jikan-item:hover{background:var(--bg4)}
.jikan-thumb{width:36px;height:52px;object-fit:cover;border-radius:4px;border:1px solid var(--bd);flex-shrink:0;background:var(--bg2)}
.jikan-info{flex:1;min-width:0}
.jikan-title{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jikan-meta{font-size:10px;color:var(--t3);margin-top:2px}
.jikan-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px;background:rgba(34,197,94,.15);color:#22c55e}
.jikan-badge.fin{background:rgba(138,138,150,.15);color:#8a8a96}
/* ── FONT SIZE ── */
:root{--fsz:14px}
.add-m .jikan-wrap input{flex:1;padding:14px 16px 14px 42px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.09);border-radius:14px;color:var(--t1);font-family:'Outfit',sans-serif;font-size:15px;outline:none;transition:.2s;width:100%}
.add-m .jikan-wrap input:focus{border-color:rgba(34,197,94,.5);box-shadow:0 0 0 3px rgba(34,197,94,.12),0 0 20px rgba(34,197,94,.06);background:rgba(255,255,255,.07)}

/* ── SCROLL TO TOP BUTTON ── */
.btn-top{position:fixed;bottom:20px;right:16px;width:44px;height:44px;border-radius:50%;border:1px solid rgba(99,179,237,.25);background:linear-gradient(135deg,#1a6fa8,var(--am));color:#fff;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(99,179,237,.32);z-index:999;opacity:0;pointer-events:none;transition:opacity .25s}
.btn-top.vis{opacity:1;pointer-events:auto}

/* ── FIX P2.8: MOBILE LAYOUT ── */
@media(max-width:540px){
  /* Tabs: scroll horizontal en lugar de apilarse */
  .tabs{display:flex;overflow-x:auto;gap:4px;padding:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;border-radius:12px;flex-wrap:nowrap}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:10px 12px;font-size:12px;border-radius:10px;gap:5px;min-width:fit-content}
  .tab-c{font-size:9px;padding:2px 5px}
  /* Stat cards: 2x2 en lugar de 4x1 */
  .sr{grid-template-columns:repeat(2,1fr);gap:8px}
  .stc{padding:14px 8px 12px}
  .stv{font-size:22px}
  /* Toolbar: apilar búsqueda arriba, sort abajo */
  .tb{flex-direction:column;gap:6px}
  .tb-l{width:100%}
  .tb-r{width:100%;justify-content:flex-end}
  /* Filtros: scroll horizontal */
  .fbar{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .fbar::-webkit-scrollbar{display:none}
  .fchip{flex-shrink:0}
  /* Cards: padding más compacto */
  .shdr{padding:10px 10px 10px 14px;gap:10px}
  .cthm,.cph{width:44px;height:62px}
  /* Add form: fila 2 apilada */
  .add-row2{flex-wrap:wrap}
  .add-cap-input{min-width:80px}
  /* Score dots: más pequeños */
  .score-dot{width:22px;height:22px;font-size:9px}
  /* Sync bar: más compacta */
  .sync-bar{padding:7px 10px;gap:5px;font-size:11px}
  /* Header buttons más pequeños */
  .hdr-r{gap:3px;padding:5px 6px}
  .ib{width:32px;height:32px}
  /* Continue row cards */
  .cc-card{width:100px}
  .cc-cover,.cc-cover-ph{height:128px}
  /* Catálogo: 2 columnas más pequeñas */
  .catalog{grid-template-columns:repeat(2,1fr);gap:8px}
  /* Perfil: stats compactos */
  .pubprof-stats{gap:10px}
  .pp-sc-v{font-size:20px}
}

   PARCHE 2.8 — CSS
   • Streak banner
   • Continuar leyendo (Netflix row)
   • Onboarding examples
   • Animación +1 (dopamina)
   • Panel Recomendaciones
   • Perfil público mejorado
   • Modo lectura rápida
══════════════════════════════════════════════════════ */

/* ── STREAK BANNER ── */
.streak-banner{margin:12px 0 0;padding:9px 14px;background:linear-gradient(135deg,rgba(251,191,36,.13),rgba(251,191,36,.06));border:1px solid rgba(251,191,36,.28);border-radius:14px;display:flex;align-items:center;gap:10px;animation:streakPop .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes streakPop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.streak-fire{font-size:20px;animation:flamePulse .8s ease-in-out infinite alternate}
@keyframes flamePulse{from{transform:scale(1) rotate(-3deg)}to{transform:scale(1.12) rotate(3deg)}}
.streak-info{flex:1}
.streak-days{font-size:14px;font-weight:700;color:#fbbf24}
.streak-sub{font-size:10px;color:var(--t3);margin-top:2px}
.streak-count{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:#fbbf24;line-height:1}

/* ── CONTINUAR LEYENDO ── */
.continue-section{margin:16px 0 0}
.continue-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.continue-title{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:1.2px;display:flex;align-items:center;gap:6px}
.continue-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(99,179,237,.12);color:var(--am);border:1px solid rgba(99,179,237,.2)}
.continue-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.continue-row::-webkit-scrollbar{display:none}
.cc-card{flex-shrink:0;width:118px;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;overflow:hidden;position:relative;cursor:pointer;transition:.2s}
.cc-card:hover{border-color:rgba(255,255,255,.13);transform:translateY(-2px)}
.cc-cover{width:100%;height:152px;object-fit:cover;display:block;background:var(--bg3)}
.cc-cover-ph{width:100%;height:152px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;background:linear-gradient(145deg,rgba(99,179,237,.14),rgba(90,180,240,.07))}
.cc-type-badge{position:absolute;top:7px;right:7px;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;background:rgba(10,14,26,.82);color:var(--am);border:1px solid rgba(99,179,237,.3);backdrop-filter:blur(4px)}
.cc-type-badge.anime{color:var(--aa);border-color:rgba(104,211,145,.3)}
.cc-body{padding:8px 8px 7px}
.cc-title{font-size:10px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.cc-prog{font-size:9px;font-family:'Space Mono',monospace;color:var(--t3);margin-bottom:5px}
.cc-pbar{height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-bottom:7px}
.cc-pfill{height:100%;border-radius:2px}
.cc-btn{width:100%;padding:5px 0;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px;background:rgba(99,179,237,.15);color:var(--am)}
.cc-btn:hover{background:rgba(99,179,237,.26)}
.cc-btn:active{transform:scale(.93)}
.cc-btn.anime-btn{background:rgba(104,211,145,.13);color:var(--aa)}
.cc-btn.anime-btn:hover{background:rgba(104,211,145,.22)}

/* ── ONBOARDING EXAMPLES ── */
.onb-examples{margin:14px 0 0;background:linear-gradient(135deg,rgba(99,179,237,.08),rgba(155,125,255,.06));border:1px solid rgba(99,179,237,.2);border-radius:16px;padding:16px}
.onb-ex-hdr{font-size:10px;font-weight:700;color:var(--am);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.onb-ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.onb-ex-card{background:rgba(255,255,255,.04);border:1px solid rgba(99,179,237,.15);border-radius:12px;padding:11px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s}
.onb-ex-card:hover{background:rgba(99,179,237,.1);border-color:rgba(99,179,237,.35);transform:translateY(-2px);box-shadow:0 4px 16px rgba(99,179,237,.12)}
.onb-ex-card:active{transform:scale(.96)}
.onb-ex-ico{width:38px;height:52px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex-shrink:0}
.onb-ex-info{min-width:0}
.onb-ex-name{font-size:10px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.onb-ex-type{font-size:8px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.onb-ex-add{font-size:9px;color:var(--am);margin-top:3px}

/* ── ANIMACIÓN +1 DOPAMINA ── */
.p28-anim-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.p28-plus-main{font-size:72px;font-weight:900;font-family:'Space Mono',monospace;line-height:1;animation:p28Main 1s cubic-bezier(.175,.885,.32,1.275) forwards}
.p28-plus-sub{font-size:15px;font-weight:700;animation:p28Sub 1s ease forwards;animation-delay:.1s;opacity:0}
@keyframes p28Main{
  0%{transform:scale(.3) translateY(30px);opacity:0}
  18%{transform:scale(1.35) translateY(0);opacity:1}
  65%{transform:scale(1.05) translateY(-12px);opacity:1}
  100%{transform:scale(.75) translateY(-50px);opacity:0}
}
@keyframes p28Sub{
  0%{opacity:0;transform:translateY(12px)}
  25%{opacity:1;transform:translateY(0)}
  75%{opacity:1}
  100%{opacity:0;transform:translateY(-22px)}
}
.p28-particle{position:fixed;width:7px;height:7px;border-radius:50%;pointer-events:none;animation:p28Particle 1s ease forwards}
@keyframes p28Particle{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}
}
@keyframes p29Confetti{
  0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}
  60%{opacity:1}
  100%{opacity:0;transform:translate(var(--px),var(--py)) rotate(var(--rot)) scale(.4)}
}

/* ── RECOMENDACIONES ── */
.reco-section{margin:20px 0 0}
.reco-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.reco-title-wrap{display:flex;align-items:center;gap:8px}
.reco-icon-box{width:28px;height:28px;border-radius:8px;background:rgba(155,125,255,.14);border:1px solid rgba(155,125,255,.24);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.reco-label{font-size:13px;font-weight:700;color:var(--t1)}
.reco-sublabel{font-size:10px;color:var(--t3);margin-top:1px}
.reco-new-tag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(155,125,255,.14);color:var(--purple);border:1px solid rgba(155,125,255,.24)}
.reco-context{font-size:10px;color:var(--t3);margin-bottom:10px;padding:8px 10px;background:rgba(155,125,255,.06);border:1px solid rgba(155,125,255,.12);border-radius:8px;line-height:1.5}
.reco-context b{color:var(--purple)}
.reco-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.reco-row::-webkit-scrollbar{display:none}
.reco-card{flex-shrink:0;width:128px;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.reco-card:hover{border-color:rgba(155,125,255,.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(155,125,255,.1)}
.reco-card:active{transform:scale(.97)}
.reco-card-cover{width:100%;height:168px;display:flex;align-items:center;justify-content:center;font-size:48px}
.reco-card-score{position:absolute;top:7px;right:7px;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;background:rgba(10,14,26,.82);color:#fbbf24;backdrop-filter:blur(4px)}
.reco-card-body{padding:8px 10px 10px}
.reco-card-title{font-size:10px;font-weight:600;color:var(--t1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reco-card-reason{font-size:9px;color:var(--t3);line-height:1.4;margin-bottom:6px}
.reco-card-tag{font-size:8px;font-weight:700;padding:2px 6px;border-radius:6px;background:rgba(155,125,255,.11);color:var(--purple);border:1px solid rgba(155,125,255,.2)}
.reco-empty{font-size:11px;color:var(--t3);padding:14px;text-align:center}

/* ── PERFIL PÚBLICO MEJORADO ── */
.pubprof-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;overflow:hidden;margin-top:16px}
.pubprof-cover{height:68px;background:linear-gradient(135deg,rgba(99,179,237,.28),rgba(155,125,255,.22));position:relative}
.pubprof-av-wrap{position:absolute;bottom:-22px;left:16px}
.pubprof-av{width:46px;height:46px;border-radius:50%;border:3px solid var(--bg2);background:linear-gradient(135deg,var(--am),var(--aa));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;overflow:hidden}
.pubprof-av img{width:100%;height:100%;object-fit:cover}
.pubprof-body{padding:28px 14px 14px}
.pubprof-name{font-size:15px;font-weight:700;color:var(--t1)}
.pubprof-handle{font-size:11px;color:var(--t3);margin-bottom:12px}
.pubprof-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.pp-sc{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:8px;padding:8px 5px;text-align:center}
.pp-sc-v{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;line-height:1}
.pp-sc-l{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.pubprof-sec-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.pubprof-mini-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.pp-mini{display:flex;align-items:center;gap:8px;padding:6px 8px;background:rgba(255,255,255,.03);border-radius:8px}
.pp-mini-ico{width:24px;height:34px;border-radius:4px;background:rgba(99,179,237,.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--am);flex-shrink:0}
.pp-mini-info{flex:1;min-width:0}
.pp-mini-title{font-size:10px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp-mini-prog{font-size:9px;color:var(--t3);font-family:'Space Mono',monospace}
.pubprof-share-btn{width:100%;padding:9px;border:1px solid rgba(99,179,237,.25);background:rgba(99,179,237,.08);color:var(--am);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;border-radius:10px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.pubprof-share-btn:hover{background:rgba(99,179,237,.16)}

/* ── MODO LECTURA RÁPIDA ── */
.quick-read-fab{position:fixed;bottom:80px;right:16px;z-index:500;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.qr-toggle{width:48px;height:48px;border-radius:50%;border:1px solid rgba(99,179,237,.3);background:linear-gradient(135deg,rgba(99,179,237,.2),rgba(99,179,237,.1));color:var(--am);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(99,179,237,.2);transition:.2s;backdrop-filter:blur(8px)}

.qr-panel{background:rgba(14,18,32,.95);border:1px solid var(--bdl);border-radius:16px;padding:12px;min-width:200px;max-width:260px;backdrop-filter:blur(16px);animation:slideDown .2s;display:none}
.qr-panel.open{display:block}
.qr-panel-title{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.qr-item{display:flex;align-items:center;gap:8px;padding:7px 8px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:6px}
.qr-item:last-child{margin-bottom:0}
.qr-item-title{font-size:11px;font-weight:600;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qr-item-prog{font-size:9px;color:var(--t3);font-family:'Space Mono',monospace}
.qr-plus-btn{width:30px;height:30px;border:none;border-radius:8px;background:var(--am);color:#fff;font-size:16px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.14s;font-family:'Space Mono',monospace}
.qr-plus-btn:active{transform:scale(.88)}
.qr-plus-btn.anime{background:var(--aa)}

/* ── SEPARADOR ── */
.p28-divider{height:1px;background:var(--bd);margin:18px 0}

/* ── MOBILE: add form row fixes ── */
@media(max-width:600px){
  .add-m-actions{flex-wrap:wrap;gap:6px}
  .add-m-actions .bs{flex:1}
  .add-m-actions input.sm{flex:1;min-width:80px}

/* ── PARCHE 2.2: AMIGOS ── */
.friends-panel{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:var(--rm);padding:20px;margin-bottom:20px;animation:slideDown .2s}
.friends-title{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.friends-section{margin-bottom:18px}
.friends-section:last-child{margin-bottom:0}
.friends-section-lbl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
/* Setup username */
.fn-setup{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rm);padding:16px;text-align:center}
.fn-setup-desc{font-size:12px;color:var(--t2);margin-bottom:12px;line-height:1.5}
.fn-input{width:100%;padding:10px 14px;background:var(--bgi);border:1px solid var(--bd);border-radius:var(--r);color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;transition:.15s}
.fn-input:focus{border-color:var(--am);box-shadow:0 0 0 3px var(--amd)}
.fn-btn{padding:9px 20px;border:none;border-radius:var(--r);background:var(--am);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;margin-top:8px}
.fn-btn:hover{opacity:.88}
.fn-btn.sec{background:var(--bg4);color:var(--t2);border:1px solid var(--bd)}
.fn-btn.sec:hover{color:var(--t1)}
/* My username badge */
.fn-my-user{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rm);padding:12px 14px}
.fn-my-user .fn-avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--am);object-fit:cover;flex-shrink:0}
.fn-my-user .fn-avatar-ph{width:36px;height:36px;border-radius:50%;background:var(--amd);border:2px solid var(--am);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.fn-my-user .fn-user-info{flex:1}
.fn-my-user .fn-display-name{font-size:14px;font-weight:600;color:var(--t1)}
.fn-my-user .fn-username{font-size:11px;color:var(--t2);font-family:'Space Mono',monospace}
.fn-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--amd);color:var(--am);margin-top:2px}
/* Search */
.fn-search-row{display:flex;gap:8px}
.fn-search-row .fn-input{flex:1}
/* Friend card */
.fn-friend-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rm);padding:14px;margin-bottom:10px;cursor:pointer;transition:.2s}
.fn-friend-card:hover{border-color:var(--bdl);transform:translateY(-1px)}
.fn-friend-card:last-child{margin-bottom:0}
.fn-fc-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fn-fc-avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--bd);object-fit:cover;flex-shrink:0}
.fn-fc-avatar-ph{width:34px;height:34px;border-radius:50%;background:var(--bg4);border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.fn-fc-info{flex:1}
.fn-fc-name{font-size:13px;font-weight:600;color:var(--t1)}
.fn-fc-user{font-size:10px;color:var(--t3);font-family:'Space Mono',monospace}
.fn-fc-last{font-size:10px;color:var(--t3)}
.fn-fc-stats{display:flex;gap:8px;flex-wrap:wrap}
.fn-fc-stat{background:var(--bg3);border-radius:var(--r);padding:6px 10px;text-align:center;flex:1;min-width:60px}
.fn-fc-stat-v{font-family:'Space Mono',monospace;font-size:15px;font-weight:700}
.fn-fc-stat-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
/* Friend profile view */
.fn-profile{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:20px;margin-bottom:20px;animation:slideDown .2s}

.fn-profile-avatar{width:52px;height:52px;border-radius:50%;border:2px solid var(--am);object-fit:cover}
.fn-profile-avatar-ph{width:52px;height:52px;border-radius:50%;background:var(--amd);border:2px solid var(--am);display:flex;align-items:center;justify-content:center;font-size:24px}
.fn-profile-info{flex:1}
.fn-profile-name{font-size:17px;font-weight:700;color:var(--t1)}
.fn-profile-uname{font-size:11px;color:var(--t2);font-family:'Space Mono',monospace;margin-top:2px}
.fn-profile-stats{display:flex;gap:10px;margin-bottom:18px}
.fn-ps{flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rm);padding:12px;text-align:center}
.fn-ps-v{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}
.fn-ps-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.fn-profile-list-title{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.fn-series-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:6px}
.fn-series-item:last-child{margin-bottom:0}
.fn-series-cover{width:36px;height:52px;object-fit:cover;border-radius:6px;border:1px solid var(--bd);flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.fn-series-cover-ph{width:36px;height:52px;background:linear-gradient(145deg,var(--bg4),var(--bg3));border-radius:6px;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.fn-series-info{flex:1;min-width:0}
.fn-series-title{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fn-series-prog{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);margin-top:2px}
.fn-series-pbar{height:3px;background:var(--bg1);border-radius:2px;margin-top:5px;overflow:hidden}
.fn-series-pfill{height:100%;border-radius:2px}
/* Requests */
.fn-req-card{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rm);padding:12px;margin-bottom:8px}
.fn-req-card:last-child{margin-bottom:0}
.fn-req-name{flex:1;font-size:13px;font-weight:500;color:var(--t1)}
.fn-req-user{font-size:10px;color:var(--t3);font-family:'Space Mono',monospace}
.fn-req-btns{display:flex;gap:6px}
.fn-req-btn{padding:6px 12px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.fn-req-btn.accept{background:var(--suc);color:#fff}
.fn-req-btn.reject{background:var(--bg4);color:var(--t2);border:1px solid var(--bd)}
/* Status */
.fn-status{font-size:12px;color:var(--t2);text-align:center;padding:16px;background:var(--bg2);border-radius:var(--r)}
.fn-status.error{color:var(--dng)}
.fn-status.success{color:var(--suc)}
.fn-remove-btn{padding:5px 10px;border:1px solid rgba(231,76,76,.3);background:transparent;color:var(--t3);font-size:10px;border-radius:var(--r);cursor:pointer;transition:.15s}
.fn-remove-btn:hover{color:var(--dng);border-color:var(--dng)}

async function signIn(){
  if(!FIREBASE_ENABLED)return showToast("Configura Firebase primero");
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    const result=await fbAuth.signInWithPopup(provider);
    if(result&&result.user){fbUser=result.user;loadFromCloud();}
  }catch(e){
    // Safari bloquea popups — usar redirect como fallback
    if(e.code==="auth/popup-blocked"||e.code==="auth/cancelled-popup-request"||e.code==="auth/popup-closed-by-user"){
      try{
        await fbAuth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());

    } else {
      showToast("Error al iniciar sesión: "+(e.code||e.message));

  }
}

async function loadFromCloud(){if(!fbUser||!fbDb)return;try{const doc=await fbDb.collection("users").doc(fbUser.uid).get();if(doc.exists&&doc.data().data){const c=doc.data().data;["manga","anime"].forEach(t=>{if(c[t])c[t]=c[t].map(migrate);});data=c;saveLocal();render();showToast("✓ Sincronizado");setTimeout(()=>checkUpToDateNewChapters(),4000);}else{await saveToCloud();showToast("Datos subidos a la nube");}if(fbUnsub)fbUnsub();fbUnsub=fbDb.collection("users").doc(fbUser.uid).onSnapshot(snap=>{if(!snap.exists)return;const d=snap.data().data;if(!d)return;["manga","anime"].forEach(t=>{if(d[t])d[t]=d[t].map(migrate);});data=d;saveLocal();render();});if(fbUnsubFriends)fbUnsubFriends();fbUnsubFriends=fbDb.collection("users").doc(fbUser.uid).collection("friends_received").onSnapshot(snap=>{const prev=pendingRequestsCount;pendingRequestsCount=snap.size;const badge=document.getElementById("friends-badge");if(badge){badge.textContent=pendingRequestsCount>9?"9+":pendingRequestsCount;badge.style.display=pendingRequestsCount>0?"flex":"none";}if(tab==="friends"&&document.getElementById("friends-panel-container")){renderFriendsPanel();}if(pendingRequestsCount>prev&&document.readyState==="complete"){showToast("📨 Nueva solicitud de amistad");}},err=>{console.warn("friends_received listener:",err.message);});}catch(e){console.warn("Cloud load:",e);}}

// Compress base64 cover to small thumbnail for Firestore (~2KB)
function compressCoverForProfile(dataUrl){
  return new Promise(resolve=>{
    if(!dataUrl||dataUrl.startsWith("http")){resolve(dataUrl||"");return;}
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      c.width=40;c.height=57;
      c.getContext("2d").drawImage(img,0,0,40,57);
      resolve(c.toDataURL("image/jpeg",0.55));
    };
    img.onerror=()=>resolve("");
    img.src=dataUrl;
  });
}
async function fnSaveMyPublicProfile(){
  if(!fbUser||!fbDb) return;
  const uid=fbUser.uid;
  const mangaCount=data.manga.length;
  const animeCount=data.anime.length;
  const compressAll=async(list)=>Promise.all(list.map(async s=>({
    title:s.title,completed:s.completed.length,total:s.total,
    lastChapter:s.completed.length>0?Math.max(...s.completed):0,
    cover:await compressCoverForProfile(s.cover),
    status:s.status,lastUpdated:s.lastUpdated||0
  })));
  const topMangaRaw=data.manga.filter(s=>s.status==="reading")
    .sort((a,b)=>(b.lastUpdated||0)-(a.lastUpdated||0)).slice(0,5);
  const topAnimeRaw=data.anime.filter(s=>s.status==="reading")
    .sort((a,b)=>(b.lastUpdated||0)-(a.lastUpdated||0)).slice(0,5);
  const topManga=await compressAll(topMangaRaw);
  const topAnime=await compressAll(topAnimeRaw);
  const allManga=await compressAll(data.manga);
  const allAnime=await compressAll(data.anime);
  // Nota: usamos merge:true para no sobreescribir el username si ya existe
  try{
    await fbDb.collection("public_profiles").doc(uid).set({
      uid,
      displayName:fbUser.displayName||"",
      avatarUrl:fbUser.photoURL||"",
      mangaCount,animeCount,topManga,topAnime,allManga,allAnime,
      lastActive:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
  }catch(e){console.warn("fnSaveMyPublicProfile:",e);}
}

async function fnRegisterUsername(username){
  if(!fbUser||!fbDb) return {ok:false,msg:"Debes iniciar sesion"};
  const clean=username.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(clean.length<3) return {ok:false,msg:"Minimo 3 caracteres (letras, numeros, _)"};
  if(clean.length>20) return {ok:false,msg:"Maximo 20 caracteres"};
  try{
    // Verificar si username ya existe
    let checkDoc=null;
    try{
      checkDoc=await fbDb.collection("usernames").doc(clean).get();
    }catch(readErr){
      if(readErr.code==="permission-denied"){
        return {ok:false,msg:"Error de permisos — publica las reglas de Firestore (boton Publicar en la consola)"};
      }
      console.warn("check username read failed:",readErr.code);
    }
    if(checkDoc&&checkDoc.exists){
      // Si el doc existe y ya le pertenece a este usuario, permitir re-registro
      if(checkDoc.data().uid!==fbUser.uid){
        return {ok:false,msg:"Ese username ya esta tomado"};
      }
    }
    // Escribir el username — set() puro: si no existe = CREATE, si ya es del mismo user = OVERWRITE (permitido por la regla update)
    await fbDb.collection("usernames").doc(clean).set({
      uid:fbUser.uid,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    // Escribir el perfil publico con merge:false para set completo
    await fbDb.collection("public_profiles").doc(fbUser.uid).set({
      uid:fbUser.uid,username:clean,
      displayName:fbUser.displayName||"",
      avatarUrl:fbUser.photoURL||"",
      mangaCount:data.manga.length,animeCount:data.anime.length,
      topManga:[],topAnime:[],allManga:[],allAnime:[],
      lastActive:firebase.firestore.FieldValue.serverTimestamp()
    });
    // Actualizar cache inmediatamente para que el siguiente render no lea Firestore
    friendsState.cachedUsername=clean;
    friendsState.usernameCacheUid=fbUser.uid;
    return {ok:true};
  }catch(e){
    console.error("fnRegisterUsername error:",e.code,e.message);
    if(e.code==="permission-denied"){
      return {ok:false,msg:"Error de permisos — ve a Firebase Console → Firestore → Reglas y haz clic en Publicar"};
    }
    return {ok:false,msg:"Error: "+e.message};
  }
}

async function fnGetMyUsername(forceRefresh=false){
  if(!fbUser||!fbDb) return null;
  // Usar cache si pertenece al mismo usuario y no se fuerza refresco
  if(!forceRefresh && friendsState.cachedUsername!==null && friendsState.usernameCacheUid===fbUser.uid){
    return friendsState.cachedUsername;
  }
  try{
    const doc=await fbDb.collection("public_profiles").doc(fbUser.uid).get();
    const username=doc.exists?doc.data().username||null:null;
    friendsState.cachedUsername=username;
    friendsState.usernameCacheUid=fbUser.uid;
    return username;
  }catch(e){return null;}
}

async function fnSearchUser(username){
  if(!fbDb||!fbUser) return null;
  const clean=username.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(!clean) return null;
  try{
    const doc=await fbDb.collection("usernames").doc(clean).get();
    if(!doc.exists) return "not-found";
    const uid=doc.data().uid;
    if(uid===fbUser.uid) return "self";
    const profile=await fbDb.collection("public_profiles").doc(uid).get();
    if(!profile.exists) return "not-found";
    return {uid,profile:profile.data()};
  }catch(e){
    if(e.code==="permission-denied") return "perm-error";
    return null;
  }
}

async function fnSendRequest(toUid){
  if(!fbUser||!fbDb) return {ok:false,msg:"Sin sesion"};
  try{
    // Verificar que yo tengo username registrado (requerido para que el receptor pueda identificarme)
    const myProfile=await fbDb.collection("public_profiles").doc(fbUser.uid).get();
    const myUsername=myProfile.exists?myProfile.data().username||"":"";
    if(!myUsername) return {ok:false,msg:"Debes registrar tu @username antes de agregar amigos"};

    let isFriend=false,hasSent=false,hasReceived=false;
    try{
      const existing=await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(toUid).get();
      isFriend=existing.exists;
      const sentCheck=await fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid).get();
      hasSent=sentCheck.exists;
      // También verificar si ese usuario ya me envió solicitud (aceptar directamente)
      const recvCheck=await fbDb.collection("users").doc(fbUser.uid).collection("friends_received").doc(toUid).get();
      hasReceived=recvCheck.exists;
    }catch(readErr){console.warn("send request pre-check:",readErr.code);}
    if(isFriend) return {ok:false,msg:"Ya son amigos"};
    if(hasSent) return {ok:false,msg:"Solicitud ya enviada"};
    if(hasReceived) return {ok:false,msg:"Ese usuario ya te envió solicitud — acéptala desde tu panel de solicitudes"};

    const ts=firebase.firestore.FieldValue.serverTimestamp();
    // Escribir en mi colección friends_sent
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid).set({
      toUid,ts,status:"pending"
    });
    // Escribir en la colección friends_received del destinatario
    // (requiere regla Firestore: allow create si request.auth.uid == fromUid)
    await fbDb.collection("users").doc(toUid).collection("friends_received").doc(fbUser.uid).set({
      fromUid:fbUser.uid,ts,status:"pending",
      displayName:fbUser.displayName||fbUser.email||"",
      username:myUsername,
      avatarUrl:fbUser.photoURL||""
    });
    return {ok:true};
  }catch(e){
    if(e.code==="permission-denied"){
      return {ok:false,msg:"Error de permisos — asegúrate de haber publicado las reglas de Firestore correctamente"};
    }
    return {ok:false,msg:"Error: "+e.message};
  }
}

async function fnSyncAcceptedRequests(){
  // Para cada solicitud enviada, verifica si el receptor ya la aceptó
  // (es decir, si yo aparezco en su friends_accepted)
  // Si es así, me agrego a mí mismo como amigo y limpio la solicitud enviada
  if(!fbUser||!fbDb) return;
  try{
    const sentSnap=await withTimeout(fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").get());
    for(const doc of sentSnap.docs){
      const toUid=doc.id;
      try{
        // Intenta leer si el receptor me tiene en su friends_accepted
        const acceptedDoc=await fbDb.collection("users").doc(toUid).collection("friends_accepted").doc(fbUser.uid).get();
        if(acceptedDoc.exists){
          // ¡Fue aceptado! Agregar a mis amigos y limpiar la solicitud enviada
          const theirProfile=await fbDb.collection("public_profiles").doc(toUid).get();
          const ts=firebase.firestore.FieldValue.serverTimestamp();
          await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(toUid).set({
            since:ts,uid:toUid,
            displayName:theirProfile.exists?theirProfile.data().displayName||"":"",
            username:theirProfile.exists?theirProfile.data().username||"":"",
            avatarUrl:theirProfile.exists?theirProfile.data().avatarUrl||"":""
          });
          await fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid).delete();
          showToast("✓ ¡"+( theirProfile.exists?theirProfile.data().displayName||"Usuario":"Usuario")+" aceptó tu solicitud!");
        }
      }catch(e){/* puede fallar por permisos si la otra persona no aceptó aún */}
    }
  }catch(e){console.warn("fnSyncAcceptedRequests:",e.message);}
}

async function fnAcceptRequest(fromUid,fromData){
  if(!fbUser||!fbDb) return;
  try{
    const ts=firebase.firestore.FieldValue.serverTimestamp();
    const myProfile=await fbDb.collection("public_profiles").doc(fbUser.uid).get();
    const myUsername=myProfile.exists?myProfile.data().username:"";

    // Solo escribimos en NUESTRAS propias colecciones (sin escritura cruzada)
    // 1. Agregar el remitente a MI lista de amigos aceptados
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(fromUid).set({
      since:ts,uid:fromUid,
      displayName:fromData.displayName||"",username:fromData.username||"",avatarUrl:fromData.avatarUrl||""
    });
    // 2. Eliminar la solicitud de MI friends_received
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_received").doc(fromUid).delete();
    // 3. Escribir en MI friends_accepted un marcador especial que el remitente puede leer
    //    para saber que fue aceptado (él lo detecta vía su propia friends_sent → estado "accepted")
    // 4. Actualizar el estado en MI friends_sent del remitente hacia mí
    //    — NO podemos escribir en el doc del remitente sin reglas especiales,
    //    por eso usamos su public_profile para notificarle indirectamente.
    //    El remitente, al hacer Sync o abrir el panel, verá que está en friends_accepted del receptor.

    // Intentar limpiar su friends_sent (puede fallar por permisos — no es crítico)
    try{
      await fbDb.collection("users").doc(fromUid).collection("friends_sent").doc(fbUser.uid).delete();
    }catch(e){console.warn("No se pudo limpiar friends_sent del remitente:",e.code);}

    // Intentar escribir en su friends_accepted (puede fallar por permisos)
    try{
      await fbDb.collection("users").doc(fromUid).collection("friends_accepted").doc(fbUser.uid).set({
        since:ts,uid:fbUser.uid,
        displayName:fbUser.displayName||"",username:myUsername,avatarUrl:fbUser.photoURL||""
      });
    }catch(e){console.warn("No se pudo escribir friends_accepted del remitente:",e.code);}

    showToast("✓ ¡Amigo agregado!");
    friendsState.searchResult=null;
    renderFriendsPanel();
  }catch(e){
    console.error("fnAcceptRequest error:",e.code,e.message);
    showToast("Error al aceptar: "+(e.code||e.message));
  }
}

async function fnRejectRequest(fromUid){
  if(!fbUser||!fbDb) return;
  try{
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_received").doc(fromUid).delete();
    try{
      await fbDb.collection("users").doc(fromUid).collection("friends_sent").doc(fbUser.uid).delete();
    }catch(e){console.warn("No se pudo limpiar friends_sent del remitente:",e.code);}
    renderFriendsPanel();
  }catch(e){showToast("Error al rechazar: "+e.message);}
}

async function fnCancelRequest(toUid){
  if(!fbUser||!fbDb) return;
  try{
    const batch=fbDb.batch();
    batch.delete(fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid));
    batch.delete(fbDb.collection("users").doc(toUid).collection("friends_received").doc(fbUser.uid));
    await batch.commit();
    showToast("Solicitud cancelada");
    renderFriendsPanel();
  }catch(e){showToast("Error al cancelar: "+e.message);}
}

async function fnRemoveFriend(friendUid){
  if(!fbUser||!fbDb) return;
  try{
    // Eliminamos NUESTRO propio friends_accepted (no necesitamos tocar el del otro)
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(friendUid).delete();
    // Intentar eliminar el nuestro del lado del amigo (puede fallar por permisos — no crítico)
    try{
      await fbDb.collection("users").doc(friendUid).collection("friends_accepted").doc(fbUser.uid).delete();
    }catch(e){console.warn("No se pudo limpiar friends_accepted del otro usuario:",e.code);}
    friendsState.view="list";friendsState.viewingUid=null;friendsState.viewingData=null;
    showToast("Amigo eliminado");
    renderFriendsPanel();
  }catch(e){showToast("Error al eliminar: "+e.message);}
}

// Helper: timeout para cualquier promesa de Firestore (evita cuelgues infinitos)
function withTimeout(promise,ms=8000){
  return Promise.race([
    promise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),ms))
  ]);
}

async function renderFriendsPanel(){
  const container=document.getElementById("friends-panel-container");
  if(!container) return;
  container.innerHTML=`<div style="text-align:center;padding:30px;color:var(--t3);font-size:12px">Cargando...</div>`;
  if(!fbUser){
    container.innerHTML=`<div class="fn-status">Inicia sesion con Google para usar el sistema de amigos</div>`;
    return;
  }
  try{
    await _renderFriendsPanelInner(container);
  }catch(err){
    console.warn("renderFriendsPanel error:",err);
    const msg=err.message==="timeout"?"Tiempo de espera agotado — revisa tu conexion":"Error al cargar: "+err.message;
    container.innerHTML=`<div class="fn-status error" style="padding:24px;text-align:center">
      ${msg}<br><br>
      <button class="fn-btn sec" onclick="renderFriendsPanel()" style="margin:0 auto">Reintentar</button>
    </div>`;
  }
}

async function _renderFriendsPanelInner(container){
  // fnSaveMyPublicProfile NO va aqui — se llama desde saveLocal() al modificar datos,
  // no al renderizar la UI (causaba ciclo infinito con onSnapshot)
  const myUsername=await withTimeout(fnGetMyUsername());
  const ac=theme.accentManga||"#e74c6f";

  // Sincronizar solicitudes aceptadas por el remitente (detecta si alguien aceptó mi solicitud)
  fnSyncAcceptedRequests().catch(()=>{});

  // Vista perfil de amigo
  if(friendsState.view==="profile" && friendsState.viewingUid){
    let pData=friendsState.viewingData;
    if(!pData){
      const doc=await withTimeout(fbDb.collection("public_profiles").doc(friendsState.viewingUid).get());
      pData=doc.exists?doc.data():null;
    }
    if(!pData){container.innerHTML=`<div class="fn-status error">No se pudo cargar el perfil</div>`;return;}
    const av=pData.avatarUrl?`<img class="fn-profile-avatar" src="${pData.avatarUrl}">`:
      `<div class="fn-profile-avatar-ph">&#128100;</div>`;
    const allSeries=[...(pData.allManga||pData.topManga||[]).map(s=>({...s,type:"M"})),
                     ...(pData.allAnime||pData.topAnime||[]).map(s=>({...s,type:"A"}))];
    const reading=allSeries.filter(s=>s.status==="reading").sort((a,b)=>(b.lastUpdated||0)-(a.lastUpdated||0));
    const completed=allSeries.filter(s=>s.status==="completed").sort((a,b)=>(b.lastUpdated||0)-(a.lastUpdated||0)).slice(0,8);
    const paused=allSeries.filter(s=>s.status==="paused"||s.status==="plan").sort((a,b)=>(b.lastUpdated||0)-(a.lastUpdated||0)).slice(0,5);
    const buildList=(arr,emptyMsg)=>{
      if(!arr.length) return `<div class="fn-status">${emptyMsg}</div>`;
      return arr.map(s=>{
        // Aceptar URL HTTP (Jikan) o Base64 comprimida subida al perfil publico (Parche 2.5)
        const coverSrc=(s.cover&&typeof s.cover==="string"&&s.cover.length>10)?s.cover:"";
        const cvr=coverSrc
          ?`<img class="fn-series-cover" src="${coverSrc}" loading="lazy" decoding="async" onerror="this.style.display='none';var ph=this.nextElementSibling;if(ph){ph.style.display='flex';}" ><div class="fn-series-cover-ph" style="display:none;font-size:15px;font-weight:800;color:${s.type==='M'?'var(--am)':'var(--aa)'}">${s.title.charAt(0)}</div>`
          :`<div class="fn-series-cover-ph" style="display:flex;font-size:15px;font-weight:800;color:${s.type==='M'?'var(--am)':'var(--aa)'}">${s.title.charAt(0)}</div>`;
        const pct=s.total>0?Math.round((s.completed||0)/s.total*100):0;
        const lastCh=s.lastChapter||(s.completed)||0;
        const chLabel=s.type==="M"?"Cap.":"Ep.";
        const progText=s.total>0
          ?`${chLabel} <b style="color:var(--t1);font-size:11px">${lastCh}</b> / ${s.total} &nbsp;·&nbsp; ${pct}%`
          :`${chLabel} <b style="color:var(--t1);font-size:11px">${lastCh}</b>`;
        const typeBadge=s.type==="M"
          ?`<span style="flex-shrink:0;font-size:9px;font-weight:700;color:${ac};background:var(--amd);padding:2px 7px;border-radius:10px">MANGA</span>`
          :`<span style="flex-shrink:0;font-size:9px;font-weight:700;color:var(--aa);background:var(--aad);padding:2px 7px;border-radius:10px">ANIME</span>`;
        return `<div class="fn-series-item">
          ${cvr}
          <div class="fn-series-info">
            <div class="fn-series-title">${s.title}</div>
            <div class="fn-series-prog">${progText}</div>
            <div class="fn-series-pbar"><div class="fn-series-pfill" style="width:${pct}%;background:${s.type==="M"?ac:"var(--aa)"}"></div></div>
          </div>
          ${typeBadge}
        </div>`;
      }).join("");
    };
    const readingManga=reading.filter(s=>s.type==="M");
    const readingAnime=reading.filter(s=>s.type==="A");
    const vuid=friendsState.viewingUid;
    container.innerHTML=`
      <div class="fn-profile">
        <button class="fn-btn sec" onclick="friendsState.view='list';friendsState.viewingUid=null;friendsState.viewingData=null;renderFriendsPanel()" style="margin-bottom:16px;font-size:12px">&larr; Volver</button>
        <div class="fn-profile-header">
          ${av}
          <div class="fn-profile-info">
            <div class="fn-profile-name">${pData.displayName||"Usuario"}</div>
            <div class="fn-profile-uname">@${pData.username||"&mdash;"}</div>
          </div>
          <button class="fn-remove-btn" onclick="if(confirm('Eliminar de amigos?'))fnRemoveFriend('${vuid}')">Eliminar</button>
        </div>
        <div class="fn-profile-stats">
          <div class="fn-ps"><div class="fn-ps-v" style="color:${ac}">${pData.mangaCount||0}</div><div class="fn-ps-l">Manga</div></div>
          <div class="fn-ps"><div class="fn-ps-v" style="color:var(--aa)">${pData.animeCount||0}</div><div class="fn-ps-l">Anime</div></div>
          <div class="fn-ps"><div class="fn-ps-v" style="color:var(--suc)">${reading.length}</div><div class="fn-ps-l">En curso</div></div>
        </div>
        ${readingManga.length>0?`
        <div class="friends-section" style="margin-bottom:14px">
          <div class="fn-profile-list-title">📚 Manga en progreso (${readingManga.length})</div>
          ${buildList(readingManga,"—")}
        </div>`:""}
        ${readingAnime.length>0?`
        <div class="friends-section" style="margin-bottom:14px">
          <div class="fn-profile-list-title">🎬 Anime en progreso (${readingAnime.length})</div>
          ${buildList(readingAnime,"—")}
        </div>`:""}
        ${reading.length===0?`<div class="fn-status" style="margin-bottom:14px">Nada en progreso actualmente</div>`:""}
        ${completed.length>0?`
        <div class="friends-section" style="margin-bottom:14px">
          <div class="fn-profile-list-title">✅ Últimos completados</div>
          ${buildList(completed,"—")}
        </div>`:""}
        ${paused.length>0?`
        <div class="friends-section">
          <div class="fn-profile-list-title">⏸ En pausa / Pendientes</div>
          ${buildList(paused,"—")}
        </div>`:""}
      </div>`;
    return;
  }

  // Vista lista — todas las queries con timeout
  let received=[], friends=[], sent=[], receivedError=null, friendsError=null;
  try{
    const rSnap=await withTimeout(fbDb.collection("users").doc(fbUser.uid).collection("friends_received").get());
    received=rSnap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){receivedError=e.code||e.message;console.warn("friends_received:",e.code,e.message);}
  try{
    const fSnap=await withTimeout(fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").get());
    // Deduplicar por uid para evitar dobles entradas (bug amigo duplicado - Parche 2.5)
    const fAll=fSnap.docs.map(d=>({id:d.id,...d.data()}));
    const fSeen=new Set();
    friends=fAll.filter(f=>{
      const k=f.uid||f.id;
      if(!k||fSeen.has(k))return false;
      fSeen.add(k);
      return true;
    });
  }catch(e){friendsError=e.code||e.message;console.warn("friends_accepted:",e.code,e.message);}
  try{
    const sSnap=await withTimeout(fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").get());
    sent=sSnap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){console.warn("friends_sent:",e.message);}

  let html=`<div class="friends-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="friends-title" style="margin-bottom:0">&#128101; Amigos</div>
      <button class="fn-btn sec" onclick="renderFriendsPanel()" style="font-size:11px;padding:5px 12px">↻ Actualizar</button>
    </div>`;

  // Mi usuario
  if(!myUsername){
    html+=`<div class="friends-section"><div class="friends-section-lbl">Mi usuario</div>
      <div class="fn-setup">
        <div class="fn-setup-desc">Elige un nombre de usuario único para que tus amigos puedan encontrarte</div>
        <input class="fn-input" id="fn-username-input" placeholder="ej: Gabriel_Kast69" maxlength="20">
        <br><button class="fn-btn" id="fn-register-btn">Registrar username</button>
        ${friendsState.statusMsg?`<div class="fn-status ${friendsState.statusType}" style="margin-top:10px">${friendsState.statusMsg}</div>`:""}
      </div></div>`;
  }else{
    const avImg=fbUser.photoURL?`<img class="fn-avatar" src="${fbUser.photoURL}">`:
      `<div class="fn-avatar-ph">&#128100;</div>`;
    html+=`<div class="friends-section"><div class="fn-my-user">
      ${avImg}
      <div class="fn-user-info">
        <div class="fn-display-name">${fbUser.displayName||"Usuario"}</div>
        <div class="fn-username">@${myUsername}</div>
        <div class="fn-tag">Comparte tu @username con amigos</div>
      </div>
      <button class="fn-btn sec" id="fn-change-user-btn" style="font-size:11px;padding:5px 10px;margin-left:auto">✏️ Cambiar</button>
      </div>
      <div id="fn-change-user-form" style="display:none;margin-top:8px">
        <input class="fn-input" id="fn-username-input" placeholder="Nuevo @username" maxlength="20" value="${myUsername}">
        <br><button class="fn-btn" id="fn-register-btn" style="margin-top:6px">Guardar username</button>
        ${friendsState.statusMsg?`<div class="fn-status ${friendsState.statusType}" style="margin-top:10px">${friendsState.statusMsg}</div>`:""}
      </div>
    </div></div>`;
  }

  // Buscar amigo
  if(myUsername){
    html+=`<div class="friends-section"><div class="friends-section-lbl">Agregar amigo</div>
      <div class="fn-search-row">
        <input class="fn-input" id="fn-search-input" placeholder="@username del amigo" value="${friendsState.searchUsername}">
        <button class="fn-btn" id="fn-search-btn">Buscar</button>
      </div>`;
    if(friendsState.searchResult==="perm-error"){
      html+=`<div class="fn-status error" style="margin-top:10px">Error de permisos &mdash; publica las reglas de Firestore</div>`;
    }else if(friendsState.searchResult==="not-found"){
      html+=`<div class="fn-status error" style="margin-top:10px">Usuario no encontrado</div>`;
    }else if(friendsState.searchResult==="self"){
      html+=`<div class="fn-status" style="margin-top:10px">Ese eres tu</div>`;
    }else if(friendsState.searchResult && typeof friendsState.searchResult==="object"){
      const sr=friendsState.searchResult;
      const isFriend=friends.some(f=>f.uid===sr.uid);
      let hasSent=false;
      try{hasSent=(await withTimeout(fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(sr.uid).get())).exists;}catch(e){}
      const avS=sr.profile.avatarUrl?`<img class="fn-fc-avatar" src="${sr.profile.avatarUrl}">`:
        `<div class="fn-fc-avatar-ph">&#128100;</div>`;
      html+=`<div class="fn-friend-card" style="margin-top:10px;cursor:default">
        <div class="fn-fc-header">${avS}
          <div class="fn-fc-info">
            <div class="fn-fc-name">${sr.profile.displayName||"Usuario"}</div>
            <div class="fn-fc-user">@${sr.profile.username||""}</div>
          </div>
          ${isFriend?`<span style="font-size:11px;color:var(--suc)">&#10003; Amigos</span>`:
            hasSent?`<span style="font-size:11px;color:var(--t3)">Solicitud enviada</span>`:
            `<button class="fn-btn" id="fn-add-btn" data-uid="${sr.uid}">Agregar</button>`}
        </div>
        <div class="fn-fc-stats">
          <div class="fn-fc-stat"><div class="fn-fc-stat-v" style="color:${ac}">${sr.profile.mangaCount||0}</div><div class="fn-fc-stat-l">Manga</div></div>
          <div class="fn-fc-stat"><div class="fn-fc-stat-v" style="color:var(--aa)">${sr.profile.animeCount||0}</div><div class="fn-fc-stat-l">Anime</div></div>
        </div></div>`;
    }
    if(friendsState.statusMsg) html+=`<div class="fn-status ${friendsState.statusType}" style="margin-top:10px">${friendsState.statusMsg}</div>`;
    html+=`</div>`;
  }

  // Solicitudes enviadas — excluir los que ya son amigos aceptados
  const friendUids=new Set(friends.map(f=>f.uid||f.id));
  sent=sent.filter(s=>!friendUids.has(s.id));
  if(sent.length>0){
    html+=`<div class="friends-section"><div class="friends-section-lbl">📤 Solicitudes enviadas (${sent.length})</div>`;
    for(const s of sent){
      let sp=null;
      try{const sd=await withTimeout(fbDb.collection("public_profiles").doc(s.id).get());sp=sd.exists?sd.data():null;}catch(e){}
      const nm=sp?.displayName||s.id;
      const un=sp?.username||s.id;
      const av=sp?.avatarUrl?`<img class="fn-fc-avatar" src="${sp.avatarUrl}">`:`<div class="fn-fc-avatar-ph">&#128100;</div>`;
      html+=`<div class="fn-req-card">${av}
        <div><div class="fn-req-name">${nm}</div><div class="fn-req-user">@${un}</div></div>
        <div style="margin-left:auto">
          <button class="fn-req-btn reject" data-cancel="${s.id}">✕ Cancelar</button>
        </div></div>`;
    }
    html+=`</div>`;
  }

  // Solicitudes recibidas — siempre visible
  html+=`<div class="friends-section"><div class="friends-section-lbl">📨 Solicitudes recibidas (${received.length})</div>`;
  if(receivedError){
    html+=`<div class="fn-status error">Error al leer solicitudes: ${receivedError}<br><small>Revisa las reglas de Firestore</small></div>`;
  }else if(received.length===0){
    html+=`<div class="fn-status">Sin solicitudes pendientes</div>`;
  }else{
    received.forEach(req=>{
      const avR=req.avatarUrl?`<img class="fn-fc-avatar" src="${req.avatarUrl}">`:
        `<div class="fn-fc-avatar-ph">&#128100;</div>`;
      html+=`<div class="fn-req-card">${avR}
        <div><div class="fn-req-name">${req.displayName||"Usuario"}</div><div class="fn-req-user">@${req.username||""}</div></div>
        <div class="fn-req-btns" style="margin-left:auto">
          <button class="fn-req-btn accept" data-accept="${req.id}" data-dname="${(req.displayName||"").replace(/"/g,"&quot;")}" data-uname="${req.username||""}" data-avatar="${req.avatarUrl||""}">✓ Aceptar</button>
          <button class="fn-req-btn reject" data-reject="${req.id}">✕</button>
        </div></div>`;
    });
  }
  html+=`</div>`;

  // Lista de amigos
  html+=`<div class="friends-section"><div class="friends-section-lbl">Mis amigos (${friends.length})</div>`;
  if(friends.length===0){
    html+=`<div class="fn-status">Aun no tienes amigos. Busca por @username para agregar.</div>`;
  }else{
    for(const f of friends){
      let fProfile=null;
      try{
        const fDoc=await withTimeout(fbDb.collection("public_profiles").doc(f.uid).get());
        fProfile=fDoc.exists?fDoc.data():null;
      }catch(e){console.warn("fProfile load:",e.message);}
      const nm=fProfile?.displayName||f.displayName||"Usuario";
      const un=fProfile?.username||f.username||"";
      const avF=f.avatarUrl?`<img class="fn-fc-avatar" src="${f.avatarUrl}">`:
        `<div class="fn-fc-avatar-ph">&#128100;</div>`;
      const mC=fProfile?.mangaCount||0;
      const aC=fProfile?.animeCount||0;
      const reading=((fProfile?.allManga||fProfile?.topManga||[]).filter(s=>s.status==="reading").length)+
                    ((fProfile?.allAnime||fProfile?.topAnime||[]).filter(s=>s.status==="reading").length);
      html+=`<div class="fn-friend-card" data-view-uid="${f.uid}">
        <div class="fn-fc-header">${avF}
          <div class="fn-fc-info"><div class="fn-fc-name">${nm}</div><div class="fn-fc-user">@${un}</div></div>
          <button onclick="event.stopPropagation();if(confirm('¿Eliminar a ${nm} de amigos?'))fnRemoveFriend('${f.uid}')" style="flex-shrink:0;padding:4px 10px;border:1px solid rgba(231,76,76,.3);background:transparent;color:var(--t3);font-size:10px;border-radius:var(--r);cursor:pointer" onmouseover="this.style.color='var(--dng)';this.style.borderColor='var(--dng)'" onmouseout="this.style.color='var(--t3)';this.style.borderColor='rgba(231,76,76,.3)'">✕ Eliminar</button>
        </div>
        <div class="fn-fc-stats">
          <div class="fn-fc-stat"><div class="fn-fc-stat-v" style="color:${ac}">${mC}</div><div class="fn-fc-stat-l">Manga</div></div>
          <div class="fn-fc-stat"><div class="fn-fc-stat-v" style="color:var(--aa)">${aC}</div><div class="fn-fc-stat-l">Anime</div></div>
          <div class="fn-fc-stat"><div class="fn-fc-stat-v" style="color:var(--suc)">${reading}</div><div class="fn-fc-stat-l">Activos</div></div>
        </div></div>`;
    }
  }
  html+=`</div></div>`;
  container.innerHTML=html;

  // Event listeners

}
function selectJikanResult(item,tabType){

  // Estrategia: usar lo que haya, luego fetchear el endpoint individual en background.
  const rawCount=tabType==="manga"?(item.chapters||0):(item.episodes||0);
  const publishing=tabType==="manga"?item.publishing:item.airing;
  newTitle=title;
  newCover=cover;
  newCoverIsUrl=true;
  // FIX P2.8: Para obras en publicación con chapters=null, NO usar placeholder "1".
  // Se asigna 0 temporalmente y se fetchea el endpoint individual para obtener el cap real publicado.
  newTotal=rawCount?String(rawCount):(publishing?"":"");
  const JIKAN_MAP={"Shounen":"Shōnen","Shoujo":"Shōjo","Seinen":"Seinen","Josei":"Josei","Action":"Acción","Adventure":"Acción","Comedy":"Comedia","Horror":"Horror","Romance":"Romance","Sci-Fi":"Sci-Fi","Fantasy":"Fantasy","Mecha":"Mecha","Slice of Life":"Slice of Life","Sports":"Deportes","Supernatural":"Sobrenatural","Thriller":"Thriller","Mystery":"Thriller","Isekai":"Isekai","Drama":"Drama","Ecchi":"Ecchi","Psychological":"Psicológico","Historical":"Histórico","Military":"Militar","Music":"Música","School":"Escolar"};
  const apiGenres=[...(item.genres||[]),...(item.themes||[]),...(item.demographics||[])];
  const resolvedTags=[];
  if(!theme.customTags)theme.customTags=[];
  apiGenres.forEach(g=>{
    const mapped=JIKAN_MAP[g.name]||g.name;
    if(ALL_TAGS.includes(mapped)){if(!resolvedTags.includes(mapped))resolvedTags.push(mapped);}
    else{if(!theme.customTags.includes(mapped))theme.customTags.push(mapped);if(!resolvedTags.includes(mapped))resolvedTags.push(mapped);}
  });
  newTags=resolvedTags;
  saveLocal();
  jikanResults=[];
  window._pendingJikanId=item.mal_id;
  window._pendingJikanPublishing=publishing||false;
  render();
  const inp=document.getElementById("add-title");

  const inp2=document.getElementById("add-total");
  if(inp2)inp2.value=newTotal;
  // FIX P2.8: Si obra en publicación y chapters=null → fetch individual para obtener el real
  // Incluso si hay rawCount, hacemos fetch para confirmar que tenemos el número más actualizado
  if(publishing&&item.mal_id){
    const ep=tabType==="manga"?"manga":"anime";
    const inp2=document.getElementById("add-total");
    if(inp2&&!rawCount){inp2.placeholder="Cargando caps...";}
    fetch(`https://api.jikan.moe/v4/${ep}/${item.mal_id}`)
      .then(r=>r.json())
      .then(d=>{
        const det=d.data;if(!det)return;
        // Para manga: chapters puede ser null si está en publicación, intentar también via chapters del endpoint
        const realCount=tabType==="manga"
          ?(det.chapters||det.volumes||0)
          :(det.episodes||0);
        // Si la API individual tampoco tiene el conteo exacto de caps publicados,
        // podría no estar disponible — se avisa al usuario
        if(realCount&&realCount>0){
          newTotal=String(realCount);
          window._pendingJikanPublishing=tabType==="manga"?det.publishing:det.airing;
          const f=document.getElementById("add-total");
          if(f){f.value=newTotal;f.placeholder=tabType==="manga"?"Total de capitulos *":"Total de episodios *";f.style.borderColor="rgba(99,179,237,.5)";}
          showToast(`📖 ${realCount} ${tabType==="manga"?"caps":"eps"} encontrados`);
        }else if(publishing){
          // Si la API individual tampoco tiene count, informar al usuario
          const f=document.getElementById("add-total");
          if(f){f.placeholder="Total de capitulos *";}
          showToast("⚠️ Serie en publicación — ajusta el total manualmente");
        }
      })
      .catch(()=>{const f=document.getElementById("add-total");if(f)f.placeholder="Total de capitulos *";});
  }
}
async function checkJikanUpdates(){
  for(const tabKey of ["manga","anime"]){
    const ep=tabKey==="manga"?"manga":"anime";
    const publishing=data[tabKey].filter(s=>s.jikanId&&s.jikanPublishing);
    for(const series of publishing){
      try{
        const res=await fetch(`https://api.jikan.moe/v4/${ep}/${series.jikanId}`);
        const json=await res.json();
        const count=tabKey==="manga"?json.data?.chapters:json.data?.episodes;
        const stillPub=tabKey==="manga"?json.data?.publishing:json.data?.airing;
        // Actualizar si: hay cap nuevo, o si el total guardado es solo 1 (placeholder) y la API da más
        const shouldUpdate=(count&&count>series.total)||(count&&count>0&&series.total===0);
        if(shouldUpdate){
          series.total=count;
          series.jikanPublishing=stillPub||false;
          series.lastUpdated=Date.now();
          save();
          showToast(`🆕 ${series.title}: ${count} ${tabKey==="manga"?"cap.":"ep."} disponibles`,4000);
          render();
        }else if(!stillPub&&series.jikanPublishing){
          series.jikanPublishing=false;
          save();
        }
      }catch(e){}
      await new Promise(r=>setTimeout(r,600));
    }
  }
}
// ── AVISO: NUEVO CAPÍTULO EN SERIES AL DÍA ──
async function checkUpToDateNewChapters(){
  const notifications=[];
  for(const tabKey of ["manga","anime"]){
    const ep=tabKey==="manga"?"manga":"anime";
    const pubSeries=data[tabKey].filter(s=>s.jikanId&&s.jikanPublishing);
    for(const series of pubSeries){
      const nextCh=nextChapter(series);
      if(nextCh!==null)continue;
      try{
        const res=await fetch("https://api.jikan.moe/v4/"+ep+"/"+series.jikanId);
        const json=await res.json();
        const count=tabKey==="manga"?json.data?.chapters:json.data?.episodes;
        if(count&&count>series.total){
          notifications.push(series.title+" — cap. "+count+" disponible");
        }
      }catch(e){}
      await new Promise(r=>setTimeout(r,500));
    }
  }
  if(notifications.length>0){
    const msg=notifications.length===1
      ?"\uD83D\uDECE "+notifications[0]
      :"\uD83D\uDECE "+notifications.length+" series con cap. nuevo!";
    showToast(msg,5000);
  }
}

// ── P2.9: SONIDO +1 (Web Audio API) ──
let _p29AudioCtx=null;
function p29PlayTick(){
  if(theme.soundEnabled===false)return;
  try{
    if(!_p29AudioCtx)_p29AudioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(_p29AudioCtx.state==="suspended")_p29AudioCtx.resume();
    const ctx=_p29AudioCtx;
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type="sine";
    osc.frequency.setValueAtTime(900,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.09);
    gain.gain.setValueAtTime(0.22,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.14);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+0.15);
  }catch(e){}
  // Haptic en Android
  try{if(navigator.vibrate)navigator.vibrate(10);}catch(e){}
}

// ── P2.9: CONFETTI AL COMPLETAR SERIE ──
function p29ShowConfetti(ac){
  document.querySelectorAll(".p29-confetti-particle").forEach(e=>e.remove());
  const colors=[ac||"#63b3ed","#fbbf24","#34d399","#f472b6","#a78bfa","#fb923c"];
  const cx=window.innerWidth/2;
  const cy=window.innerHeight/3;
  for(let i=0;i<48;i++){
    const p=document.createElement("div");
    p.className="p29-confetti-particle";
    const color=colors[i%colors.length];
    const size=4+Math.random()*6;
    const angle=(i/48)*360+(Math.random()-0.5)*30;
    const dist=80+Math.random()*160;
    const px=Math.cos(angle*Math.PI/180)*dist;
    const py=-(60+Math.random()*180);
    const dur=0.8+Math.random()*0.6;
    const delay=Math.random()*0.15;
    const isRect=Math.random()>0.5;
    p.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:${size}px;height:${isRect?size*2.5:size}px;background:${color};border-radius:${isRect?"2px":"50%"};pointer-events:none;z-index:9998;animation:p29Confetti ${dur}s ease-out ${delay}s forwards`;
    p.style.setProperty("--px",px+"px");
    p.style.setProperty("--py",py+"px");
    p.style.setProperty("--rot",(Math.random()*720-360)+"deg");
    document.body.appendChild(p);
  }
  setTimeout(()=>document.querySelectorAll(".p29-confetti-particle").forEach(e=>e.remove()),1800);
}

// ── P2.8: RACHA DE LECTURA ──
function p28GetStreakKey(){return fbUser?"mat-streak-"+fbUser.uid:"mat-streak-guest";}
function p28GetStreakData(){
  try{const raw=localStorage.getItem(p28GetStreakKey());return raw?JSON.parse(raw):{count:0,lastDate:""};}
  catch(e){return{count:0,lastDate:""};}
}
function p28SaveStreakData(d){try{localStorage.setItem(p28GetStreakKey(),JSON.stringify(d));}catch(e){}}
function p28TouchStreak(){
  const td=today();
  const d=p28GetStreakData();
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yd=yesterday.toISOString().slice(0,10);
  if(d.lastDate===td)return;// ya marcó hoy
  if(d.lastDate===yd){d.count=(d.count||0)+1;}
  else if(d.lastDate!==td){d.count=1;}
  d.lastDate=td;
  p28SaveStreakData(d);
}
function p28GetStreak(){const d=p28GetStreakData();const td=today();const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);const yd=yesterday.toISOString().slice(0,10);if(d.lastDate===td||d.lastDate===yd)return d.count||0;return 0;}

// ── P2.8: ANIMACIÓN DOPAMINA +1 ──
function p28ShowPlusAnim(type,title,streakCount){
  document.querySelectorAll(".p28-anim-overlay,.p28-particle").forEach(e=>e.remove());
  const colors=type==="manga"
    ?["#63b3ed","#7ecbff","#34d399","#9b7dff"]
    :["#68d391","#34d399","#63b3ed","#fbbf24"];
  const mc=colors[0];
  const label=type==="manga"?"📖 +1 cap":"▶ +1 ep";
  // Si hay racha ≥2, añadir línea de racha
  const streakLine=streakCount&&streakCount>=2?`<div class="p28-plus-streak" style="color:#fbbf24;font-size:13px;font-weight:700;animation:p28Sub 1s ease forwards;animation-delay:.25s;opacity:0">🔥 ${streakCount} días seguidos</div>`:"";

  const ov=document.createElement("div");
  ov.className="p28-anim-overlay";
  ov.innerHTML=`<div class="p28-plus-main" style="color:${mc};text-shadow:0 0 40px ${mc}55">+1</div><div class="p28-plus-sub" style="color:${mc}">${label}</div>${streakLine}`;
  document.body.appendChild(ov);

  // Partículas
  const cx=window.innerWidth/2;const cy=window.innerHeight/2;
  for(let i=0;i<14;i++){
    const p=document.createElement("div");
    p.className="p28-particle";
    const angle=(i/14)*360;
    const dist=50+Math.random()*60;
    const px=Math.cos(angle*Math.PI/180)*dist+"px";
    const py=Math.sin(angle*Math.PI/180)*dist+"px";
    p.style.cssText=`left:${cx-3}px;top:${cy-3}px;--px:${px};--py:${py};background:${colors[i%colors.length]};animation-delay:${Math.random()*80}ms`;
    document.body.appendChild(p);
  }
  setTimeout(()=>{ov.remove();document.querySelectorAll(".p28-particle").forEach(e=>e.remove());},1100);
}

// ── P2.8: RENDERIZAR STREAK BANNER ──
function p28RenderStreakBanner(root){
  const streak=p28GetStreak();
  if(streak<2)return;// solo mostrar si ≥2 días
  const sb=document.createElement("div");
  sb.className="streak-banner";
  const msg=streak>=7?"¡Racha épica! No la rompas":streak>=3?"¡Sigue así! Lee hoy para mantenerla":"¡Buen comienzo! Lee hoy para crecer";
  sb.innerHTML=`<div class="streak-fire">🔥</div><div class="streak-info"><div class="streak-days">${streak} días seguidos</div><div class="streak-sub">${msg}</div></div><div class="streak-count">${streak}</div>`;
  root.appendChild(sb);
}

// ── P2.8: RECOMENDACIONES POR SIMILITUD DE TAGS ──
async function p28FetchReco(tags,type){
  if(!tags||tags.length===0)return[];
  const jikanType=type==="manga"?"manga":"anime";
  const existingTitles=new Set([...data.manga,...data.anime].map(s=>s.title.toLowerCase()));
  const results=[];
  const tag=tags[Math.floor(Math.random()*tags.length)];
  // Mapeo básico tag→genre_id Jikan
  const genreMap={"Shōnen":27,"Seinen":42,"Acción":1,"Comedia":4,"Romance":22,"Horror":14,"Fantasy":10,"Sci-Fi":24,"Sobrenatural":37,"Deportes":30,"Thriller":41,"Mecha":18,"Slice of Life":36,"Isekai":62};
  const genreId=genreMap[tag]||27;
  try{
    const res=await fetch(`https://api.jikan.moe/v4/${jikanType}?genres=${genreId}&order_by=score&sort=desc&limit=10`);
    if(!res.ok)return[];
    const json=await res.json();
    (json.data||[]).forEach(item=>{
      const t=(item.title_english||item.title||"").toLowerCase();
      if(!existingTitles.has(t)&&results.length<6){
        results.push({
          id:item.mal_id,
          title:item.title_english||item.title,
          score:item.score||0,
          tag:tag,
          reason:`Ya que te gusta "${tag}" en ${type==="manga"?"tu manga":"tu anime"}`,
          image:item.images?.jpg?.image_url||""
        });
      }
    });
  }catch(e){console.warn("p28 reco fetch:",e);}
  return results;
}
