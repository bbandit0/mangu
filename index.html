/* â”€â”€ ANIMACIÃ“N +1 DOPAMINA â”€â”€ */
.p28-anim-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.p28-plus-main{font-size:86px;font-weight:900;font-family:'Space Mono',monospace;line-height:1;animation:p28Main .75s cubic-bezier(.175,.885,.32,1.275) forwards;filter:drop-shadow(0 0 20px currentColor)}
.p28-plus-sub{font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;animation:p28Sub .75s ease forwards;animation-delay:.08s;opacity:0;backdrop-filter:blur(4px);background:rgba(0,0,0,.3);padding:4px 14px;border-radius:20px}
@keyframes p28Main{
  0%{transform:scale(.2) translateY(20px) rotate(-8deg);opacity:0}
  15%{transform:scale(1.45) translateY(0) rotate(3deg);opacity:1}
  55%{transform:scale(1.08) translateY(-8px) rotate(0deg);opacity:1}
  100%{transform:scale(.7) translateY(-55px) rotate(2deg);opacity:0}
}
@keyframes p28Sub{
  0%{opacity:0;transform:translateY(10px) scale(.9)}
  20%{opacity:1;transform:translateY(0) scale(1)}
  70%{opacity:1}
  100%{opacity:0;transform:translateY(-28px) scale(.95)}
}
.p28-particle{position:fixed;pointer-events:none;animation:p28Particle .85s cubic-bezier(.25,.46,.45,.94) forwards}
@keyframes p28Particle{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}
  60%{opacity:.8}
  100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0) rotate(var(--rot,180deg))}
}
.p28-ring{position:fixed;border-radius:50%;pointer-events:none;border:2px solid currentColor;animation:p28Ring .6s ease-out forwards}
@keyframes p28Ring{
  0%{transform:translate(-50%,-50%) scale(0);opacity:.9}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0}
}
@keyframes p29Confetti{
  0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}
  60%{opacity:1}
  100%{opacity:0;transform:translate(var(--px),var(--py)) rotate(var(--rot)) scale(.4)}
}

async function loadFromCloud(){if(!fbUser||!fbDb)return;try{const doc=await fbDb.collection("users").doc(fbUser.uid).get();if(doc.exists&&doc.data().data){const c=doc.data().data;["manga","anime"].forEach(t=>{if(c[t])c[t]=c[t].map(migrate);});data=c;saveLocal();render();showToast("âœ“ Sincronizado");setTimeout(()=>checkUpToDateNewChapters(),4000);}else{await saveToCloud();showToast("Datos subidos a la nube");}if(fbUnsub)fbUnsub();fbUnsub=fbDb.collection("users").doc(fbUser.uid).onSnapshot(snap=>{if(!snap.exists)return;const d=snap.data().data;if(!d)return;["manga","anime"].forEach(t=>{if(d[t])d[t]=d[t].map(migrate);});data=d;saveLocal();render();});if(fbUnsubFriends)fbUnsubFriends();fbUnsubFriends=fbDb.collection("users").doc(fbUser.uid).collection("friends_received").onSnapshot(snap=>{const prev=pendingRequestsCount;pendingRequestsCount=snap.size;const badge=document.getElementById("friends-badge");if(badge){badge.textContent=pendingRequestsCount>9?"9+":pendingRequestsCount;badge.style.display=pendingRequestsCount>0?"flex":"none";}if(tab==="friends"&&document.getElementById("friends-panel-container")){renderFriendsPanel();}if(pendingRequestsCount>prev&&document.readyState==="complete"){showToast("ðŸ“¨ Nueva solicitud de amistad");}},err=>{console.warn("friends_received listener:",err.message);});}catch(e){console.warn("Cloud load:",e);}}

// â”€â”€ COVER URL CACHE: maps title â†’ HTTP cover URL fetched from Jikan â”€â”€
const _coverUrlCache=new Map();
async function fnFetchCoverUrl(title,type="manga"){
  if(!title) return "";
  const key=(type+":"+title).toLowerCase().trim();
  if(_coverUrlCache.has(key)){const v=_coverUrlCache.get(key);return v==="pending"?"":v;}
  _coverUrlCache.set(key,"pending");
  try{
    // Try the given type first, then the other
    const endpoints=[type==="manga"?"manga":"anime",type==="manga"?"anime":"manga"];
    for(const ep of endpoints){
      const r=await fetch(`https://api.jikan.moe/v4/${ep}?q=${encodeURIComponent(title)}&limit=1`);
      if(r.ok){
        const d=await r.json();
        const url=d?.data?.[0]?.images?.jpg?.image_url||"";
        if(url){_coverUrlCache.set(key,url);return url;}
      }
    }
    _coverUrlCache.set(key,"");return "";
  }catch(e){_coverUrlCache.set(key,"");return "";}
}


// Compress base64 cover to small thumbnail for Firestore (~2KB)
function compressCoverForProfile(dataUrl){
  return new Promise(resolve=>{
    if(!dataUrl||dataUrl.startsWith("http")){resolve(dataUrl||"");return;}
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      c.width=40;c.height=57;
      c.getContext("2d").drawImage(img,0,0,40,57);
      resolve(c.toDataURL("image/jpeg",0.55));
    };
    img.onerror=()=>resolve("");
    img.src=dataUrl;
  });
}
async function fnSaveMyPublicProfile(){
  if(!fbUser||!fbDb) return;
  const uid=fbUser.uid;
  const mangaCount=data.manga.length;
  const animeCount=data.anime.length;
  const compressAll=async(list)=>Promise.all(list.map(async s=>({
    title:s.title,completed:s.completed.length,total:s.total,
    lastChapter:s.completed.length>0?Math.max(...s.completed):0,
    cover:await compressCoverForProfile(s.cover),
    status:s.status,lastUpdated:s.lastUpdated||0
  })));
  const topMangaRaw=data.manga.filter(s=>s.status==="reading")
    .sort((a,b)=>(b.lastUpdated||0)-(a.lastUpdated||0)).slice(0,5);
  const topAnimeRaw=data.anime.filter(s=>s.status==="reading")
    .sort((a,b)=>(b.lastUpdated||0)-(a.lastUpdated||0)).slice(0,5);
  const topManga=await compressAll(topMangaRaw);
  const topAnime=await compressAll(topAnimeRaw);
  const allManga=await compressAll(data.manga);
  const allAnime=await compressAll(data.anime);
  // Nota: usamos merge:true para no sobreescribir el username si ya existe
  try{
    await fbDb.collection("public_profiles").doc(uid).set({
      uid,
      displayName:fbUser.displayName||"",
      avatarUrl:fbUser.photoURL||"",
      mangaCount,animeCount,topManga,topAnime,allManga,allAnime,
      lastActive:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
  }catch(e){console.warn("fnSaveMyPublicProfile:",e);}
}

async function fnRegisterUsername(username){
  if(!fbUser||!fbDb) return {ok:false,msg:"Debes iniciar sesion"};
  const clean=username.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(clean.length<3) return {ok:false,msg:"Minimo 3 caracteres (letras, numeros, _)"};
  if(clean.length>20) return {ok:false,msg:"Maximo 20 caracteres"};
  try{
    // Verificar si username ya existe
    let checkDoc=null;
    try{
      checkDoc=await fbDb.collection("usernames").doc(clean).get();
    }catch(readErr){
      if(readErr.code==="permission-denied"){
        return {ok:false,msg:"Error de permisos â€” publica las reglas de Firestore (boton Publicar en la consola)"};
      }
      console.warn("check username read failed:",readErr.code);
    }
    if(checkDoc&&checkDoc.exists){
      // Si el doc existe y ya le pertenece a este usuario, permitir re-registro
      if(checkDoc.data().uid!==fbUser.uid){
        return {ok:false,msg:"Ese username ya esta tomado"};
      }
    }
    // Escribir el username â€” set() puro: si no existe = CREATE, si ya es del mismo user = OVERWRITE (permitido por la regla update)
    await fbDb.collection("usernames").doc(clean).set({
      uid:fbUser.uid,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    // Escribir el perfil publico con merge:false para set completo
    await fbDb.collection("public_profiles").doc(fbUser.uid).set({
      uid:fbUser.uid,username:clean,
      displayName:fbUser.displayName||"",
      avatarUrl:fbUser.photoURL||"",
      mangaCount:data.manga.length,animeCount:data.anime.length,
      topManga:[],topAnime:[],allManga:[],allAnime:[],
      lastActive:firebase.firestore.FieldValue.serverTimestamp()
    });
    // Actualizar cache inmediatamente para que el siguiente render no lea Firestore
    friendsState.cachedUsername=clean;
    friendsState.usernameCacheUid=fbUser.uid;
    return {ok:true};
  }catch(e){
    console.error("fnRegisterUsername error:",e.code,e.message);
    if(e.code==="permission-denied"){
      return {ok:false,msg:"Error de permisos â€” ve a Firebase Console â†’ Firestore â†’ Reglas y haz clic en Publicar"};
    }
    return {ok:false,msg:"Error: "+e.message};
  }
}

async function fnGetMyUsername(forceRefresh=false){
  if(!fbUser||!fbDb) return null;
  // Usar cache si pertenece al mismo usuario y no se fuerza refresco
  if(!forceRefresh && friendsState.cachedUsername!==null && friendsState.usernameCacheUid===fbUser.uid){
    return friendsState.cachedUsername;
  }
  try{
    const doc=await fbDb.collection("public_profiles").doc(fbUser.uid).get();
    const username=doc.exists?doc.data().username||null:null;
    friendsState.cachedUsername=username;
    friendsState.usernameCacheUid=fbUser.uid;
    return username;
  }catch(e){return null;}
}

async function fnSearchUser(username){
  if(!fbDb||!fbUser) return null;
  const clean=username.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(!clean) return null;
  try{
    const doc=await fbDb.collection("usernames").doc(clean).get();
    if(!doc.exists) return "not-found";
    const uid=doc.data().uid;
    if(uid===fbUser.uid) return "self";
    const profile=await fbDb.collection("public_profiles").doc(uid).get();
    if(!profile.exists) return "not-found";
    return {uid,profile:profile.data()};
  }catch(e){
    if(e.code==="permission-denied") return "perm-error";
    return null;
  }
}

async function fnSendRequest(toUid){
  if(!fbUser||!fbDb) return {ok:false,msg:"Sin sesion"};
  try{
    // Verificar que yo tengo username registrado (requerido para que el receptor pueda identificarme)
    const myProfile=await fbDb.collection("public_profiles").doc(fbUser.uid).get();
    const myUsername=myProfile.exists?myProfile.data().username||"":"";
    if(!myUsername) return {ok:false,msg:"Debes registrar tu @username antes de agregar amigos"};

    let isFriend=false,hasSent=false,hasReceived=false;
    try{
      const existing=await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(toUid).get();
      isFriend=existing.exists;
      const sentCheck=await fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid).get();
      hasSent=sentCheck.exists;
      // TambiÃ©n verificar si ese usuario ya me enviÃ³ solicitud (aceptar directamente)
      const recvCheck=await fbDb.collection("users").doc(fbUser.uid).collection("friends_received").doc(toUid).get();
      hasReceived=recvCheck.exists;
    }catch(readErr){console.warn("send request pre-check:",readErr.code);}
    if(isFriend) return {ok:false,msg:"Ya son amigos"};
    if(hasSent) return {ok:false,msg:"Solicitud ya enviada"};
    if(hasReceived) return {ok:false,msg:"Ese usuario ya te enviÃ³ solicitud â€” acÃ©ptala desde tu panel de solicitudes"};

    const ts=firebase.firestore.FieldValue.serverTimestamp();
    // Escribir en mi colecciÃ³n friends_sent
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid).set({
      toUid,ts,status:"pending"
    });
    // Escribir en la colecciÃ³n friends_received del destinatario
    // (requiere regla Firestore: allow create si request.auth.uid == fromUid)
    await fbDb.collection("users").doc(toUid).collection("friends_received").doc(fbUser.uid).set({
      fromUid:fbUser.uid,ts,status:"pending",
      displayName:fbUser.displayName||fbUser.email||"",
      username:myUsername,
      avatarUrl:fbUser.photoURL||""
    });
    return {ok:true};
  }catch(e){
    if(e.code==="permission-denied"){
      return {ok:false,msg:"Error de permisos â€” asegÃºrate de haber publicado las reglas de Firestore correctamente"};
    }
    return {ok:false,msg:"Error: "+e.message};
  }
}

async function fnSyncAcceptedRequests(){
  // Para cada solicitud enviada, verifica si el receptor ya la aceptÃ³
  // (es decir, si yo aparezco en su friends_accepted)
  // Si es asÃ­, me agrego a mÃ­ mismo como amigo y limpio la solicitud enviada
  if(!fbUser||!fbDb) return;
  try{
    const sentSnap=await withTimeout(fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").get());
    for(const doc of sentSnap.docs){
      const toUid=doc.id;
      try{
        // Intenta leer si el receptor me tiene en su friends_accepted
        const acceptedDoc=await fbDb.collection("users").doc(toUid).collection("friends_accepted").doc(fbUser.uid).get();
        if(acceptedDoc.exists){
          // Â¡Fue aceptado! Agregar a mis amigos y limpiar la solicitud enviada
          const theirProfile=await fbDb.collection("public_profiles").doc(toUid).get();
          const ts=firebase.firestore.FieldValue.serverTimestamp();
          await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(toUid).set({
            since:ts,uid:toUid,
            displayName:theirProfile.exists?theirProfile.data().displayName||"":"",
            username:theirProfile.exists?theirProfile.data().username||"":"",
            avatarUrl:theirProfile.exists?theirProfile.data().avatarUrl||"":""
          });
          await fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid).delete();
          showToast("âœ“ Â¡"+( theirProfile.exists?theirProfile.data().displayName||"Usuario":"Usuario")+" aceptÃ³ tu solicitud!");
        }
      }catch(e){/* puede fallar por permisos si la otra persona no aceptÃ³ aÃºn */}
    }
  }catch(e){console.warn("fnSyncAcceptedRequests:",e.message);}
}

async function fnAcceptRequest(fromUid,fromData){
  if(!fbUser||!fbDb) return;
  try{
    const ts=firebase.firestore.FieldValue.serverTimestamp();
    const myProfile=await fbDb.collection("public_profiles").doc(fbUser.uid).get();
    const myUsername=myProfile.exists?myProfile.data().username:"";

    // Solo escribimos en NUESTRAS propias colecciones (sin escritura cruzada)
    // 1. Agregar el remitente a MI lista de amigos aceptados
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(fromUid).set({
      since:ts,uid:fromUid,
      displayName:fromData.displayName||"",username:fromData.username||"",avatarUrl:fromData.avatarUrl||""
    });
    // 2. Eliminar la solicitud de MI friends_received
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_received").doc(fromUid).delete();
    // 3. Escribir en MI friends_accepted un marcador especial que el remitente puede leer
    //    para saber que fue aceptado (Ã©l lo detecta vÃ­a su propia friends_sent â†’ estado "accepted")
    // 4. Actualizar el estado en MI friends_sent del remitente hacia mÃ­
    //    â€” NO podemos escribir en el doc del remitente sin reglas especiales,
    //    por eso usamos su public_profile para notificarle indirectamente.
    //    El remitente, al hacer Sync o abrir el panel, verÃ¡ que estÃ¡ en friends_accepted del receptor.

    // Intentar limpiar su friends_sent (puede fallar por permisos â€” no es crÃ­tico)
    try{
      await fbDb.collection("users").doc(fromUid).collection("friends_sent").doc(fbUser.uid).delete();
    }catch(e){console.warn("No se pudo limpiar friends_sent del remitente:",e.code);}

    // Intentar escribir en su friends_accepted (puede fallar por permisos)
    try{
      await fbDb.collection("users").doc(fromUid).collection("friends_accepted").doc(fbUser.uid).set({
        since:ts,uid:fbUser.uid,
        displayName:fbUser.displayName||"",username:myUsername,avatarUrl:fbUser.photoURL||""
      });
    }catch(e){console.warn("No se pudo escribir friends_accepted del remitente:",e.code);}

    showToast("âœ“ Â¡Amigo agregado!");
    friendsState.searchResult=null;
    renderFriendsPanel();
  }catch(e){
    console.error("fnAcceptRequest error:",e.code,e.message);
    showToast("Error al aceptar: "+(e.code||e.message));
  }
}

async function fnRejectRequest(fromUid){
  if(!fbUser||!fbDb) return;
  try{
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_received").doc(fromUid).delete();
    try{
      await fbDb.collection("users").doc(fromUid).collection("friends_sent").doc(fbUser.uid).delete();
    }catch(e){console.warn("No se pudo limpiar friends_sent del remitente:",e.code);}
    renderFriendsPanel();
  }catch(e){showToast("Error al rechazar: "+e.message);}
}

async function fnCancelRequest(toUid){
  if(!fbUser||!fbDb) return;
  try{
    const batch=fbDb.batch();
    batch.delete(fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid));
    batch.delete(fbDb.collection("users").doc(toUid).collection("friends_received").doc(fbUser.uid));
    await batch.commit();
    showToast("Solicitud cancelada");
    renderFriendsPanel();
  }catch(e){showToast("Error al cancelar: "+e.message);}
}

async function fnRemoveFriend(friendUid){
  if(!fbUser||!fbDb) return;
  try{
    // Eliminamos NUESTRO propio friends_accepted (no necesitamos tocar el del otro)
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(friendUid).delete();
    // Intentar eliminar el nuestro del lado del amigo (puede fallar por permisos â€” no crÃ­tico)
    try{
      await fbDb.collection("users").doc(friendUid).collection("friends_accepted").doc(fbUser.uid).delete();
    }catch(e){console.warn("No se pudo limpiar friends_accepted del otro usuario:",e.code);}
    friendsState.view="list";friendsState.viewingUid=null;friendsState.viewingData=null;
    showToast("Amigo eliminado");
    renderFriendsPanel();
  }catch(e){showToast("Error al eliminar: "+e.message);}
}

// Helper: timeout para cualquier promesa de Firestore (evita cuelgues infinitos)
function withTimeout(promise,ms=8000){
  return Promise.race([
    promise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),ms))
  ]);
}

// FunciÃ³n central para obtener el nÃºmero del Ãºltimo capÃ­tulo/episodio publicado.
// Intenta mÃºltiples endpoints y nunca pide al usuario si puede evitarlo.
async function jikanFetchJSON(url,retries=3){
  let waitMs=500;
  for(let i=0;i<retries;i++){
    try{
      const res=await fetch(url);
      if(res.status===429){
        await new Promise(r=>setTimeout(r,waitMs));
        waitMs=Math.min(waitMs*2,3000);
        continue;
      }
      if(!res.ok) return null;
      return await res.json();
    }catch(e){
      await new Promise(r=>setTimeout(r,waitMs));
      waitMs=Math.min(waitMs*2,3000);
    }
  }
  return null;
}

// fetch simple con 1 retry en 429 (rate limit Jikan)
async function jikanFetchFast(url){
  try{
    const res=await fetch(url);
    if(res.status===429){
      // Esperar 1.2s y reintentar una vez
      await new Promise(r=>setTimeout(r,1200));
      const res2=await fetch(url);
      if(!res2.ok) return null;
      return await res2.json();
    }
    if(!res.ok) return null;
    return await res.json();
  }catch(e){return null;}
}

// â”€â”€ Fuente 1: Jikan endpoint individual (solo funciona para obras FINALIZADAS) â”€â”€
async function _srcJikanIndividual(malId, type){
  try{
    const ep=type==="manga"?"manga":"anime";
    const d=await jikanFetchFast(`https://api.jikan.moe/v4/${ep}/${malId}`);
    const cnt=type==="manga"?(d?.data?.chapters||0):(d?.data?.episodes||0);
    return cnt||0;
  }catch(e){return 0;}
}

// â”€â”€ Fuente 2: Jikan /chapters o /episodes con paginaciÃ³n â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function _srcJikanPaged(malId, type){
  try{
    const ep=type==="manga"?"manga":"anime";
    const field=type==="manga"?"chapters":"episodes";
    const d=await jikanFetchFast(`https://api.jikan.moe/v4/${ep}/${malId}/${field}?page=1`);
    if(!d||!Array.isArray(d.data)||!d.data.length) return 0;
    const tot=d.pagination?.items?.total||0;
    if(tot>0) return tot;
    const lp=d.pagination?.last_visible_page||1;
    if(lp<=1){
      const last=d.data[d.data.length-1];
      return jikanExtractPublishedNumber(last,type)||d.data.length;
    }
    // Ir a la Ãºltima pÃ¡gina
    const dL=await jikanFetchFast(`https://api.jikan.moe/v4/${ep}/${malId}/${field}?page=${lp}`);
    if(dL?.data?.length){
      const totL=dL.pagination?.items?.total||0;
      if(totL>0) return totL;
      const last=dL.data[dL.data.length-1];
      const n=jikanExtractPublishedNumber(last,type);
      return n>0?n:(lp-1)*100+dL.data.length;
    }
    return (lp-1)*100+d.data.length;
  }catch(e){return 0;}
}

// â”€â”€ Fuente 3: AniList GraphQL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function _srcAniList(malId, type){
  try{
    const mediaType=type==="manga"?"MANGA":"ANIME";
    const fields=type==="manga"
      ?"chapters volumes status"
      :"episodes status nextAiringEpisode{episode}";
    const query=`{Media(idMal:${malId},type:${mediaType}){${fields}}}`;
    const res=await fetch("https://graphql.anilist.co",{
      method:"POST",
      headers:{"Content-Type":"application/json","Accept":"application/json"},
      body:JSON.stringify({query})
    });
    if(!res.ok) return 0;
    const json=await res.json();
    const media=json?.data?.Media;
    if(!media) return 0;
    if(type==="manga") return media.chapters||0;
    if(media.nextAiringEpisode?.episode>0) return media.nextAiringEpisode.episode-1;
    return media.episodes||0;
  }catch(e){return 0;}
}

// â”€â”€ Fuente 4: MangaDex (SOLO para manga) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Estrategia: buscar por MAL ID directo â†’ fallback por tÃ­tulo â†’ lastChapter o aggregate
async function _srcMangaDex(malId, title){
  try{
    // Primero: intentar bÃºsqueda directa por MAL ID via tÃ­tulo (limit 20 para mayor cobertura)
    const q=encodeURIComponent((title||"").slice(0,80));
    if(!q) return 0;
    const url=`https://api.mangadex.org/manga?title=${q}&limit=20&includes[]=none`
      +`&contentRating[]=safe&contentRating[]=suggestive&contentRating[]=erotica&contentRating[]=pornographic`
      +`&order[relevance]=desc`;
    const res=await fetch(url,{headers:{"Accept":"application/json"}});
    if(!res.ok) return 0;
    const items=(await res.json())?.data||[];
    const malStr=String(malId);

    // Buscar match exacto por MAL ID en links.mal
    let exactId=null;
    for(const it of items){
      if(String(it?.attributes?.links?.mal||"")===malStr){
        const lc=it.attributes?.lastChapter;
        if(lc&&lc!=="none"&&lc!==""){const n=Math.floor(parseFloat(lc));if(n>0)return n;}
        exactId=it.id; // guardar ID aunque lastChapter sea null
        break;
      }
    }

    // FIX: si hay match exacto por MAL ID, usarlo para aggregate (antes usaba items[0] por error)
    // Si no hay match exacto, usar el primer resultado como fallback
    const mdxId=exactId||items[0]?.id;
    if(!mdxId) return 0;

    // aggregate sin filtro de idioma para cubrir todos los capÃ­tulos publicados globalmente
    const aggRes=await fetch(`https://api.mangadex.org/manga/${mdxId}/aggregate`,
      {headers:{"Accept":"application/json"}});
    if(!aggRes.ok) return 0;
    const vols=(await aggRes.json())?.volumes||{};
    let max=0;
    for(const vol of Object.values(vols)){
      for(const k of Object.keys(vol?.chapters||{})){
        if(k==="none"||k==="")continue;
        const n=parseFloat(k);
        if(!isNaN(n)&&n>max) max=n;
      }
    }
    return max>0?Math.floor(max):0;
  }catch(e){return 0;}
}

// â”€â”€ Fuente 5: MangaDex bÃºsqueda directa por MAL ID â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function _srcMangaDexByMalId(malId){
  try{
    // Usar encodeURIComponent para brackets â€” mÃ¡s compatible con proxies/CDN
    const url="https://api.mangadex.org/manga?"+
      "links%5Bmal%5D="+encodeURIComponent(String(malId))+"&limit=5&includes%5B%5D=none"+
      "&contentRating%5B%5D=safe&contentRating%5B%5D=suggestive"+
      "&contentRating%5B%5D=erotica&contentRating%5B%5D=pornographic";
    const res=await fetch(url,{headers:{"Accept":"application/json"}});
    if(!res.ok) return 0;
    const items=(await res.json())?.data||[];
    if(!items.length) return 0;
    const it=items[0];
    // lastChapter es null para obras japonesas activas en MangaDex
    // (scanlations no = no hay lastChapter). Ir directo al aggregate.
    const lc=it.attributes?.lastChapter;
    if(lc&&lc!=="none"&&lc!==""&&lc!==null){
      const n=Math.floor(parseFloat(lc));
      if(n>0)return n;
    }
    const aggRes=await fetch(`https://api.mangadex.org/manga/${it.id}/aggregate`,
      {headers:{"Accept":"application/json"}});
    if(!aggRes.ok) return 0;
    const vols=(await aggRes.json())?.volumes||{};
    let max=0;
    for(const vol of Object.values(vols)){
      for(const k of Object.keys(vol?.chapters||{})){
        if(k==="none"||k==="")continue;
        const n=parseFloat(k);
        if(!isNaN(n)&&n>max) max=n;
      }
    }
    return max>0?Math.floor(max):0;
  }catch(e){return 0;}
}

// â”€â”€ Orquestador: fuentes en paralelo, timeout 12s â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// DISEÃ‘O: Jikan rate limit = 3 req/seg. searchJikan ya usÃ³ 1 req.
// Por eso getBestCount usa SOLO 1 fuente Jikan (paged) + AniList + 2x MangaDex.
// _srcJikanIndividual se reserva como fallback secuencial si todo falla.
async function getBestCount(malId, type, rawCount, title){
  const T=12000;
  const t=ms=>new Promise(r=>setTimeout(()=>r(0),ms));
  if(type==="manga"){
    // Solo 1 request Jikan (paged), 1 AniList, 2 MangaDex â€” evita rate limit
    const [j2,al,mdx,mdx2]=await Promise.all([
      Promise.race([_srcJikanPaged(malId,"manga"),t(T)]),
      Promise.race([_srcAniList(malId,"manga"),t(T)]),
      Promise.race([_srcMangaDex(malId,title),t(T)]),
      Promise.race([_srcMangaDexByMalId(malId),t(T)])
    ]);
    const best=Math.max(rawCount||0,j2||0,al||0,mdx||0,mdx2||0);
    // Si todavÃ­a 0, intentar Jikan individual como Ãºltimo recurso
    if(best>0) return best;
    const j1=await Promise.race([_srcJikanIndividual(malId,"manga"),t(4000)]);
    return Math.max(best,j1||0);
  }else{
    const [j1,j2,al]=await Promise.all([
      Promise.race([_srcJikanIndividual(malId,"anime"),t(T)]),
      Promise.race([_srcJikanPaged(malId,"anime"),t(T)]),
      Promise.race([_srcAniList(malId,"anime"),t(T)])
    ]);
    return Math.max(rawCount||0,j1||0,j2||0,al||0);
  }
}

// Compatibilidad con llamadas existentes a jikanGetLatestCount
async function jikanGetLatestCount(malId, type, fast=false){
  const j1=await _srcJikanIndividual(malId,type);
  if(j1>0) return j1;
  return _srcJikanPaged(malId,type);
}

function jikanExtractPublishedNumber(entry,type){
  if(!entry)return 0;
  const toPosInt=v=>{
    const n=Number(v);
    return Number.isFinite(n)&&n>0?Math.floor(n):0;
  };
  // Jikan v4 /chapters endpoint devuelve el nÃºmero en campo "chapter" (string) o "mal_id"
  const direct=type==="manga"
    ? [entry.chapter,entry.chapters,entry.number,entry.no,entry.mal_id]
    : [entry.episode,entry.episodes,entry.number,entry.no,entry.mal_id];
  for(const v of direct){
    const n=toPosInt(v);
    if(n>0)return n;
  }
  const txt=String(entry.title||entry.name||entry.title_english||"");
  const tagged=txt.match(/\b(?:chapter|cap(?:[iÃ­]tulo)?|episode|ep)\s*\.?\s*#?\s*(\d+(?:\.\d+)?)/i);
  if(tagged&&tagged[1]){
    const n=toPosInt(parseFloat(tagged[1]));
    if(n>0)return n;
  }
  const loose=txt.match(/(\d+(?:\.\d+)?)/);
  if(loose&&loose[1]){
    const n=toPosInt(parseFloat(loose[1]));
    if(n>0)return n;
  }
  return 0;
}

async function searchJikan(query,tabType){
  if(!query||query.length<2){jikanResults=[];removeJikanDrop();return;}
  const ep=tabType==="manga"?"manga":"anime";
  try{
    const res=await fetch(`https://api.jikan.moe/v4/${ep}?q=${encodeURIComponent(query)}&limit=6`);
    if(!res.ok){jikanResults=[];return;}
    const json=await res.json();
    jikanResults=(json.data||[]).slice(0,6);
  }catch(e){jikanResults=[];}

  // Mostrar dropdown inmediatamente con lo que tiene Jikan (caps para finalizados conocidos)
  renderJikanDrop(tabType);

  // Enriquecer items con MangaDex+AniList+Jikan
  // Prioridad: primero los en publicaciÃ³n (son los que fallan mÃ¡s), luego finalizados
  // Concurrencia limitada a 2 para no saturar las APIs (Jikan tiene rate limit de 3 req/seg)
  const snap=[...jikanResults]; // snapshot para evitar race con nueva bÃºsqueda
  const sorted=[
    ...snap.filter(x=>tabType==="manga"?x.publishing:x.airing),
    ...snap.filter(x=>!(tabType==="manga"?x.publishing:x.airing))
  ];
  const concurrency=2;
  for(let i=0;i<sorted.length;i+=concurrency){
    const batch=sorted.slice(i,i+concurrency);
    await Promise.all(batch.map(async(item)=>{
      if(!item.mal_id)return;
      const rawCnt=tabType==="manga"?(item.chapters||0):(item.episodes||0);
      try{
        const title=item.title_english||item.title||'';
        let best=await getBestCount(item.mal_id,tabType,rawCnt,title);
        // Si todas las fuentes devuelven 0, intentar Jikan /chapters como Ãºltimo recurso (con retry)
        if(!best){
          try{best=await jikanGetLatestCount(item.mal_id,tabType,false);}catch(e){}
        }
        // Solo actualizar si el item sigue en la lista actual
        const live=jikanResults.find(x=>x.mal_id===item.mal_id);
        if(!live)return;
        live._latestChapter=best; // 0=sin dato confirmado, >0=encontrado
        renderJikanDrop(tabType);
      }catch(e){
        const live=jikanResults.find(x=>x.mal_id===item.mal_id);
        if(live){live._latestChapter=0;renderJikanDrop(tabType);}
      }
    }));
  }
}

async function checkJikanUpdates(){

          const res=await fetch(`https://api.jikan.moe/v4/${ep}/${series.jikanId}`);

          count=jkCnt||0;
        }catch(e1){}

        if(!count || count<1){
          const alCnt=await _srcAniList(series.jikanId,tabKey);
          if(alCnt>0)count=alCnt;
        }

        if(shouldUpdate){
          series.total=count;
          series.jikanPublishing=stillPub;
          series.lastUpdated=Date.now();

// â”€â”€ P2.9: SONIDO +1 (Web Audio API) â”€â”€
let _p29AudioCtx=null;
function p29PlayTick(){
  try{
    if(!_p29AudioCtx){_p29AudioCtx=new(window.AudioContext||window.webkitAudioContext)();}
    const ctx=_p29AudioCtx;
    const now=ctx.currentTime;
    // Sonido tipo xilofÃ³n/campana: frecuencias armÃ³nicas suaves (dopaminÃ©rgico)
    const notes=[880,1108,1320]; // La5 + Do#6 + Mi6 (acorde mayor brillante)
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      const filter=ctx.createBiquadFilter();
      filter.type="lowpass";
      filter.frequency.value=3000;
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.type="sine";
      osc.frequency.setValueAtTime(freq,now+i*0.045);
      // Envolvente ADSR muy suave: attack rÃ¡pido, decay largo, sin sustain
      const vol=i===0?0.18:i===1?0.12:0.08;
      gain.gain.setValueAtTime(0,now+i*0.045);
      gain.gain.linearRampToValueAtTime(vol,now+i*0.045+0.012);
      gain.gain.exponentialRampToValueAtTime(0.001,now+i*0.045+0.38);
      osc.start(now+i*0.045);
      osc.stop(now+i*0.045+0.4);
    });
    // Sub-capa armÃ³nica grave suave para calidez
    const sub=ctx.createOscillator();
    const subGain=ctx.createGain();
    sub.connect(subGain);
    subGain.connect(ctx.destination);
    sub.type="sine";
    sub.frequency.setValueAtTime(220,now);
    subGain.gain.setValueAtTime(0.04,now);
    subGain.gain.exponentialRampToValueAtTime(0.001,now+0.25);
    sub.start(now);
    sub.stop(now+0.28);
  }catch(e){}
}

  // PartÃ­culas mixtas: cÃ­rculos + rectÃ¡ngulos
  for(let i=0;i<22;i++){
    const p=document.createElement("div");
    p.className="p28-particle";
    const angle=(i/22)*360+(Math.random()-0.5)*25;
    const dist=70+Math.random()*90;
    const px=Math.cos(angle*Math.PI/180)*dist+"px";
    const py=Math.sin(angle*Math.PI/180)*dist+"px";
    const isRect=i%3===0;
    const sz=isRect?`width:${4+Math.random()*4}px;height:${8+Math.random()*8}px;border-radius:2px`:`width:${5+Math.random()*5}px;height:${5+Math.random()*5}px;border-radius:50%`;
    const rot=(Math.random()*360)+"deg";
    p.style.cssText=`left:${cx}px;top:${cy}px;${sz};--px:${px};--py:${py};--rot:${rot};background:${colors[i%colors.length]};animation-delay:${Math.random()*60}ms;transform-origin:center`;
    document.body.appendChild(p);
  }
  setTimeout(()=>{ov.remove();document.querySelectorAll(".p28-particle,.p28-ring").forEach(e=>e.remove());},950);
}

async function p28FetchReco(tags,type){
  if(!tags||tags.length===0)return[];
  const jikanType=type==="manga"?"manga":"anime";
  const existingTitles=new Set([...data.manga,...data.anime].map(s=>s.title.toLowerCase()));
  const results=[];
  const tag=tags[Math.floor(Math.random()*tags.length)];
  // Mapeo bÃ¡sico tagâ†’genre_id Jikan
  const genreMap={"ShÅnen":27,"Seinen":42,"AcciÃ³n":1,"Comedia":4,"Romance":22,"Horror":14,"Fantasy":10,"Sci-Fi":24,"Sobrenatural":37,"Deportes":30,"Thriller":41,"Mecha":18,"Slice of Life":36,"Isekai":62};
  const genreId=genreMap[tag]||27;
  try{
    const res=await fetch(`https://api.jikan.moe/v4/${jikanType}?genres=${genreId}&order_by=score&sort=desc&limit=10`);
    if(!res.ok)return[];
    const json=await res.json();
    (json.data||[]).forEach(item=>{
      const t=(item.title_english||item.title||"").toLowerCase();
      if(!existingTitles.has(t)&&results.length<6){
        results.push({
          id:item.mal_id,
          title:item.title_english||item.title,
          score:item.score||0,
          tag:tag,
          reason:`Ya que te gusta "${tag}" en ${type==="manga"?"tu manga":"tu anime"}`,
          image:item.images?.jpg?.image_url||""
        });
      }
    });
  }catch(e){console.warn("p28 reco fetch:",e);}
  return results;
}

function p28RenderQuickReadFAB(){

  const reading=[
    ...data.manga.filter(s=>s.status==="reading").map(s=>({...s,_type:"manga"})),

      const x=data[type].find(z=>z.id===s.id);
      if(!x||!nc)return;
      x.completed.push(nc);x.completed.sort((a,b)=>a-b);x.lastUpdated=Date.now();

      else if(x.status==="plan")x.status="reading";
      p28TouchStreak();const _fabStreak=p28GetStreak();p29PlayTick();p29BumpGoal();save();
      p28ShowPlusAnim(type,x.title,_fabStreak);
      item.querySelector(".qr-item-prog").textContent=`${lbl}. ${x.completed.length}/${x.total}`;
      showToast(`${type==="manga"?"Cap.":"Ep."} ${nc} âœ“`);
    });
    item.appendChild(btn);
    panel.appendChild(item);
  });

  const toggle=document.createElement("button");
  toggle.className="qr-toggle";
  toggle.title="Lectura rÃ¡pida";
  toggle.innerHTML="âš¡";
  toggle.addEventListener("click",e=>{e.stopPropagation();panel.classList.toggle("open");});
  document.addEventListener("click",e=>{if(!fab.contains(e.target))panel.classList.remove("open");},{passive:true});

  fab.appendChild(panel);
  fab.appendChild(toggle);
  document.body.appendChild(fab);
}
