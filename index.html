.patch-panel{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:14px 16px;margin-bottom:16px;animation:slideDown .2s}.patch-panel h3{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:10px;font-family:'Space Mono',monospace;letter-spacing:1px}.patch-version{margin-bottom:12px;border-bottom:1px solid var(--bd);padding-bottom:10px}.patch-version:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}.patch-ver-tag{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--am);background:var(--amd);border:1px solid var(--am);border-radius:10px;padding:2px 8px;display:inline-block;margin-bottom:6px}.patch-ver-items{list-style:none;padding:0;margin:0}.patch-ver-items li{font-size:11px;color:var(--t2);padding:2px 0;padding-left:12px;position:relative}.patch-ver-items li::before{content:"→";position:absolute;left:0;color:var(--t3)}
/* ── REWATCH BADGE ── */
.sbadge.rewatch{background:rgba(139,92,246,.15);color:#8b5cf6}.rewatch-btn.active{color:#8b5cf6!important;border-color:rgba(139,92,246,.4)!important;background:rgba(139,92,246,.12)!important}
/* ── CHAR COLLAPSIBLE ── */
.char-details{margin-top:6px}.char-details summary{font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;padding:6px 8px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);list-style:none;display:flex;align-items:center;gap:6px;user-select:none}.char-details summary::-webkit-details-marker{display:none}.char-details summary::before{content:"▶";font-size:9px;color:var(--t3);transition:.15s}.char-details[open] summary::before{content:"▼"}
/* ── COVER COLLAPSIBLE ── */
.cover-toggle{cursor:pointer;font-size:11px;font-weight:600;color:var(--t2);background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:5px 10px;display:inline-flex;align-items:center;gap:5px;transition:.15s}.cover-toggle:hover{color:var(--t1);background:var(--bg4)}.cover-collapsed{display:none}
/* ── CATALOG ── */
.catalog{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}.catc{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);overflow:hidden;cursor:pointer;transition:.2s;display:flex;flex-direction:column;position:relative}.catc:hover{border-color:var(--bdl);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}.catcv{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--bg2);display:block}.catph{width:100%;aspect-ratio:2/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:36px}.cati{padding:10px 12px}.catt{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.catp{font-family:'Space Mono',monospace;font-size:11px;color:var(--t2);margin-top:3px}.catb{width:100%;height:3px;background:var(--bg1);border-radius:2px;overflow:hidden;margin-top:6px}.catf{height:100%;border-radius:2px}.cat-fav{position:absolute;top:6px;right:6px;font-size:14px}.cat-score{position:absolute;top:6px;left:6px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(0,0,0,.7);color:var(--t1)}
/* ── DASHBOARD ── */
.dash{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:20px;margin-bottom:20px}.dash-t{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:16px;display:flex;align-items:center;gap:8px}.dash-g{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:500px){.dash-g{grid-template-columns:1fr}}.dash-c{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px}.dash-cl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}.dash-full{grid-column:1/-1}.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}.bar-item:last-child{margin-bottom:0}.bar-name{font-size:11px;color:var(--t2);width:100px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar-track{flex:1;height:18px;background:var(--bg1);border-radius:3px;overflow:hidden}.bar-fill{height:100%;border-radius:3px;transition:width .3s;min-width:1px}.bar-val{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);width:50px;flex-shrink:0}.donut-wrap{display:flex;justify-content:center;padding:10px 0}.donut-legend{display:flex;gap:16px;justify-content:center;margin-top:12px;flex-wrap:wrap}.donut-leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2)}.donut-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* ── NEW: Score histogram ── */
.hist-wrap{display:flex;align-items:flex-end;gap:3px;height:60px;margin-bottom:8px;padding:0 2px}
.hist-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.hist-bar{width:100%;border-radius:2px 2px 0 0;min-height:3px;transition:all .3s}
.hist-num{font-family:'Space Mono',monospace;font-size:8px;color:var(--t3);line-height:1}
/* ── NEW: Genre bars ── */
.gbar{display:flex;align-items:center;gap:8px;margin-bottom:7px}.gbar:last-child{margin-bottom:0}
.gbar-nm{font-size:11px;color:var(--t2);width:90px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gbar-tr{flex:1;height:14px;background:var(--bg1);border-radius:2px;overflow:hidden}
.gbar-fl{height:100%;border-radius:2px;transition:width .3s}
.gbar-vl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);width:20px;text-align:right;flex-shrink:0}
/* ── NEW: Best rated ── */
.ri{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--bd)}.ri:last-child{border-bottom:none}
.ri-n{font-family:'Space Mono',monospace;font-size:10px;color:var(--t3);width:16px;text-align:center;flex-shrink:0}
.ri-t{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.ri-s{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff;flex-shrink:0}
.ri-type{font-size:10px;color:var(--t3);flex-shrink:0}
/* ── NEW: Velocity / mini stat ── */
.mini-stat{text-align:center;padding:8px 0}
.mini-stat-v{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.mini-stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.dual-stat{display:flex;gap:8px;margin-top:12px}
.dual-cell{flex:1;text-align:center;padding:10px 8px;background:var(--bg3);border-radius:var(--r)}
.dual-cell-v{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;line-height:1;margin-bottom:3px}
.dual-cell-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
/* ── MODAL / TOAST ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}@keyframes fadeIn{from{opacity:0}to{opacity:1}}.modal{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:24px;max-width:360px;width:100%;text-align:center}.modal-icon{font-size:32px;margin-bottom:12px;opacity:.6}.modal-title{font-size:16px;font-weight:600;margin-bottom:6px}.modal-desc{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.5}.modal-btns{display:flex;gap:8px;justify-content:center}.mbtn{padding:10px 20px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:var(--r);transition:.15s}.mbtn:hover{background:var(--bg4);color:var(--t1)}.mbtn.dng{background:rgba(231,76,76,.15);color:var(--dng);border-color:rgba(231,76,76,.3)}.mbtn.dng:hover{background:rgba(231,76,76,.25)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--bd);border-radius:var(--rm);padding:10px 20px;font-size:13px;color:var(--t1);z-index:1001;animation:toastIn .3s;box-shadow:0 8px 32px rgba(0,0,0,.4)}@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}.hidden{display:none}
</style>

function timeInvested(){
  const mMin=data.manga.reduce((s,x)=>s+x.completed.length*8,0);
  const aMin=data.anime.reduce((s,x)=>s+x.completed.length*23,0);
  const tot=mMin+aMin;
  if(!tot)return{val:"0h",sub:"sin datos"};
  const h=Math.floor(tot/60);
  if(h>=48)return{val:`${Math.floor(h/24)}d`,sub:`${h}h totales`};
  return{val:`${h}h`,sub:`${tot%60}min adicionales`};
}
function readingRate(){
  const all=[...data.manga,...data.anime];
  if(!all.length)return"0";
  const oldest=Math.min(...all.filter(s=>s.createdAt).map(s=>s.createdAt),Date.now());
  const weeks=Math.max((Date.now()-oldest)/(7*24*3600*1000),1);
  return(all.reduce((s,x)=>s+x.completed.length,0)/weeks).toFixed(1);
}
function scoreHist(items){const h=Array(10).fill(0);items.filter(s=>s.score>0).forEach(s=>h[s.score-1]++);return h;}
function topGenres(items,n=6){
  const c={};
  items.forEach(s=>(s.tags||[]).forEach(t=>{c[t]=(c[t]||0)+1;}));
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,n);
}
function bestRated(items,n=5){return[...items].filter(s=>s.score>0).sort((a,b)=>b.score-a.score||b.completed.length-a.completed.length).slice(0,n);}
function completionRate(items){if(!items.length)return 0;return Math.round(items.filter(s=>s.status==="completed").length/items.length*100);}
function avgScore(items){const sc=items.filter(s=>s.score>0);if(!sc.length)return null;return(sc.reduce((s,x)=>s+x.score,0)/sc.length).toFixed(1);}

function markChapter(sid,n,cellEl,ac){const x=data[tab].find(z=>z.id===sid);if(!x)return;const wasRead=x.completed.includes(n);if(wasRead){x.completed=x.completed.filter(c=>c!==n);}else{for(let i=1;i<=n;i++){if(!x.completed.includes(i))x.completed.push(i);}x.completed.sort((a,b)=>a-b);}x.lastUpdated=Date.now();if(x.completed.length===x.total&&x.total>0)x.status="completed";else if(x.completed.length>0&&x.status==="plan")x.status="reading";save();if(cellEl){if(wasRead){cellEl.classList.remove("rd");cellEl.style.background="";cellEl.style.borderColor="";}else{cellEl.classList.add("rd");cellEl.style.background=ac;cellEl.style.borderColor=ac;}}const card=cellEl?.closest(".scard");if(card){const prg=card.querySelector(".sprg");if(prg)prg.textContent=`${x.completed.length}/${x.total}`;const pfill=card.querySelector(".pfill");if(pfill)pfill.style.width=`${x.total>0?(x.completed.length/x.total)*100:0}%`;}}
function doAdd(){const t=document.getElementById("add-title")?.value.trim();if(!t)return;const ni=document.getElementById("add-total");const totalVal=parseInt(ni?.value);if(!totalVal||totalVal<1){if(ni){ni.style.borderColor="var(--dng)";ni.style.boxShadow="0 0 0 3px rgba(231,76,76,.2)";}showToast("⚠️ Ingresa el número de capítulos");return;}if(ni){ni.style.borderColor="";ni.style.boxShadow="";}const now=Date.now();data[tab].push(migrate({id:now.toString(),title:t,total:totalVal,completed:[],cover:newCover||"",status:newStatus||"reading",tags:[...newTags],notes:"",score:0,favorite:false,lastUpdated:now,createdAt:now,startDate:"",endDate:"",seasons:[],characters:[]}));newCover="";newTags=[];newStatus="reading";save();render();showToast(`"${t}" agregado ✓`);}
function doUpdTotal(sid){const v=parseInt(editTotalVal);if(!v||v<1)return;const x=data[tab].find(z=>z.id===sid);if(x){x.total=v;x.completed=x.completed.filter(c=>c<=v);x.lastUpdated=Date.now();}editTotal=null;save();render();}
