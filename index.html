.mini-stat-v{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.mini-stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.dual-stat{display:flex;gap:8px;margin-top:12px}
.dual-cell{flex:1;text-align:center;padding:10px 8px;background:var(--bg3);border-radius:var(--r)}
.dual-cell-v{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;line-height:1;margin-bottom:3px}
.dual-cell-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}

let data,theme,tab="manga",search="",expanded={},viewMode="list",sortKey="recent",showSettings=false,editTotal=null,editTotalVal="",newCover="",newTags=[],newStatus="reading",filterStatus="all",filterTag="all",showFavsOnly=false;

function migrate(s){return{id:s.id,title:s.title,total:s.total||1,completed:s.completed||[],cover:s.cover||"",status:s.status||(s.completed?.length===s.total&&s.total>0?"completed":"reading"),tags:s.tags||[],notes:s.notes||"",score:s.score||0,favorite:s.favorite||false,lastUpdated:s.lastUpdated||parseInt(s.id)||Date.now(),createdAt:s.createdAt||parseInt(s.id)||Date.now(),startDate:s.startDate||"",endDate:s.endDate||"",seasons:s.seasons||[],characters:s.characters||[]};}

function filterList(list){let r=list;if(showFavsOnly)r=r.filter(s=>s.favorite);if(filterStatus!=="all")r=r.filter(s=>s.status===filterStatus);if(filterTag!=="all")r=r.filter(s=>(s.tags||[]).includes(filterTag));if(search)r=r.filter(s=>s.title.toLowerCase().includes(search.toLowerCase()));return r;}
function sortList(list){return[...list].sort((a,b)=>{switch(sortKey){case"name-asc":return a.title.localeCompare(b.title);case"name-desc":return b.title.localeCompare(a.title);case"progress-desc":{const pa=a.total>0?a.completed.length/a.total:0,pb=b.total>0?b.completed.length/b.total:0;return pb-pa;}case"progress-asc":{const pa=a.total>0?a.completed.length/a.total:0,pb=b.total>0?b.completed.length/b.total:0;return pa-pb;}case"score":return(b.score||0)-(a.score||0);case"total-desc":return b.total-a.total;case"updated":return(b.lastUpdated||0)-(a.lastUpdated||0);default:return(b.createdAt||parseInt(b.id)||0)-(a.createdAt||parseInt(a.id)||0);}});}

function timeInvested(){

  const tot=mMin+aMin;
  if(!tot)return{val:"0h",sub:"sin datos"};
  const h=Math.floor(tot/60);
  if(h>=48)return{val:`${Math.floor(h/24)}d`,sub:`${h}h totales`};
  return{val:`${h}h`,sub:`${tot%60}min adicionales`};
}
function readingRate(){
  const all=[...data.manga,...data.anime];
  if(!all.length)return"0";
  const oldest=Math.min(...all.filter(s=>s.createdAt).map(s=>s.createdAt),Date.now());
  const weeks=Math.max((Date.now()-oldest)/(7*24*3600*1000),1);
  return(all.reduce((s,x)=>s+x.completed.length,0)/weeks).toFixed(1);
}
function scoreHist(items){const h=Array(10).fill(0);items.filter(s=>s.score>0).forEach(s=>h[s.score-1]++);return h;}
function topGenres(items,n=6){
  const c={};
  items.forEach(s=>(s.tags||[]).forEach(t=>{c[t]=(c[t]||0)+1;}));
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,n);
}
function bestRated(items,n=5){return[...items].filter(s=>s.score>0).sort((a,b)=>b.score-a.score||b.completed.length-a.completed.length).slice(0,n);}

function markChapter(sid,n,cellEl,ac){const x=data[tab].find(z=>z.id===sid);if(!x)return;const wasRead=x.completed.includes(n);if(wasRead)x.completed=x.completed.filter(c=>c!==n);else{x.completed.push(n);x.completed.sort((a,b)=>a-b);}x.lastUpdated=Date.now();if(x.completed.length===x.total&&x.total>0)x.status="completed";else if(x.completed.length>0&&x.status==="plan")x.status="reading";save();if(cellEl){if(wasRead){cellEl.classList.remove("rd");cellEl.style.background="";cellEl.style.borderColor="";}else{cellEl.classList.add("rd");cellEl.style.background=ac;cellEl.style.borderColor=ac;}}const card=cellEl?.closest(".scard");if(card){const prg=card.querySelector(".sprg");if(prg)prg.textContent=`${x.completed.length}/${x.total}`;const pfill=card.querySelector(".pfill");if(pfill)pfill.style.width=`${x.total>0?(x.completed.length/x.total)*100:0}%`;}}

function doUpdTotal(sid){const v=parseInt(editTotalVal);if(!v||v<1)return;const x=data[tab].find(z=>z.id===sid);if(x){x.total=v;x.completed=x.completed.filter(c=>c<=v);x.lastUpdated=Date.now();}editTotal=null;save();render();}
