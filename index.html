  .cc-cover,.cc-cover-ph{height:128px}
  /* Catálogo: 2 columnas más pequeñas */
  .catalog{grid-template-columns:repeat(2,1fr);gap:8px}
  /* Perfil: stats compactos */
  .pubprof-stats{gap:10px}
  .pp-sc-v{font-size:20px}
}

/* ══════════════════════════════════════════════════════
   PARCHE 2.8 — CSS
   • Streak banner
   • Continuar leyendo (Netflix row)
   • Onboarding examples
   • Animación +1 (dopamina)
   • Panel Recomendaciones
   • Perfil público mejorado
   • Modo lectura rápida
══════════════════════════════════════════════════════ */

/* ── STREAK BANNER ── */
.streak-banner{display:inline-flex;align-items:center;gap:6px;padding:4px 12px 4px 8px;background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(251,191,36,.07));border:1px solid rgba(251,191,36,.3);border-radius:20px;animation:streakPop .4s cubic-bezier(.175,.885,.32,1.275);font-size:12px;font-weight:700;margin:8px 0 0;cursor:default}
@keyframes streakPop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.streak-fire{font-size:20px;animation:flamePulse .8s ease-in-out infinite alternate}
@keyframes flamePulse{from{transform:scale(1) rotate(-3deg)}to{transform:scale(1.12) rotate(3deg)}}
.streak-info{flex:1}
.streak-days{font-size:14px;font-weight:700;color:#fbbf24}
.streak-sub{font-size:10px;color:var(--t3);margin-top:2px}
.streak-count{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:#fbbf24;line-height:1}

/* ── CONTINUAR LEYENDO ── */
.continue-section{margin:16px 0 0}
.continue-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.continue-title{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:1.2px;display:flex;align-items:center;gap:6px}
.continue-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(99,179,237,.12);color:var(--am);border:1px solid rgba(99,179,237,.2)}
.continue-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.continue-row::-webkit-scrollbar{display:none}
.cc-card{flex-shrink:0;width:118px;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;overflow:hidden;position:relative;cursor:pointer;transition:.2s}
.cc-card:hover{border-color:rgba(255,255,255,.13);transform:translateY(-2px)}
.cc-cover{width:100%;height:152px;object-fit:cover;display:block;background:var(--bg3)}
.cc-cover-ph{width:100%;height:152px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;background:linear-gradient(145deg,rgba(99,179,237,.14),rgba(90,180,240,.07))}
.cc-type-badge{position:absolute;top:7px;right:7px;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;background:rgba(10,14,26,.82);color:var(--am);border:1px solid rgba(99,179,237,.3);backdrop-filter:blur(4px)}
.cc-type-badge.anime{color:var(--aa);border-color:rgba(104,211,145,.3)}
.cc-body{padding:8px 8px 7px}
.cc-title{font-size:10px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.cc-prog{font-size:9px;font-family:'Space Mono',monospace;color:var(--t3);margin-bottom:5px}
.cc-pbar{height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-bottom:7px}
.cc-pfill{height:100%;border-radius:2px}
.cc-btn{width:100%;padding:5px 0;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px;background:rgba(99,179,237,.15);color:var(--am)}
.cc-btn:hover{background:rgba(99,179,237,.26)}
.cc-btn:active{transform:scale(.93)}
.cc-btn.anime-btn{background:rgba(104,211,145,.13);color:var(--aa)}
.cc-btn.anime-btn:hover{background:rgba(104,211,145,.22)}

/* ── ONBOARDING EXAMPLES ── */
.onb-examples{margin:14px 0 0;background:linear-gradient(135deg,rgba(99,179,237,.08),rgba(155,125,255,.06));border:1px solid rgba(99,179,237,.2);border-radius:16px;padding:16px}
.onb-ex-hdr{font-size:10px;font-weight:700;color:var(--am);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.onb-ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.onb-ex-card{background:rgba(255,255,255,.04);border:1px solid rgba(99,179,237,.15);border-radius:12px;padding:11px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s}
.onb-ex-card:hover{background:rgba(99,179,237,.1);border-color:rgba(99,179,237,.35);transform:translateY(-2px);box-shadow:0 4px 16px rgba(99,179,237,.12)}
.onb-ex-card:active{transform:scale(.96)}
.onb-ex-ico{width:38px;height:52px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex-shrink:0}
.onb-ex-info{min-width:0}
.onb-ex-name{font-size:10px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.onb-ex-type{font-size:8px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.onb-ex-add{font-size:9px;color:var(--am);margin-top:3px}

/* ── ANIMACIÓN +1 DOPAMINA ── */
.p28-anim-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.p28-plus-main{font-size:86px;font-weight:900;font-family:'Space Mono',monospace;line-height:1;animation:p28Main .75s cubic-bezier(.175,.885,.32,1.275) forwards;filter:drop-shadow(0 0 20px currentColor)}
.p28-plus-sub{font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;animation:p28Sub .75s ease forwards;animation-delay:.08s;opacity:0;backdrop-filter:blur(4px);background:rgba(0,0,0,.3);padding:4px 14px;border-radius:20px}
@keyframes p28Main{
  0%{transform:scale(.2) translateY(20px) rotate(-8deg);opacity:0}
  15%{transform:scale(1.45) translateY(0) rotate(3deg);opacity:1}
  55%{transform:scale(1.08) translateY(-8px) rotate(0deg);opacity:1}
  100%{transform:scale(.7) translateY(-55px) rotate(2deg);opacity:0}
}
@keyframes p28Sub{
  0%{opacity:0;transform:translateY(10px) scale(.9)}
  20%{opacity:1;transform:translateY(0) scale(1)}
  70%{opacity:1}
  100%{opacity:0;transform:translateY(-28px) scale(.95)}
}
.p28-particle{position:fixed;pointer-events:none;animation:p28Particle .85s cubic-bezier(.25,.46,.45,.94) forwards}
@keyframes p28Particle{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}
  60%{opacity:.8}
  100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0) rotate(var(--rot,180deg))}
}
.p28-ring{position:fixed;border-radius:50%;pointer-events:none;border:2px solid currentColor;animation:p28Ring .6s ease-out forwards}
@keyframes p28Ring{
  0%{transform:translate(-50%,-50%) scale(0);opacity:.9}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0}
}
@keyframes p29Confetti{
  0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}
  60%{opacity:1}
  100%{opacity:0;transform:translate(var(--px),var(--py)) rotate(var(--rot)) scale(.4)}
}

/* ── RECOMENDACIONES ── */
.reco-section{margin:20px 0 0}
.reco-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.reco-title-wrap{display:flex;align-items:center;gap:8px}
.reco-icon-box{width:28px;height:28px;border-radius:8px;background:rgba(155,125,255,.14);border:1px solid rgba(155,125,255,.24);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.reco-label{font-size:13px;font-weight:700;color:var(--t1)}
.reco-sublabel{font-size:10px;color:var(--t3);margin-top:1px}
.reco-new-tag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(155,125,255,.14);color:var(--purple);border:1px solid rgba(155,125,255,.24)}
.reco-context{font-size:10px;color:var(--t3);margin-bottom:10px;padding:8px 10px;background:rgba(155,125,255,.06);border:1px solid rgba(155,125,255,.12);border-radius:8px;line-height:1.5}
.reco-context b{color:var(--purple)}
.reco-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.reco-row::-webkit-scrollbar{display:none}
.reco-card{flex-shrink:0;width:128px;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.reco-card:hover{border-color:rgba(155,125,255,.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(155,125,255,.1)}
.reco-card:active{transform:scale(.97)}
.reco-card-cover{width:100%;height:168px;display:flex;align-items:center;justify-content:center;font-size:48px}
.reco-card-score{position:absolute;top:7px;right:7px;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;background:rgba(10,14,26,.82);color:#fbbf24;backdrop-filter:blur(4px)}
.reco-card-body{padding:8px 10px 10px}
.reco-card-title{font-size:10px;font-weight:600;color:var(--t1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reco-card-reason{font-size:9px;color:var(--t3);line-height:1.4;margin-bottom:6px}
.reco-card-tag{font-size:8px;font-weight:700;padding:2px 6px;border-radius:6px;background:rgba(155,125,255,.11);color:var(--purple);border:1px solid rgba(155,125,255,.2)}
.reco-empty{font-size:11px;color:var(--t3);padding:14px;text-align:center}

/* ── PERFIL PÚBLICO MEJORADO ── */
/* ── PERFIL PERSONAL v4.0 ── */
.pubprof-wrap{background:var(--bg2);border:1px solid rgba(99,179,237,.18);border-radius:24px;overflow:hidden;margin-top:16px;box-shadow:0 12px 48px rgba(0,0,0,.4)}
.pubprof-cover{height:130px;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(99,179,237,.7) 0%,rgba(155,125,255,.6) 35%,rgba(104,211,145,.5) 65%,rgba(251,191,36,.4) 100%)}
.pubprof-cover::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(255,255,255,.05) 0,rgba(255,255,255,.05) 1px,transparent 1px,transparent 14px),radial-gradient(ellipse 80% 80% at 80% 50%,rgba(255,255,255,.08),transparent)}
.pubprof-cover::after{content:"";position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,var(--bg2))}
/* orbes decorativos en el cover */
.pubprof-cover-orb1{position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(rgba(99,179,237,.4),transparent 70%);top:-30px;right:40px;pointer-events:none}
.pubprof-cover-orb2{position:absolute;width:80px;height:80px;border-radius:50%;background:radial-gradient(rgba(155,125,255,.45),transparent 70%);bottom:-10px;right:10px;pointer-events:none}
.pubprof-av-wrap{position:absolute;bottom:-32px;left:20px;z-index:2}
.pubprof-av{width:72px;height:72px;border-radius:50%;border:4px solid var(--bg2);background:linear-gradient(135deg,var(--am),var(--aa));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;overflow:hidden;box-shadow:0 6px 24px rgba(99,179,237,.5),0 0 0 2px rgba(99,179,237,.3)}
.pubprof-av img{width:100%;height:100%;object-fit:cover}
.pubprof-body{padding:44px 18px 0}
/* Nombre + handle */
.pubprof-name{font-size:22px;font-weight:700;color:var(--am);font-family:"Space Mono",monospace;letter-spacing:-.5px;text-shadow:0 0 28px rgba(99,179,237,.35)}
.pubprof-handle{font-size:11px;color:var(--t3);margin-bottom:0;font-family:"Space Mono",monospace;margin-top:3px}
/* Fila de acción rápida: share + racha */
.pubprof-action-row{display:flex;align-items:center;gap:10px;margin:12px 0 16px}
.pubprof-streak-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:linear-gradient(135deg,rgba(251,191,36,.18),rgba(251,191,36,.08));border:1px solid rgba(251,191,36,.35);border-radius:20px;font-size:12px;font-weight:700;color:#fbbf24;font-family:'Space Mono',monospace;flex-shrink:0}
.pubprof-time-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;font-size:11px;font-weight:600;color:var(--t2);flex-shrink:0}
/* Stats grid horizontal con colores fuertes */
.pubprof-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:0;background:rgba(0,0,0,.2);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.pp-sc{padding:14px 8px;text-align:center;border-right:1px solid rgba(255,255,255,.06);transition:all .2s cubic-bezier(.34,1.56,.64,1);cursor:default;position:relative;overflow:hidden}
.pp-sc:last-child{border-right:none}
.pp-sc::before{content:"";position:absolute;inset:0;opacity:0;transition:.2s;background:rgba(99,179,237,.06)}
.pp-sc:hover::before{opacity:1}
.pp-sc:hover{transform:translateY(-2px)}
.pp-sc-v{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;line-height:1;display:block}
.pp-sc-l{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-top:5px;display:block}
/* Géneros favoritos */
.pubprof-genres{display:flex;flex-wrap:wrap;gap:5px;margin:14px 0}
.pubprof-genre-chip{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(99,179,237,.1);border:1px solid rgba(99,179,237,.2);color:var(--am)}
/* Sección en progreso — más visual */
.pubprof-sec-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06);margin-top:14px}
.pubprof-mini-list{display:flex;flex-direction:column;gap:0;margin-bottom:0;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.pp-mini{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.05);transition:all .18s ease;cursor:default;position:relative}
.pp-mini:last-child{border-bottom:none}
.pp-mini:hover{background:rgba(99,179,237,.07);padding-left:18px}
.pp-mini-pbar-wrap{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.04)}
.pp-mini-pbar-fill{height:100%;border-radius:0}
.pp-mini-ico{width:36px;height:52px;border-radius:6px;background:rgba(99,179,237,.12);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--am);flex-shrink:0;border:1px solid rgba(255,255,255,.08)}
.pp-mini-info{flex:1;min-width:0}
.pp-mini-title{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp-mini-prog{font-size:10px;color:var(--t3);font-family:'Space Mono',monospace;margin-top:2px}
.pp-mini-pct{font-size:9px;font-weight:700;font-family:'Space Mono',monospace;flex-shrink:0;padding:2px 7px;border-radius:8px;background:rgba(255,255,255,.06)}
/* Botón compartir — prominente y atractivo */
.pubprof-share-btn{width:100%;padding:13px;border:none;background:linear-gradient(135deg,var(--am),var(--aa));color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;border-radius:0;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.3px;margin-top:16px}
.pubprof-share-btn:hover{filter:brightness(1.12);letter-spacing:.6px}
.pubprof-share-btn:active{transform:scale(.98)}
.pubprof-share-btn-disabled{width:100%;padding:13px;border:none;background:rgba(255,255,255,.04);color:var(--t3);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;border-radius:0;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;cursor:default}

/* ── MODO LECTURA RÁPIDA ── */

.qr-item-prog{font-size:9px;color:var(--t3);font-family:'Space Mono',monospace}
.qr-plus-btn{width:30px;height:30px;border:none;border-radius:8px;background:var(--am);color:#fff;font-size:16px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.14s;font-family:'Space Mono',monospace}

/* ── SEPARADOR ── */

// ═══════════════════════════════════════════════════════════════════
// FIREBASE — CONFIGURACIÓN PARA SINCRONIZACIÓN CROSS-DEVICE

// PASOS para habilitar sync entre celular y PC:

//  1. Ir a https://console.firebase.google.com → Crear proyecto nuevo

//                         && request.resource.data.uid == request.auth.uid;

//
//  4. En Authentication → Sign-in method → Habilitar Google
//  5. En Authentication → Settings → Authorized domains → agregar:
//     bbandit0.github.io
//  6. Pegar tu config en el objeto FIREBASE_CONFIG de abajo
//  7. Subir index.html actualizado a GitHub → listo
//
// Una vez configurado: la app detecta cambios en tiempo real
// (onSnapshot) — cualquier edición en el cel se ve en el PC
// instantáneamente sin hacer nada manual.
// ═══════════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBHNVcM547Y4SK43sZuh6P-8TKtdPDxG54",
  authDomain: "manga-tracker-fad56.firebaseapp.com",
  projectId: "manga-tracker-fad56",
  storageBucket: "manga-tracker-fad56.firebasestorage.app",
  messagingSenderId: "852661427743",
  appId: "1:852661427743:web:3446004609d33c0ce0ff2a"
};
const FIREBASE_ENABLED = FIREBASE_CONFIG.apiKey !== "";
let fb=null,fbAuth=null,fbDb=null,fbUser=null,fbUnsub=null,fbUnsubFriends=null,pendingRequestsCount=0;
if(FIREBASE_ENABLED){try{fb=firebase.initializeApp(FIREBASE_CONFIG);fbAuth=firebase.auth();fbDb=firebase.firestore();
// Handle redirect result for Safari (popup blocked → redirect fallback)
fbAuth.getRedirectResult().then(result=>{if(result&&result.user){fbUser=result.user;loadFromCloud();}}).catch(()=>{});
fbAuth.onAuthStateChanged(async u=>{const prevUid=fbUser?fbUser.uid:null;fbUser=u;if(u){if(prevUid&&prevUid!==u.uid){data={manga:[],anime:[]};localStorage.removeItem("mat-v4-"+prevUid);}// FIX: Cargar username ANTES del primer render para evitar "Sin @username"
try{const doc=await fbDb.collection("public_profiles").doc(u.uid).get();if(doc.exists&&doc.data().username){friendsState.cachedUsername=doc.data().username;friendsState.usernameCacheUid=u.uid;}}catch(e){}loadFromCloud();}render();});}catch(e){console.warn("Firebase init error:",e);}}
async function signIn(){
  if(!FIREBASE_ENABLED)return showToast("Configura Firebase primero");
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    const result=await fbAuth.signInWithPopup(provider);
    if(result&&result.user){fbUser=result.user;loadFromCloud();}
  }catch(e){
    // Safari bloquea popups — usar redirect como fallback
    if(e.code==="auth/popup-blocked"||e.code==="auth/cancelled-popup-request"||e.code==="auth/popup-closed-by-user"){
      try{
        await fbAuth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());
      }catch(re){showToast("Error al iniciar sesión: "+(re.code||re.message));}
    } else {
      showToast("Error al iniciar sesión: "+(e.code||e.message));
    }
  }
}
async function signOut(){if(fbUnsub)fbUnsub();fbUnsub=null;if(fbUnsubFriends)fbUnsubFriends();fbUnsubFriends=null;pendingRequestsCount=0;friendsState.cachedUsername=null;friendsState.usernameCacheUid=null;try{const keyToRemove=getSKEY();await fbAuth.signOut();fbUser=null;localStorage.removeItem(keyToRemove);data={manga:[],anime:[]};render();}catch(e){}}
async function saveToCloud(){if(!fbUser||!fbDb)return;try{await fbDb.collection("users").doc(fbUser.uid).set({data:JSON.parse(JSON.stringify(data)),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});fnSaveMyPublicProfile().catch(()=>{});}catch(e){console.warn("Cloud save:",e);}}
async function loadFromCloud(){if(!fbUser||!fbDb)return;try{const doc=await fbDb.collection("users").doc(fbUser.uid).get();if(doc.exists&&doc.data().data){const c=doc.data().data;["manga","anime"].forEach(t=>{if(c[t])c[t]=c[t].map(migrate);});data=c;saveLocal();render();showToast("✓ Sincronizado");setTimeout(()=>checkUpToDateNewChapters(),4000);}else{await saveToCloud();showToast("Datos subidos a la nube");}if(fbUnsub)fbUnsub();fbUnsub=fbDb.collection("users").doc(fbUser.uid).onSnapshot(snap=>{if(!snap.exists)return;const d=snap.data().data;if(!d)return;["manga","anime"].forEach(t=>{if(d[t])d[t]=d[t].map(migrate);});data=d;saveLocal();render();});if(fbUnsubFriends)fbUnsubFriends();fbUnsubFriends=fbDb.collection("users").doc(fbUser.uid).collection("friends_received").onSnapshot(snap=>{const prev=pendingRequestsCount;pendingRequestsCount=snap.size;const badge=document.getElementById("friends-badge");if(badge){badge.textContent=pendingRequestsCount>9?"9+":pendingRequestsCount;badge.style.display=pendingRequestsCount>0?"flex":"none";}if(tab==="friends"&&document.getElementById("friends-panel-container")){renderFriendsPanel();}if(pendingRequestsCount>prev&&document.readyState==="complete"){showToast("📨 Nueva solicitud de amistad");}},err=>{console.warn("friends_received listener:",err.message);});}catch(e){console.warn("Cloud load:",e);}}

let friendsState={
  view:"list",
  viewingUid:null,
  viewingData:null,
  searchUsername:"",
  searchResult:null,
  searchLoading:false,
  statusMsg:"",
  statusType:"",

// Compress base64 cover to small thumbnail for Firestore (~2KB)
function compressCoverForProfile(dataUrl){
  return new Promise(resolve=>{
    if(!dataUrl||dataUrl.startsWith("http")){resolve(dataUrl||"");return;}
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      c.width=40;c.height=57;
      c.getContext("2d").drawImage(img,0,0,40,57);
      resolve(c.toDataURL("image/jpeg",0.55));
    };
    img.onerror=()=>resolve("");
    img.src=dataUrl;
  });
}
async function fnSaveMyPublicProfile(){
  if(!fbUser||!fbDb) return;
  const uid=fbUser.uid;
  const mangaCount=data.manga.length;
  const animeCount=data.anime.length;
  const compressAll=async(list)=>Promise.all(list.map(async s=>({
    title:s.title,completed:s.completed.length,total:s.total,
    lastChapter:s.completed.length>0?Math.max(...s.completed):0,
    cover:await compressCoverForProfile(s.cover),
    status:s.status,lastUpdated:s.lastUpdated||0
  })));
  const topMangaRaw=data.manga.filter(s=>s.status==="reading")
    .sort((a,b)=>(b.lastUpdated||0)-(a.lastUpdated||0)).slice(0,5);
  const topAnimeRaw=data.anime.filter(s=>s.status==="reading")
    .sort((a,b)=>(b.lastUpdated||0)-(a.lastUpdated||0)).slice(0,5);
  const topManga=await compressAll(topMangaRaw);
  const topAnime=await compressAll(topAnimeRaw);
  const allManga=await compressAll(data.manga);
  const allAnime=await compressAll(data.anime);
  // Nota: usamos merge:true para no sobreescribir el username si ya existe
  try{
    await fbDb.collection("public_profiles").doc(uid).set({
      uid,
      displayName:fbUser.displayName||"",
      avatarUrl:fbUser.photoURL||"",
      mangaCount,animeCount,topManga,topAnime,allManga,allAnime,
      lastActive:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
  }catch(e){console.warn("fnSaveMyPublicProfile:",e);}
}

async function fnRegisterUsername(username){
  if(!fbUser||!fbDb) return {ok:false,msg:"Debes iniciar sesion"};
  const clean=username.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(clean.length<3) return {ok:false,msg:"Minimo 3 caracteres (letras, numeros, _)"};
  if(clean.length>20) return {ok:false,msg:"Maximo 20 caracteres"};
  try{
    // Verificar si username ya existe
    let checkDoc=null;
    try{
      checkDoc=await fbDb.collection("usernames").doc(clean).get();
    }catch(readErr){
      if(readErr.code==="permission-denied"){
        return {ok:false,msg:"Error de permisos — publica las reglas de Firestore (boton Publicar en la consola)"};
      }
      console.warn("check username read failed:",readErr.code);
    }
    if(checkDoc&&checkDoc.exists){
      // Si el doc existe y ya le pertenece a este usuario, permitir re-registro
      if(checkDoc.data().uid!==fbUser.uid){
        return {ok:false,msg:"Ese username ya esta tomado"};
      }
    }
    // Escribir el username — set() puro: si no existe = CREATE, si ya es del mismo user = OVERWRITE (permitido por la regla update)
    await fbDb.collection("usernames").doc(clean).set({
      uid:fbUser.uid,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    // Escribir el perfil publico con merge:false para set completo
    await fbDb.collection("public_profiles").doc(fbUser.uid).set({
      uid:fbUser.uid,username:clean,
      displayName:fbUser.displayName||"",
      avatarUrl:fbUser.photoURL||"",
      mangaCount:data.manga.length,animeCount:data.anime.length,
      topManga:[],topAnime:[],allManga:[],allAnime:[],
      lastActive:firebase.firestore.FieldValue.serverTimestamp()
    });
    // Actualizar cache inmediatamente para que el siguiente render no lea Firestore
    friendsState.cachedUsername=clean;
    friendsState.usernameCacheUid=fbUser.uid;
    return {ok:true};
  }catch(e){
    console.error("fnRegisterUsername error:",e.code,e.message);
    if(e.code==="permission-denied"){
      return {ok:false,msg:"Error de permisos — ve a Firebase Console → Firestore → Reglas y haz clic en Publicar"};
    }
    return {ok:false,msg:"Error: "+e.message};
  }
}

async function fnGetMyUsername(forceRefresh=false){
  if(!fbUser||!fbDb) return null;
  // Usar cache si pertenece al mismo usuario y no se fuerza refresco
  if(!forceRefresh && friendsState.cachedUsername!==null && friendsState.usernameCacheUid===fbUser.uid){
    return friendsState.cachedUsername;
  }
  try{
    const doc=await fbDb.collection("public_profiles").doc(fbUser.uid).get();
    const username=doc.exists?doc.data().username||null:null;
    friendsState.cachedUsername=username;
    friendsState.usernameCacheUid=fbUser.uid;
    return username;
  }catch(e){return null;}
}

async function fnSearchUser(username){
  if(!fbDb||!fbUser) return null;
  const clean=username.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(!clean) return null;
  try{
    const doc=await fbDb.collection("usernames").doc(clean).get();
    if(!doc.exists) return "not-found";
    const uid=doc.data().uid;
    if(uid===fbUser.uid) return "self";
    const profile=await fbDb.collection("public_profiles").doc(uid).get();
    if(!profile.exists) return "not-found";
    return {uid,profile:profile.data()};
  }catch(e){
    if(e.code==="permission-denied") return "perm-error";
    return null;
  }
}

async function fnSendRequest(toUid){
  if(!fbUser||!fbDb) return {ok:false,msg:"Sin sesion"};
  try{
    // Verificar que yo tengo username registrado (requerido para que el receptor pueda identificarme)
    const myProfile=await fbDb.collection("public_profiles").doc(fbUser.uid).get();
    const myUsername=myProfile.exists?myProfile.data().username||"":"";
    if(!myUsername) return {ok:false,msg:"Debes registrar tu @username antes de agregar amigos"};

    let isFriend=false,hasSent=false,hasReceived=false;
    try{
      const existing=await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(toUid).get();
      isFriend=existing.exists;
      const sentCheck=await fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid).get();
      hasSent=sentCheck.exists;
      // También verificar si ese usuario ya me envió solicitud (aceptar directamente)
      const recvCheck=await fbDb.collection("users").doc(fbUser.uid).collection("friends_received").doc(toUid).get();
      hasReceived=recvCheck.exists;
    }catch(readErr){console.warn("send request pre-check:",readErr.code);}
    if(isFriend) return {ok:false,msg:"Ya son amigos"};
    if(hasSent) return {ok:false,msg:"Solicitud ya enviada"};
    if(hasReceived) return {ok:false,msg:"Ese usuario ya te envió solicitud — acéptala desde tu panel de solicitudes"};

    const ts=firebase.firestore.FieldValue.serverTimestamp();
    // Escribir en mi colección friends_sent
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid).set({
      toUid,ts,status:"pending"
    });
    // Escribir en la colección friends_received del destinatario
    // (requiere regla Firestore: allow create si request.auth.uid == fromUid)
    await fbDb.collection("users").doc(toUid).collection("friends_received").doc(fbUser.uid).set({
      fromUid:fbUser.uid,ts,status:"pending",
      displayName:fbUser.displayName||fbUser.email||"",
      username:myUsername,
      avatarUrl:fbUser.photoURL||""
    });
    return {ok:true};
  }catch(e){
    if(e.code==="permission-denied"){
      return {ok:false,msg:"Error de permisos — asegúrate de haber publicado las reglas de Firestore correctamente"};
    }
    return {ok:false,msg:"Error: "+e.message};
  }
}

async function fnSyncAcceptedRequests(){
  // Para cada solicitud enviada, verifica si el receptor ya la aceptó
  // (es decir, si yo aparezco en su friends_accepted)
  // Si es así, me agrego a mí mismo como amigo y limpio la solicitud enviada
  if(!fbUser||!fbDb) return;
  try{
    const sentSnap=await withTimeout(fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").get());
    for(const doc of sentSnap.docs){
      const toUid=doc.id;
      try{
        // Intenta leer si el receptor me tiene en su friends_accepted
        const acceptedDoc=await fbDb.collection("users").doc(toUid).collection("friends_accepted").doc(fbUser.uid).get();
        if(acceptedDoc.exists){
          // ¡Fue aceptado! Agregar a mis amigos y limpiar la solicitud enviada
          const theirProfile=await fbDb.collection("public_profiles").doc(toUid).get();
          const ts=firebase.firestore.FieldValue.serverTimestamp();
          await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(toUid).set({
            since:ts,uid:toUid,
            displayName:theirProfile.exists?theirProfile.data().displayName||"":"",
            username:theirProfile.exists?theirProfile.data().username||"":"",
            avatarUrl:theirProfile.exists?theirProfile.data().avatarUrl||"":""
          });
          await fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid).delete();
          showToast("✓ ¡"+( theirProfile.exists?theirProfile.data().displayName||"Usuario":"Usuario")+" aceptó tu solicitud!");
        }
      }catch(e){/* puede fallar por permisos si la otra persona no aceptó aún */}
    }
  }catch(e){console.warn("fnSyncAcceptedRequests:",e.message);}
}

async function fnAcceptRequest(fromUid,fromData){
  if(!fbUser||!fbDb) return;
  try{
    const ts=firebase.firestore.FieldValue.serverTimestamp();
    const myProfile=await fbDb.collection("public_profiles").doc(fbUser.uid).get();
    const myUsername=myProfile.exists?myProfile.data().username:"";

    // Solo escribimos en NUESTRAS propias colecciones (sin escritura cruzada)
    // 1. Agregar el remitente a MI lista de amigos aceptados
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(fromUid).set({
      since:ts,uid:fromUid,
      displayName:fromData.displayName||"",username:fromData.username||"",avatarUrl:fromData.avatarUrl||""
    });
    // 2. Eliminar la solicitud de MI friends_received
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_received").doc(fromUid).delete();
    // 3. Escribir en MI friends_accepted un marcador especial que el remitente puede leer
    //    para saber que fue aceptado (él lo detecta vía su propia friends_sent → estado "accepted")
    // 4. Actualizar el estado en MI friends_sent del remitente hacia mí
    //    — NO podemos escribir en el doc del remitente sin reglas especiales,
    //    por eso usamos su public_profile para notificarle indirectamente.
    //    El remitente, al hacer Sync o abrir el panel, verá que está en friends_accepted del receptor.

    // Intentar limpiar su friends_sent (puede fallar por permisos — no es crítico)
    try{
      await fbDb.collection("users").doc(fromUid).collection("friends_sent").doc(fbUser.uid).delete();
    }catch(e){console.warn("No se pudo limpiar friends_sent del remitente:",e.code);}

    // Intentar escribir en su friends_accepted (puede fallar por permisos)
    try{
      await fbDb.collection("users").doc(fromUid).collection("friends_accepted").doc(fbUser.uid).set({
        since:ts,uid:fbUser.uid,
        displayName:fbUser.displayName||"",username:myUsername,avatarUrl:fbUser.photoURL||""
      });
    }catch(e){console.warn("No se pudo escribir friends_accepted del remitente:",e.code);}

    showToast("✓ ¡Amigo agregado!");
    friendsState.searchResult=null;
    renderFriendsPanel();
  }catch(e){
    console.error("fnAcceptRequest error:",e.code,e.message);
    showToast("Error al aceptar: "+(e.code||e.message));
  }
}

async function fnRejectRequest(fromUid){
  if(!fbUser||!fbDb) return;
  try{
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_received").doc(fromUid).delete();
    try{
      await fbDb.collection("users").doc(fromUid).collection("friends_sent").doc(fbUser.uid).delete();
    }catch(e){console.warn("No se pudo limpiar friends_sent del remitente:",e.code);}
    renderFriendsPanel();
  }catch(e){showToast("Error al rechazar: "+e.message);}
}

async function fnCancelRequest(toUid){
  if(!fbUser||!fbDb) return;
  try{
    const batch=fbDb.batch();
    batch.delete(fbDb.collection("users").doc(fbUser.uid).collection("friends_sent").doc(toUid));
    batch.delete(fbDb.collection("users").doc(toUid).collection("friends_received").doc(fbUser.uid));
    await batch.commit();
    showToast("Solicitud cancelada");
    renderFriendsPanel();
  }catch(e){showToast("Error al cancelar: "+e.message);}
}

async function fnRemoveFriend(friendUid){
  if(!fbUser||!fbDb) return;
  try{
    // Eliminamos NUESTRO propio friends_accepted (no necesitamos tocar el del otro)
    await fbDb.collection("users").doc(fbUser.uid).collection("friends_accepted").doc(friendUid).delete();
    // Intentar eliminar el nuestro del lado del amigo (puede fallar por permisos — no crítico)
    try{
      await fbDb.collection("users").doc(friendUid).collection("friends_accepted").doc(fbUser.uid).delete();
    }catch(e){console.warn("No se pudo limpiar friends_accepted del otro usuario:",e.code);}
    friendsState.view="list";friendsState.viewingUid=null;friendsState.viewingData=null;
    showToast("Amigo eliminado");
    renderFriendsPanel();
  }catch(e){showToast("Error al eliminar: "+e.message);}
}

// Helper: timeout para cualquier promesa de Firestore (evita cuelgues infinitos)
function withTimeout(promise,ms=8000){
  return Promise.race([
    promise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),ms))
  ]);
}

async function renderFriendsPanel(){
  const container=document.getElementById("friends-panel-container");
  if(!container) return;
  container.innerHTML=`<div style="text-align:center;padding:30px;color:var(--t3);font-size:12px">Cargando...</div>`;
  if(!fbUser){
    container.innerHTML=`<div class="fn-status">Inicia sesion con Google para usar el sistema de amigos</div>`;
    return;
  }
  try{
    await _renderFriendsPanelInner(container);
  }catch(err){
    console.warn("renderFriendsPanel error:",err);
    const msg=err.message==="timeout"?"Tiempo de espera agotado — revisa tu conexion":"Error al cargar: "+err.message;
    container.innerHTML=`<div class="fn-status error" style="padding:24px;text-align:center">
      ${msg}<br><br>
      <button class="fn-btn sec" onclick="renderFriendsPanel()" style="margin:0 auto">Reintentar</button>
    </div>`;
  }
}

function migrate(s){return{id:s.id,title:s.title,total:s.total||1,completed:s.completed||[],cover:s.cover||"",coverIsUrl:s.coverIsUrl||false,status:s.status||(s.completed?.length===s.total&&s.total>0?"completed":"reading"),tags:s.tags||[],notes:s.notes||"",score:s.score||0,favorite:s.favorite||false,rewatch:s.rewatch||false,lastUpdated:s.lastUpdated||parseInt(s.id)||Date.now(),createdAt:s.createdAt||parseInt(s.id)||Date.now(),startDate:s.startDate||"",endDate:s.endDate||"",seasons:s.seasons||[],characters:s.characters||[],jikanId:s.jikanId||null,jikanPublishing:s.jikanPublishing||false};}
function initData(){
  // Cargar siempre con la clave del usuario actual (uid-based) para aislar datos por cuenta
  const skey=getSKEY();
  let raw=loadJ(skey);
  // Solo migrar claves antiguas si NO hay usuario autenticado (guest session)
  // Si hay usuario, NUNCA leer claves antiguas para evitar mezcla de cuentas

    for(const k of OLD_KEYS){raw=loadJ(k);if(raw){localStorage.setItem(skey,JSON.stringify(raw));break;}}

  if(raw){["manga","anime"].forEach(t=>{if(!raw[t])raw[t]=[];raw[t]=raw[t].map(migrate);});data=raw;}
  else data={manga:[],anime:[]};

}

function timeInvested(){

  const oldest=Math.min(...all.filter(s=>s.createdAt).map(s=>s.createdAt),Date.now());
  const weeks=Math.max((Date.now()-oldest)/(7*24*3600*1000),1);
  return(all.reduce((s,x)=>s+x.completed.length,0)/weeks).toFixed(1);
}
function scoreHist(items){const h=Array(10).fill(0);items.filter(s=>s.score>0).forEach(s=>h[s.score-1]++);return h;}
function topGenres(items,n=6){
  const c={};
  items.forEach(s=>(s.tags||[]).forEach(t=>{c[t]=(c[t]||0)+1;}));
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,n);
}
function bestRated(items,n=5){return[...items].filter(s=>s.score>0).sort((a,b)=>b.score-a.score||b.completed.length-a.completed.length).slice(0,n);}
function completionRate(items){if(!items.length)return 0;return Math.round(items.filter(s=>s.status==="completed").length/items.length*100);}
function avgScore(items){const sc=items.filter(s=>s.score>0);if(!sc.length)return null;return(sc.reduce((s,x)=>s+x.score,0)/sc.length).toFixed(1);}

// Función central para obtener el número del último capítulo/episodio publicado.
// Intenta múltiples endpoints y nunca pide al usuario si puede evitarlo.
async function jikanFetchJSON(url,retries=4){
  let waitMs=450;
  for(let i=0;i<retries;i++){
    try{
      const res=await fetch(url);
      if(res.status===429){
        const ra=parseInt(res.headers.get("Retry-After")||"0",10);
        const delay=Number.isFinite(ra)&&ra>0?ra*1000:waitMs;
        await new Promise(r=>setTimeout(r,delay));
        waitMs=Math.min(waitMs*2,2600);
        continue;
      }
      if(!res.ok){
        await new Promise(r=>setTimeout(r,waitMs));
        waitMs=Math.min(waitMs*2,2600);
        continue;
      }
      return await res.json();
    }catch(e){
      await new Promise(r=>setTimeout(r,waitMs));
      waitMs=Math.min(waitMs*2,2600);
    }
  }
  return null;
}

function jikanExtractPublishedNumber(entry,type){
  if(!entry)return 0;
  const toPosInt=v=>{
    const n=Number(v);
    return Number.isFinite(n)&&n>0?Math.floor(n):0;
  };
  const direct=type==="manga"
    ? [entry.chapter,entry.chapters,entry.number,entry.no]
    : [entry.episode,entry.episodes,entry.number,entry.no];
  for(const v of direct){
    const n=toPosInt(v);
    if(n>0)return n;
  }
  const txt=String(entry.title||entry.name||entry.title_english||"");
  const tagged=txt.match(/\b(?:chapter|cap(?:[ií]tulo)?|episode|ep)\s*\.?\s*#?\s*(\d+(?:\.\d+)?)/i);
  if(tagged&&tagged[1]){
    const n=toPosInt(parseFloat(tagged[1]));
    if(n>0)return n;
  }
  const loose=txt.match(/(\d+(?:\.\d+)?)/);
  if(loose&&loose[1]){
    const n=toPosInt(parseFloat(loose[1]));
    if(n>0)return n;
  }
  return 0;
}

async function jikanGetLatestCount(malId, type){
  const ep = type==="manga"?"manga":"anime";
  let cnt = 0;

  // ── Paso 1: endpoint individual (MAL a veces sí entrega chapters/episodes) ──
  try{
    const d1 = await jikanFetchJSON(`https://api.jikan.moe/v4/${ep}/${malId}`);
    const det = d1?.data;
    if(det){
      cnt = type==="manga" ? (det.chapters||0) : (det.episodes||0);
    }
  }catch(e1){}

  if(cnt > 0) return cnt;

  // ── Paso 2: endpoint de lista de capítulos/episodios ──
  // Para obras en emisión MAL NO entrega chapters/episodes=null en el detail,
  // pero la lista de episodios sí tiene los publicados.
  // Jikan ordena ASC (ep 1 primero) → el ÚLTIMO item es el más reciente.
  try{
    const listUrl = type==="manga"
      ? `https://api.jikan.moe/v4/manga/${malId}/chapters?page=1`
      : `https://api.jikan.moe/v4/anime/${malId}/episodes?page=1`;
    const d2 = await jikanFetchJSON(listUrl);
    if(!d2||!d2.data)return 0;
    const items = d2.data || [];
    const tot   = d2.pagination?.items?.total || 0;
    const perPage = d2.pagination?.items?.per_page || 100;
    const lp    = d2.pagination?.last_visible_page || 1;

    // MAL a veces reporta total exacto en la paginación
    if(tot > 0) return tot;

    if(items.length > 0){
      if(lp <= 1){
        // Una sola página: intentar leer el número del ÚLTIMO item (orden ASC)
        const lastItem = items[items.length-1];
        const fromItem = jikanExtractPublishedNumber(lastItem,type);
        cnt = fromItem>0 ? fromItem : items.length;
      } else {
        // Múltiples páginas → ir a la última para leer el número del último ep/cap publicado
        try{
          const lastUrl = type==="manga"
            ? `https://api.jikan.moe/v4/manga/${malId}/chapters?page=${lp}`
            : `https://api.jikan.moe/v4/anime/${malId}/episodes?page=${lp}`;
          const dL = await jikanFetchJSON(lastUrl);
          const lastItems = dL?.data || [];
          if(lastItems.length > 0){
            const lastItem = lastItems[lastItems.length-1];
            const fromNum = jikanExtractPublishedNumber(lastItem,type);
            // Si el número del último ep/cap es coherente, usarlo; si no, estimar
            cnt = fromNum > 0 ? fromNum : (lp-1)*perPage + lastItems.length;
          } else {
            cnt = Math.max((lp-1)*perPage,0);
          }
        }catch(e3){cnt = Math.max((lp-1)*perPage,0);}
      }
    }
  }catch(e2){}

  return cnt;
}

async function searchJikan(query,tabType){
  if(!query||query.length<2){jikanResults=[];removeJikanDrop();return;}
  const ep=tabType==="manga"?"manga":"anime";
  try{
    const res=await fetch(`https://api.jikan.moe/v4/${ep}?q=${encodeURIComponent(query)}&limit=6`);
    const json=await res.json();
    jikanResults=(json.data||[]).slice(0,6);
  }catch(e){jikanResults=[];}
  // Mostrar dropdown inmediatamente con lo que tenemos
  renderJikanDrop(tabType);
  // Enriquecer en background: para items sin chapters/episodes, obtener el último cap publicado
  for(const item of jikanResults){
    const rawCnt = tabType==="manga"?(item.chapters||0):(item.episodes||0);
    if(!rawCnt && item.mal_id){
      try{
        // Verificar que el usuario no haya cambiado la búsqueda
        if(!jikanResults.includes(item)) break;
        item._latestChapter = await jikanGetLatestCount(item.mal_id, tabType);
        // Re-renderizar tras cada item enriquecido
        if(jikanResults.length>0) renderJikanDrop(tabType);
      }catch(e2){}
    }
  }
}

function removeJikanDrop(){
  const old=document.getElementById("jikan-drop");
  if(old)old.remove();
}

function renderJikanDrop(tabType){
  const wrap=document.querySelector(".jikan-wrap");
  if(!wrap)return;
  removeJikanDrop();
  if(!jikanResults.length)return;
  const tab_=tabType||tab;
  const drop=document.createElement("div");
  drop.className="jikan-drop";
  drop.id="jikan-drop";
  jikanResults.forEach(item=>{
    const row=document.createElement("div");
    row.className="jikan-item";
    const thumb=item.images?.jpg?.image_url||"";
    const rawCount=tab_==="manga"?(item.chapters||0):(item.episodes||0);
    const pub=tab_==="manga"?item.publishing:item.airing;
    const chapLabel=tab_==="manga"?"Cap.":"Ep.";
    // Año de publicación
    const _getYear=str=>str?new Date(str).getFullYear()||null:null;
    const yearStart=(item.published?.prop?.from?.year)||(item.aired?.prop?.from?.year)||_getYear(item.published?.from)||_getYear(item.aired?.from)||null;
    const yearEnd=(item.published?.prop?.to?.year)||(item.aired?.prop?.to?.year)||_getYear(item.published?.to)||_getYear(item.aired?.to)||null;
    let yearHTML="";
    if(yearStart){
      yearHTML=pub
        ?`<span style="font-size:9px;color:var(--t3);margin-left:4px">${yearStart}–</span>`
        :yearEnd&&yearEnd!==yearStart
          ?`<span style="font-size:9px;color:var(--t3);margin-left:4px">${yearStart}–${yearEnd}</span>`
          :`<span style="font-size:9px;color:var(--t3);margin-left:4px">${yearStart}</span>`;
    }
    // Conteo: rawCount del endpoint búsqueda, o _latestChapter enriquecido en background
    const displayCount = rawCount || (item._latestChapter||0);
    let countHTML;
    if(displayCount){
      // Si viene del enriquecimiento, mostrar con indicador de "último cap"
      const label = (pub && !rawCount) ? `${chapLabel} ${displayCount} <span style="opacity:.6;font-size:8px">últ.</span>` : `${chapLabel} ${displayCount}`;
      countHTML = `<span class="jikan-chapters-count">${label}</span>`;
    }else if(pub){
      countHTML = `<span style="font-size:9px;color:var(--t2);font-family:Space Mono,monospace;opacity:.7">buscando...</span>`;
    }else{
      countHTML = `<span style="font-size:9px;color:var(--t3)">caps desconocidos</span>`;
    }
    const badgeHTML=pub
      ?`<span class="jikan-badge pub"><span class="jikan-dot"></span>En publicación</span>`
      :`<span class="jikan-badge fin">✓ Finalizado</span>`;
    row.innerHTML=`${thumb?`<img class="jikan-thumb" src="${thumb}" loading="lazy">`:`<div class="jikan-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--t3)">?</div>`}<div class="jikan-info"><div class="jikan-title">${item.title_english||item.title}</div><div class="jikan-meta">${countHTML}${badgeHTML}${yearHTML}</div></div>`;
    row.onclick=()=>{selectJikanResult(item,tab_);removeJikanDrop();};
    drop.appendChild(row);
  });
  wrap.appendChild(drop);
}

function selectJikanResult(item,tabType){
  const title=item.title_english||item.title;
  const cover=item.images?.jpg?.large_image_url||item.images?.jpg?.image_url||"";
  const rawCount=tabType==="manga"?(item.chapters||0):(item.episodes||0);
  const publishing=tabType==="manga"?item.publishing:item.airing;
  newTitle=title;
  newCover=cover;
  newCoverIsUrl=true;
  // Usar rawCount o _latestChapter (ya enriquecido en el dropdown)
  const knownCount = rawCount || (item._latestChapter||0);
  newTotal = knownCount ? String(knownCount) : "";
  const JIKAN_MAP={"Shounen":"Shōnen","Shoujo":"Shōjo","Seinen":"Seinen","Josei":"Josei","Action":"Acción","Adventure":"Acción","Comedy":"Comedia","Horror":"Horror","Romance":"Romance","Sci-Fi":"Sci-Fi","Fantasy":"Fantasy","Mecha":"Mecha","Slice of Life":"Slice of Life","Sports":"Deportes","Supernatural":"Sobrenatural","Thriller":"Thriller","Mystery":"Thriller","Isekai":"Isekai","Drama":"Drama","Ecchi":"Ecchi","Psychological":"Psicológico","Historical":"Histórico","Military":"Militar","Music":"Música","School":"Escolar"};
  const apiGenres=[...(item.genres||[]),...(item.themes||[]),...(item.demographics||[])];
  const resolvedTags=[];
  if(!theme.customTags)theme.customTags=[];
  apiGenres.forEach(g=>{
    const mapped=JIKAN_MAP[g.name]||g.name;
    if(ALL_TAGS.includes(mapped)){if(!resolvedTags.includes(mapped))resolvedTags.push(mapped);}
    else{if(!theme.customTags.includes(mapped))theme.customTags.push(mapped);if(!resolvedTags.includes(mapped))resolvedTags.push(mapped);}
  });
  newTags=resolvedTags;
  saveLocal();
  jikanResults=[];
  window._pendingJikanId=item.mal_id;
  window._pendingJikanPublishing=publishing||false;
  render();
  const inp=document.getElementById("add-title");
  if(inp)inp.value=title;
  const inp2=document.getElementById("add-total");
  if(inp2)inp2.value=newTotal;
  
  // Si ya tenemos el conteo del dropdown, mostrar toast y listo
  if(knownCount>0){
    showToast(`📖 ${knownCount} ${tabType==="manga"?"caps":"eps"}${publishing?" · en emisión":""}`);
    // Aun así, verificar en background si hay actualización más reciente
    if(item.mal_id){
      (async()=>{
        try{
          const fresh = await jikanGetLatestCount(item.mal_id, tabType);
          if(fresh > knownCount){
            newTotal = String(fresh);
            const fEl = document.getElementById("add-total");
            if(fEl){fEl.value=newTotal;fEl.style.borderColor="rgba(99,179,237,.5)";setTimeout(()=>{const f2=document.getElementById("add-total");if(f2)f2.style.borderColor="";},1200);}
            showToast(`📖 ${fresh} ${tabType==="manga"?"caps":"eps"}${publishing?" · en emisión":""}`);
          }
        }catch(e){}
      })();
    }
    return;
  }
  
  // Si NO tenemos conteo aún, hacer fetch ahora (caso raro: el background no terminó)
  if(item.mal_id){
    const fEl=()=>document.getElementById("add-total");
    const fe=fEl(); if(fe)fe.placeholder="Buscando...";
    (async()=>{
      try{
        const cnt = await jikanGetLatestCount(item.mal_id, tabType);
        const f=fEl();
        if(cnt>0){
          newTotal=String(cnt);
          if(f){f.value=newTotal;f.placeholder=tabType==="manga"?"Total de capitulos *":"Total de ep. *";f.style.borderColor="rgba(99,179,237,.5)";setTimeout(()=>{const f2=fEl();if(f2)f2.style.borderColor="";},1200);}
          showToast(`📖 ${cnt} ${tabType==="manga"?"caps":"eps"}${publishing?" · en emisión":""}`);
        }else{
          // Último recurso: si no hay dato, dejar 0 y marcar para que el polling lo actualice
          newTotal="0";
          if(f){f.value="";f.placeholder=tabType==="manga"?"Obteniendo caps publicados...":"Obteniendo eps publicados...";}
          showToast("⚠️ No se pudo obtener el total — se actualizará automáticamente");
        }
      }catch(e){
        const f=fEl();
        if(f){f.value="0";f.placeholder="En emisión (sin dato)";}
      }
    })();
  }
}

async function checkJikanUpdates(){
  let anyUpdated = false;
  for(const tabKey of ["manga","anime"]){
    const ep=tabKey==="manga"?"manga":"anime";
    const publishing=data[tabKey].filter(s=>s.jikanId&&s.jikanPublishing);
    for(const series of publishing){
      try{
        // Paso 1: intentar endpoint directo
        let count = 0;
        let stillPub = true;
        try{
          const res=await fetch(`https://api.jikan.moe/v4/${ep}/${series.jikanId}`);
          const json=await res.json();
          count=tabKey==="manga"?json.data?.chapters:json.data?.episodes;
          stillPub=tabKey==="manga"?(json.data?.publishing!==false):(json.data?.airing!==false);
        }catch(e1){}

        // Paso 2: si el endpoint directo no entregó un número, usar jikanGetLatestCount
        if(!count || count < 1){
          try{
            await new Promise(r=>setTimeout(r,300));
            count = await jikanGetLatestCount(series.jikanId, tabKey);
          }catch(eL){}
        }

        // Actualizar si: hay un conteo válido diferente al guardado, o si el total era <=1 y ahora hay más
        const shouldUpdate = count > 0 && (count !== series.total || series.total <= 1);
        if(shouldUpdate){
          series.total = count;
          series.jikanPublishing = stillPub;
          series.lastUpdated = Date.now();
          anyUpdated = true;
          showToast(`🆕 ${series.title}: ${count} ${tabKey==="manga"?"cap.":"ep."} disponibles`, 4000);
        } else if(!stillPub && series.jikanPublishing){
          series.jikanPublishing = false;
          anyUpdated = true;
        }
      }catch(e){}
      await new Promise(r=>setTimeout(r,700));
    }
  }
  if(anyUpdated){ save(); render(); }
}

    const ep=tabKey==="manga"?"manga":"anime";
    const pubSeries=data[tabKey].filter(s=>s.jikanId&&s.jikanPublishing);
    for(const series of pubSeries){
      const nextCh=nextChapter(series);
      if(nextCh!==null)continue;
      try{
        const res=await fetch("https://api.jikan.moe/v4/"+ep+"/"+series.jikanId);
        const json=await res.json();
        const count=tabKey==="manga"?json.data?.chapters:json.data?.episodes;
        if(count&&count>series.total){
          notifications.push(series.title+" — cap. "+count+" disponible");
        }
      }catch(e){}

    const msg=notifications.length===1
      ?"\uD83D\uDECE "+notifications[0]
      :"\uD83D\uDECE "+notifications.length+" series con cap. nuevo!";
    showToast(msg,5000);

// ── P2.9: META DIARIA ──
function p29GetGoalKey(){return fbUser?"mat-goal-"+fbUser.uid:"mat-goal-guest";}
function p29GetGoalData(){try{const raw=localStorage.getItem(p29GetGoalKey());return raw?JSON.parse(raw):{goal:5,todayCount:0,lastDate:""};}catch(e){return{goal:5,todayCount:0,lastDate:""};}}
function p29SaveGoalData(d){try{localStorage.setItem(p29GetGoalKey(),JSON.stringify(d));}catch(e){}}
function p29BumpGoal(){const td=today();const d=p29GetGoalData();if(d.lastDate!==td){d.todayCount=0;d.lastDate=td;}d.todayCount=(d.todayCount||0)+1;p29SaveGoalData(d);if(d.todayCount===d.goal){setTimeout(()=>p29ShowConfetti(window._p29ac||"#63b3ed"),200);showToast("🎯 ¡Meta diaria alcanzada! "+d.goal+" caps",3000);}return d;}
function p29RenderGoalBar(root){
  const td=today();
  const d=p29GetGoalData();
  if(d.lastDate!==td)d.todayCount=0;
  const goal=d.goal||5;
  const done=Math.min(d.todayCount||0,goal);
  const pct=Math.round(done/goal*100);
  const bar=document.createElement("div");
  bar.className="daily-goal-bar";
  const mc=window._p29ac||"#63b3ed";
  bar.innerHTML=`<div class="daily-goal-header">
    <span class="daily-goal-label">🎯 Meta diaria</span>
    <div style="display:flex;align-items:center;gap:6px">
      <input id="goal-input-inline" type="number" min="1" max="99" value="${goal}"
        style="width:44px;padding:2px 6px;background:rgba(255,255,255,.08);border:1px solid var(--bd);border-radius:6px;color:var(--t1);font-family:'Space Mono',monospace;font-size:12px;font-weight:700;text-align:center;outline:none;"
        title="Cambia tu meta diaria">
      <span class="daily-goal-count">${done} caps hoy</span>
    </div>
  </div><div class="daily-goal-track"><div class="daily-goal-fill" style="width:${pct}%;background:${mc}"></div></div>`;
  const gi=bar.querySelector("#goal-input-inline");
  if(gi){
    gi.onchange=()=>{const v=parseInt(gi.value);if(v>0&&v<=99){const nd=p29GetGoalData();nd.goal=v;p29SaveGoalData(nd);render();}};
    gi.onclick=(e)=>e.stopPropagation();
  }
  root.appendChild(bar);
}

// ── P2.9: SONIDO +1 (Web Audio API) ──
let _p29AudioCtx=null;
function p29PlayTick(){
  if(theme.soundEnabled===false)return;
  try{
    if(!_p29AudioCtx)_p29AudioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(_p29AudioCtx.state==="suspended")_p29AudioCtx.resume();
    const ctx=_p29AudioCtx;const now=ctx.currentTime;
    // Marimba tap suave — sine con ataque rápido, decay largo y cálido
    // Nota principal: Sol5 (784Hz) + armónico suave
    const oM=ctx.createOscillator(),gM=ctx.createGain(),fM=ctx.createBiquadFilter();
    fM.type="lowpass";fM.frequency.value=3500;fM.Q.value=0.7;
    oM.connect(fM);fM.connect(gM);gM.connect(ctx.destination);
    oM.type="sine";oM.frequency.setValueAtTime(784,now);
    gM.gain.setValueAtTime(0,now);
    gM.gain.linearRampToValueAtTime(0.22,now+0.006);
    gM.gain.exponentialRampToValueAtTime(0.001,now+0.28);
    oM.start(now);oM.stop(now+0.30);
    // Octava inferior más suave (Do4 392Hz) para calidez
    const oL=ctx.createOscillator(),gL=ctx.createGain();
    oL.connect(gL);gL.connect(ctx.destination);
    oL.type="sine";oL.frequency.setValueAtTime(392,now);
    gL.gain.setValueAtTime(0,now);gL.gain.linearRampToValueAtTime(0.09,now+0.006);
    gL.gain.exponentialRampToValueAtTime(0.001,now+0.22);
    oL.start(now);oL.stop(now+0.23);
    // Brillo suave (Mi6 1318Hz) para presencia
    const oH=ctx.createOscillator(),gH=ctx.createGain();
    oH.connect(gH);gH.connect(ctx.destination);
    oH.type="sine";oH.frequency.setValueAtTime(1318,now+0.003);
    gH.gain.setValueAtTime(0,now+0.003);gH.gain.linearRampToValueAtTime(0.05,now+0.009);
    gH.gain.exponentialRampToValueAtTime(0.001,now+0.14);
    oH.start(now+0.003);oH.stop(now+0.15);
  }catch(e){}
  try{if(navigator.vibrate)navigator.vibrate([4,0,0]);}catch(e){}
}

// ── P2.9: CONFETTI AL COMPLETAR SERIE ──
function p29ShowConfetti(ac){
  document.querySelectorAll(".p29-confetti-particle").forEach(e=>e.remove());
  const colors=[ac||"#63b3ed","#fbbf24","#34d399","#f472b6","#a78bfa","#fb923c"];
  const cx=window.innerWidth/2;
  const cy=window.innerHeight/3;
  for(let i=0;i<48;i++){
    const p=document.createElement("div");
    p.className="p29-confetti-particle";
    const color=colors[i%colors.length];
    const size=4+Math.random()*6;
    const angle=(i/48)*360+(Math.random()-0.5)*30;
    const dist=80+Math.random()*160;
    const px=Math.cos(angle*Math.PI/180)*dist;
    const py=-(60+Math.random()*180);
    const dur=0.8+Math.random()*0.6;
    const delay=Math.random()*0.15;
    const isRect=Math.random()>0.5;
    p.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:${size}px;height:${isRect?size*2.5:size}px;background:${color};border-radius:${isRect?"2px":"50%"};pointer-events:none;z-index:9998;animation:p29Confetti ${dur}s ease-out ${delay}s forwards`;
    p.style.setProperty("--px",px+"px");
    p.style.setProperty("--py",py+"px");
    p.style.setProperty("--rot",(Math.random()*720-360)+"deg");
    document.body.appendChild(p);
  }
  setTimeout(()=>document.querySelectorAll(".p29-confetti-particle").forEach(e=>e.remove()),1800);
}

// ── P2.8: RACHA DE LECTURA ──
function p28GetStreakKey(){return fbUser?"mat-streak-"+fbUser.uid:"mat-streak-guest";}
function p28GetStreakData(){
  try{const raw=localStorage.getItem(p28GetStreakKey());return raw?JSON.parse(raw):{count:0,lastDate:""};}
  catch(e){return{count:0,lastDate:""};}
}
function p28SaveStreakData(d){try{localStorage.setItem(p28GetStreakKey(),JSON.stringify(d));}catch(e){}}
function p28TouchStreak(){
  const td=today();
  const d=p28GetStreakData();
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yd=yesterday.toISOString().slice(0,10);
  if(d.lastDate===td)return;// ya marcó hoy
  if(d.lastDate===yd){d.count=(d.count||0)+1;}
  else if(d.lastDate!==td){d.count=1;}
  d.lastDate=td;
  p28SaveStreakData(d);
}
function p28GetStreak(){const d=p28GetStreakData();const td=today();const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);const yd=yesterday.toISOString().slice(0,10);if(d.lastDate===td||d.lastDate===yd)return d.count||0;return 0;}

// ── P2.8: ANIMACIÓN DOPAMINA +1 ──
function p28ShowPlusAnim(type,title,streakCount){
  document.querySelectorAll(".p28-anim-overlay,.p28-particle,.p28-ring").forEach(e=>e.remove());
  const colors=type==="manga"
    ?["#63b3ed","#9b7dff","#34d399","#7ecbff","#fbbf24","#f472b6"]
    :["#68d391","#34d399","#63b3ed","#fbbf24","#a78bfa","#fb923c"];
  const mc=colors[0];
  const label=type==="manga"?"📖 +1 cap":"▶ +1 ep";
  const streakLine=streakCount&&streakCount>=2?`<div style="color:#fbbf24;font-size:12px;font-weight:700;animation:p28Sub .75s ease forwards;animation-delay:.2s;opacity:0;font-family:'Space Mono',monospace">🔥 ${streakCount} días</div>`:"";
  const ov=document.createElement("div");
  ov.className="p28-anim-overlay";
  ov.innerHTML=`<div class="p28-plus-main" style="color:${mc}">+1</div><div class="p28-plus-sub" style="color:${mc};border:1px solid ${mc}44">${label}</div>${streakLine}`;
  document.body.appendChild(ov);
  // Anillos expansivos
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  [0,80].forEach((delay,ri)=>{
    const ring=document.createElement("div");
    ring.className="p28-ring";
    const sz=120+ri*80;
    ring.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;color:${colors[ri]};animation-delay:${delay}ms`;
    document.body.appendChild(ring);
  });
  // Partículas mixtas: círculos + rectángulos
  for(let i=0;i<22;i++){
    const p=document.createElement("div");
    p.className="p28-particle";
    const angle=(i/22)*360+(Math.random()-0.5)*25;
    const dist=70+Math.random()*90;
    const px=Math.cos(angle*Math.PI/180)*dist+"px";
    const py=Math.sin(angle*Math.PI/180)*dist+"px";
    const isRect=i%3===0;
    const sz=isRect?`width:${4+Math.random()*4}px;height:${8+Math.random()*8}px;border-radius:2px`:`width:${5+Math.random()*5}px;height:${5+Math.random()*5}px;border-radius:50%`;
    const rot=(Math.random()*360)+"deg";
    p.style.cssText=`left:${cx}px;top:${cy}px;${sz};--px:${px};--py:${py};--rot:${rot};background:${colors[i%colors.length]};animation-delay:${Math.random()*60}ms;transform-origin:center`;
    document.body.appendChild(p);
  }
  setTimeout(()=>{ov.remove();document.querySelectorAll(".p28-particle,.p28-ring").forEach(e=>e.remove());},950);
}

// ── P2.8: RECOMENDACIONES POR SIMILITUD DE TAGS ──
async function p28FetchReco(tags,type){
  if(!tags||tags.length===0)return[];
  const jikanType=type==="manga"?"manga":"anime";
  const existingTitles=new Set([...data.manga,...data.anime].map(s=>s.title.toLowerCase()));
  const results=[];
  const tag=tags[Math.floor(Math.random()*tags.length)];
  // Mapeo básico tag→genre_id Jikan
  const genreMap={"Shōnen":27,"Seinen":42,"Acción":1,"Comedia":4,"Romance":22,"Horror":14,"Fantasy":10,"Sci-Fi":24,"Sobrenatural":37,"Deportes":30,"Thriller":41,"Mecha":18,"Slice of Life":36,"Isekai":62};
  const genreId=genreMap[tag]||27;
  try{
    const res=await fetch(`https://api.jikan.moe/v4/${jikanType}?genres=${genreId}&order_by=score&sort=desc&limit=10`);
    if(!res.ok)return[];
    const json=await res.json();
    (json.data||[]).forEach(item=>{
      const t=(item.title_english||item.title||"").toLowerCase();
      if(!existingTitles.has(t)&&results.length<6){
        results.push({
          id:item.mal_id,
          title:item.title_english||item.title,
          score:item.score||0,
          tag:tag,
          reason:`Ya que te gusta "${tag}" en ${type==="manga"?"tu manga":"tu anime"}`,
          image:item.images?.jpg?.image_url||""
        });
      }
    });
  }catch(e){console.warn("p28 reco fetch:",e);}
  return results;
}

// ═══ ACTIONS ═══
function markChapter(sid,n,cellEl,ac){const x=data[tab].find(z=>z.id===sid);if(!x)return;const wasRead=x.completed.includes(n);
  if(wasRead){
    const higher=x.completed.filter(c=>c>n);
    const doUnmarkSingle=()=>{x.completed=x.completed.filter(c=>c!==n);x.lastUpdated=Date.now();save();render();};
    const doUnmarkAll=()=>{x.completed=x.completed.filter(c=>c<n);x.lastUpdated=Date.now();save();render();};
    if(higher.length>0){
      showCascadeModal("Desmarcar capítulo",`¿Desmarcar solo el cap. ${n}, o también los ${higher.length} posteriores (hasta el ${Math.max(...higher)})?`,"↩️",doUnmarkSingle,doUnmarkAll);
      return;
    }
    doUnmarkSingle();return;
  }
  for(let i=1;i<=n;i++){if(!x.completed.includes(i))x.completed.push(i);}x.completed.sort((a,b)=>a-b);
  x.lastUpdated=Date.now();const wasCompleted=x.completed.length===x.total&&x.total>0;if(wasCompleted)x.status="completed";else if(x.completed.length>0&&x.status==="plan")x.status="reading";

(function(){
  if(localStorage.getItem("mat-onboarding-done"))return;
  const steps=[
    {icon:"🎌",title:"¡Bienvenido a Mangu!",desc:"Tu tracker personal de manga y anime, 100% gratis y sin anuncios. Lleva el progreso de todo lo que lees o ves en un solo lugar."},
    {icon:"🔍",title:"Portadas automáticas desde MAL",desc:"Escribe cualquier título en el campo de agregar — las portadas, géneros y número de capítulos se rellenan solos desde MyAnimeList. Sin publicidad, sin límites."},
    {icon:"⚡",title:"Dopamina garantizada",desc:"Marca capítulos con +1, acumula rachas diarias 🔥, completa series y desbloquea confetti 🎉. Usa el botón ⚡ para acceso rápido desde cualquier pantalla."},
    {icon:"📊",title:"Tu progreso, tu historia",desc:"El dashboard muestra tiempo invertido, géneros favoritos y más. Sincroniza con Google para acceder desde cualquier dispositivo."}
  ];
  let step=0;
  function showStep(){
    const existing=document.getElementById("onb-overlay");
    if(existing)existing.remove();
    const ov=document.createElement("div");
    ov.className="onb-overlay";
    ov.id="onb-overlay";
    const s=steps[step];
    const dotsHtml=steps.map((_,i)=>`<div class="onb-dot${i===step?" active":i<step?" done":""}"></div>`).join("");
    const ac=theme?.accentManga||"#e74c6f";
    ov.innerHTML=`<div class="onb-box"><div class="onb-steps">${dotsHtml}</div><div class="onb-icon">${s.icon}</div><div class="onb-title">${s.title}</div><div class="onb-desc">${s.desc}</div><div class="onb-btns"><button class="onb-btn-skip" id="onb-skip">Saltar</button><button class="onb-btn-next" id="onb-next" style="background:${ac}">${step===steps.length-1?"🚀 ¡Empezar!":"Siguiente →"}</button></div></div>`;
    document.body.appendChild(ov);
    ov.querySelector("#onb-skip").onclick=()=>{ov.remove();localStorage.setItem("mat-onboarding-done","1");};
    ov.querySelector("#onb-next").onclick=()=>{
      if(step<steps.length-1){step++;showStep();}
      else{ov.remove();localStorage.setItem("mat-onboarding-done","1");}
    };
  }
  showStep();
})();
