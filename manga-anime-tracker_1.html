<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga & Anime Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▣</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
:root{--bg1:#0d0d0f;--bg2:#16161a;--bg3:#1c1c22;--bg4:#24242c;--bgi:#1a1a20;--am:#e74c6f;--amd:rgba(231,76,111,.13);--aa:#4ca6e7;--aad:rgba(76,166,231,.13);--t1:#e8e6e3;--t2:#8a8a96;--t3:#55555f;--bd:#2a2a32;--bdl:#33333d;--dng:#e74c4c;--r:6px;--rm:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg1);color:var(--t1);font-family:'Outfit',sans-serif}
.app{max-width:720px;margin:0 auto;padding:24px 16px 80px;min-height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--bd)}
.logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t2);display:flex;align-items:center;gap:10px}
.logo b{background:linear-gradient(135deg,var(--am),var(--aa));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:15px}
.hdr-r{display:flex;gap:4px}
.ib{width:32px;height:32px;border:none;background:transparent;color:var(--t3);cursor:pointer;border-radius:var(--r);display:flex;align-items:center;justify-content:center;transition:.15s}
.ib:hover{background:var(--bg4);color:var(--t2)}.ib.on{background:var(--bg4);color:var(--t1)}.ib.dng:hover{background:rgba(231,76,76,.09);color:var(--dng)}

/* Settings */
.sett{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:16px;margin-bottom:20px;display:none}
.sett.open{display:block}
.sett-top{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:14px;display:flex;justify-content:space-between}
.sett-sec{margin-bottom:16px}.sett-sec:last-child{margin-bottom:0}
.sett-lbl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.clr-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.csw{width:28px;height:28px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:.15s;flex-shrink:0}
.csw:hover{transform:scale(1.1)}.csw.sel{border-color:var(--t1);box-shadow:0 0 0 2px var(--bg1),0 0 0 4px var(--t2)}
.cpick{position:relative;width:28px;height:28px;flex-shrink:0}
.cpick input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.cpick-v{width:28px;height:28px;border-radius:6px;border:2px dashed var(--bdl);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:14px;pointer-events:none;background:var(--bg2)}
.bgr{display:flex;gap:6px;flex-wrap:wrap}
.bgb{padding:7px 14px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-radius:var(--r);transition:.15s}
.bgb:hover{background:var(--bg4);color:var(--t1)}.bgb.on{border-color:var(--am);color:var(--am);background:var(--amd)}
.rst{padding:6px 12px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-family:'Outfit',sans-serif;font-size:11px;cursor:pointer;border-radius:var(--r)}.rst:hover{color:var(--dng);border-color:var(--dng)}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border-radius:var(--rm);padding:4px;border:1px solid var(--bd)}
.tab{flex:1;padding:10px 16px;border:none;background:transparent;color:var(--t2);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border-radius:var(--r);display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.tab:hover{color:var(--t1)}.tab.am{background:var(--amd);color:var(--am);border:1px solid var(--am)}.tab.aa{background:var(--aad);color:var(--aa);border:1px solid var(--aa)}
.tab-c{font-family:'Space Mono',monospace;font-size:11px;opacity:.7}

/* Toolbar */
.tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;flex-wrap:wrap}
.tb-l{display:flex;align-items:center;gap:6px;flex:1;min-width:140px}
.tb-r{display:flex;align-items:center;gap:6px}
.srt{padding:6px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);color:var(--t2);font-family:'Outfit',sans-serif;font-size:12px;outline:none;cursor:pointer}
.sb{position:relative;flex:1;min-width:120px}
.sb svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3)}
.sb input{width:100%;padding:8px 12px 8px 36px;background:var(--bgi);border:1px solid var(--bd);border-radius:var(--r);color:var(--t1);font-family:'Outfit',sans-serif;font-size:13px;outline:none}
.sb input::placeholder{color:var(--t3)}

/* Stats row */
.sr{display:flex;gap:8px;margin-bottom:20px}
.stc{flex:1;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:12px 14px;text-align:center}
.stv{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}
.stl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* Add */
.add{margin-bottom:20px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:14px}
.add-m{display:flex;gap:8px}
.add-m input{flex:1;padding:10px 14px;background:var(--bgi);border:1px solid var(--bd);border-radius:var(--r);color:var(--t1);font-family:'Outfit',sans-serif;font-size:14px;outline:none}
.add-m input::placeholder{color:var(--t3)}.add-m input.sm{width:80px;flex:none;text-align:center}
.add-c{display:flex;align-items:center;gap:8px;margin-top:10px}
.bup{padding:8px 14px;border:1px dashed var(--bdl);background:var(--bg2);color:var(--t2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-radius:var(--r);display:flex;align-items:center;gap:6px;white-space:nowrap}
.bup:hover{background:var(--bg4);color:var(--t1);border-color:var(--t3)}
.cvmn{width:34px;height:48px;border-radius:var(--r);object-fit:cover;border:1px solid var(--bd);flex-shrink:0}
.cvnm{font-size:12px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bcx{padding:4px 8px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-size:11px;border-radius:var(--r)}.bcx:hover{color:var(--dng)}
.badd{padding:10px 16px;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap;color:#fff}
.badd:hover{filter:brightness(1.1)}

/* Series list */
.slist{display:flex;flex-direction:column;gap:8px}
.scard{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);overflow:hidden;transition:.2s}
.scard:hover{border-color:var(--bdl)}
.shdr{display:flex;align-items:center;padding:12px 16px;cursor:pointer;gap:12px;user-select:none}
.cthm{width:48px;height:68px;border-radius:var(--r);object-fit:cover;flex-shrink:0;border:1px solid var(--bd);background:var(--bg2)}
.cph{width:48px;height:68px;border-radius:var(--r);flex-shrink:0;border:1px solid var(--bd);background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:20px}
.sinf{flex:1;min-width:0}
.stit{font-size:15px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sprg{font-family:'Space Mono',monospace;font-size:12px;color:var(--t2);margin-top:2px}
.pbar{width:100px;height:4px;background:var(--bg1);border-radius:2px;overflow:hidden;margin-top:6px}
.pfill{height:100%;border-radius:2px;transition:width .3s}
.sact{display:flex;align-items:center;gap:4px}

/* Chapters */
.cpnl{padding:0 16px 14px;border-top:1px solid var(--bd)}
.cved{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bd);margin-bottom:4px}
.cvei{width:60px;height:84px;border-radius:var(--r);object-fit:cover;border:1px solid var(--bd);background:var(--bg2);flex-shrink:0}
.cvee{width:60px;height:84px;border-radius:var(--r);border:1px dashed var(--bdl);background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--t3)}
.cvec{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.cvec .lbl{font-size:12px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.cveb{display:flex;gap:4px;flex-wrap:wrap}
.cctl{display:flex;align-items:center;justify-content:space-between;padding:10px 0;gap:8px;flex-wrap:wrap}
.cclbl{font-size:12px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.bs{padding:5px 10px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;cursor:pointer;border-radius:var(--r);transition:.15s;display:inline-flex;align-items:center;gap:4px}.bs:hover{background:var(--bg4);color:var(--t1)}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:4px}
.cell{aspect-ratio:1;border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:.1s;color:var(--t3);background:var(--bg2);user-select:none}
.cell:hover{border-color:var(--bdl);background:var(--bg4)}
.cell.rd{color:#fff;font-weight:700}
.erow{display:flex;align-items:center;gap:8px;padding:8px 0 4px}
.erow input{width:70px;padding:5px 8px;background:var(--bgi);border:1px solid var(--bd);border-radius:var(--r);color:var(--t1);font-family:'Space Mono',monospace;font-size:12px;text-align:center;outline:none}
.erow label{font-size:12px;color:var(--t2)}

.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty .icn{font-size:40px;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px;line-height:1.6}

/* Catalog */
.catalog{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.catc{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);overflow:hidden;cursor:pointer;transition:.2s;display:flex;flex-direction:column}
.catc:hover{border-color:var(--bdl);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.catcv{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--bg2);display:block}
.catph{width:100%;aspect-ratio:2/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:36px}
.cati{padding:10px 12px}
.catt{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.catp{font-family:'Space Mono',monospace;font-size:11px;color:var(--t2);margin-top:3px}
.catb{width:100%;height:3px;background:var(--bg1);border-radius:2px;overflow:hidden;margin-top:6px}
.catf{height:100%;border-radius:2px}

/* Dashboard */
.dash{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:20px;margin-bottom:20px}
.dash-t{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:16px}
.dash-g{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:500px){.dash-g{grid-template-columns:1fr}}
.dash-c{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px}
.dash-cl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;text-align:center}
.dash-full{grid-column:1/-1}
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-item:last-child{margin-bottom:0}
.bar-name{font-size:11px;color:var(--t2);width:100px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:18px;background:var(--bg1);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .3s;min-width:1px}
.bar-val{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);width:50px;flex-shrink:0}
.donut-wrap{display:flex;justify-content:center;padding:10px 0}
.donut-legend{display:flex;gap:16px;justify-content:center;margin-top:12px}
.donut-leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2)}
.donut-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bucket-row{display:flex;align-items:flex-end;gap:4px;height:100px;padding:8px 0}
.bucket-bar{flex:1;border-radius:3px 3px 0 0;transition:height .3s;min-height:2px}
.bucket-labels{display:flex;gap:4px}
.bucket-labels span{flex:1;font-size:9px;color:var(--t3);text-align:center;font-family:'Space Mono',monospace}

.hidden{display:none}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ─── State ───
const SKEY="mat-data",TKEY="mat-theme";
const DD={manga:[],anime:[]};
const DT={accentManga:"#e74c6f",accentAnime:"#4ca6e7",bgMode:"dark"};
const BGS={
  dark:{bg1:"#0d0d0f",bg2:"#16161a",bg3:"#1c1c22",bg4:"#24242c",bgi:"#1a1a20",t1:"#e8e6e3",t2:"#8a8a96",t3:"#55555f",bd:"#2a2a32",bdl:"#33333d"},
  midnight:{bg1:"#0a0e1a",bg2:"#111827",bg3:"#1a2235",bg4:"#243049",bgi:"#141c2e",t1:"#e2e8f0",t2:"#8994a8",t3:"#556078",bd:"#253045",bdl:"#30405a"},
  amoled:{bg1:"#000",bg2:"#0a0a0a",bg3:"#141414",bg4:"#1e1e1e",bgi:"#0c0c0c",t1:"#f0f0f0",t2:"#888",t3:"#555",bd:"#222",bdl:"#333"},
  warm:{bg1:"#141210",bg2:"#1c1916",bg3:"#24201c",bg4:"#2e2924",bgi:"#1a1714",t1:"#e8e2d8",t2:"#968e82",t3:"#605a50",bd:"#302b25",bdl:"#3a342c"},
  light:{bg1:"#f4f4f5",bg2:"#e8e8ea",bg3:"#fff",bg4:"#eeeef0",bgi:"#f0f0f2",t1:"#1a1a1e",t2:"#6b6b78",t3:"#a0a0ad",bd:"#d4d4d8",bdl:"#c0c0c6"},
};
const APS=["#e74c6f","#f43f5e","#ef4444","#f97316","#eab308","#22c55e","#14b8a6","#06b6d4","#4ca6e7","#3b82f6","#6366f1","#8b5cf6","#a855f7","#d946ef","#ec4899"];

let data=load(SKEY,DD), theme=load(TKEY,DT), tab="manga", search="", expanded={}, viewMode="list", sortKey="recent", showSettings=false, editTotal=null, editTotalVal="", newCover="";

function load(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch(e){return fb;}}
function save(){localStorage.setItem(SKEY,JSON.stringify(data));localStorage.setItem(TKEY,JSON.stringify(theme));}
function hx(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}

function applyTheme(){
  const b=BGS[theme.bgMode]||BGS.dark,s=document.documentElement.style;
  Object.entries({bg1:b.bg1,bg2:b.bg2,bg3:b.bg3,bg4:b.bg4,bgi:b.bgi,t1:b.t1,t2:b.t2,t3:b.t3,bd:b.bd,bdl:b.bdl,am:theme.accentManga,amd:`rgba(${hx(theme.accentManga)},.13)`,aa:theme.accentAnime,aad:`rgba(${hx(theme.accentAnime)},.13)`}).forEach(([k,v])=>s.setProperty(`--${k}`,v));
}

function resizeImg(file,cb){
  const r=new FileReader();
  r.onload=e=>{const i=new Image();i.onload=()=>{let w=i.width,h=i.height;if(w>200||h>280){const s=Math.min(200/w,280/h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(i,0,0,w,h);cb(c.toDataURL("image/jpeg",.85));};i.src=e.target.result;};
  r.readAsDataURL(file);
}

function sortList(arr){
  const a=[...arr];
  switch(sortKey){
    case"name-asc":return a.sort((x,y)=>x.title.localeCompare(y.title));
    case"name-desc":return a.sort((x,y)=>y.title.localeCompare(x.title));
    case"progress-desc":return a.sort((x,y)=>(y.completed.length/y.total)-(x.completed.length/x.total));
    case"progress-asc":return a.sort((x,y)=>(x.completed.length/x.total)-(y.completed.length/y.total));
    case"total-desc":return a.sort((x,y)=>y.total-x.total);
    default:return a.sort((x,y)=>+y.id - +x.id);
  }
}

// ─── SVGs ───
const svg={
  book:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
  tv:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>`,
  plus:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  trash:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
  chd:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>`,
  chu:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>`,
  search:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  edit:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  img:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
  up:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
  pal:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2"/><circle cx="17.5" cy="10.5" r="2"/><circle cx="8.5" cy="7.5" r="2"/><circle cx="6.5" cy="12.5" r="2"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.93 0 1.5-.67 1.5-1.5 0-.38-.15-.74-.39-1.04-.24-.3-.39-.66-.39-1.04 0-.83.67-1.5 1.5-1.5H16c3.31 0 6-2.69 6-6 0-5.17-4.49-9-10-9z"/></svg>`,
  grid:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`,
  list:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
  chart:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
  exp:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  imp:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
};

function h(tag,cls,html,attrs){
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(html!=null)el.innerHTML=html;
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==="onclick"||k==="onchange"||k==="onkeydown"||k==="oninput")el[k]=v;else el.setAttribute(k,v);});
  return el;
}

function render(){
  const root=document.getElementById("app");
  root.innerHTML="";
  const ac=tab==="manga"?theme.accentManga:theme.accentAnime;
  const lbl=tab==="manga"?"capítulos":"episodios";
  const icon=tab==="manga"?"📖":"📺";

  // Header
  const hdr=h("div","hdr");
  hdr.appendChild(h("div","logo","<b>▣</b> TRACKER"));
  const hr=h("div","hdr-r");
  const bChart=h("button",`ib ${viewMode==="stats"?"on":""}`,svg.chart,{onclick:()=>{viewMode=viewMode==="stats"?"list":"stats";render();}});
  const bPal=h("button",`ib ${showSettings?"on":""}`,svg.pal,{onclick:()=>{showSettings=!showSettings;render();}});
  hr.append(bChart,bPal);
  hdr.appendChild(hr);
  root.appendChild(hdr);

  // Settings
  if(showSettings){
    const sp=h("div","sett open");
    const top=h("div","sett-top","Personalización");
    const rbtn=h("button","rst","Restaurar",{onclick:()=>{theme={...DT};save();applyTheme();render();}});
    top.appendChild(rbtn);sp.appendChild(top);

    // BG
    const s1=h("div","sett-sec");s1.appendChild(h("div","sett-lbl","Tema de fondo"));
    const bgr=h("div","bgr");
    Object.keys(BGS).forEach(m=>{const b=h("button",`bgb ${theme.bgMode===m?"on":""}`,m==="dark"?"Oscuro":m==="midnight"?"Midnight":m==="amoled"?"AMOLED":m==="warm"?"Cálido":"Claro",{onclick:()=>{theme.bgMode=m;save();applyTheme();render();}});bgr.appendChild(b);});
    s1.appendChild(bgr);sp.appendChild(s1);

    // Color manga
    ["accentManga","accentAnime"].forEach((key,idx)=>{
      const s2=h("div","sett-sec");s2.appendChild(h("div","sett-lbl",idx===0?"Color Manga":"Color Anime"));
      const cr=h("div","clr-row");
      APS.forEach(c=>{const sw=h("div",`csw ${theme[key]===c?"sel":""}`,null,{onclick:()=>{theme[key]=c;save();applyTheme();render();}});sw.style.background=c;cr.appendChild(sw);});
      const cp=h("div","cpick");
      const cpv=h("div","cpv");
      if(!APS.includes(theme[key])){cpv.style.background=theme[key];cpv.style.borderStyle="solid";cpv.style.borderColor="var(--t1)";cpv.textContent="";}else{cpv.textContent="+";}
      cp.appendChild(cpv);
      const ci=h("input","",null,{type:"color",value:theme[key],oninput:e=>{theme[key]=e.target.value;save();applyTheme();render();}});
      cp.appendChild(ci);cr.appendChild(cp);s2.appendChild(cr);sp.appendChild(s2);
    });

    // Export/Import
    const s3=h("div","sett-sec");s3.appendChild(h("div","sett-lbl","Datos"));
    const dr=h("div","bgr");
    dr.appendChild(h("button","bgb",svg.exp+" Exportar",{onclick:()=>{const b=new Blob([JSON.stringify({data,theme},null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="tracker-backup.json";a.click();URL.revokeObjectURL(u);}}));
    const impBtn=h("button","bgb",svg.imp+" Importar",{onclick:()=>document.getElementById("imp-file").click()});
    dr.appendChild(impBtn);
    const impF=h("input","hidden",null,{type:"file",accept:".json",id:"imp-file",onchange:e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const j=JSON.parse(ev.target.result);if(j.data)data=j.data;if(j.theme)theme={...DT,...j.theme};save();applyTheme();render();alert("Datos importados.");}catch(err){alert("Archivo inválido.");}};r.readAsText(f);e.target.value="";}});
    dr.appendChild(impF);s3.appendChild(dr);sp.appendChild(s3);
    root.appendChild(sp);
  }

  // ─── Dashboard ───
  if(viewMode==="stats"){
    const mR=data.manga.reduce((s,x)=>s+x.completed.length,0);
    const aR=data.anime.reduce((s,x)=>s+x.completed.length,0);
    const sr=h("div","sr");
    sr.innerHTML=`<div class="stc"><div class="stv" style="color:${theme.accentManga}">${data.manga.length}</div><div class="stl">Manga</div></div><div class="stc"><div class="stv" style="color:${theme.accentAnime}">${data.anime.length}</div><div class="stl">Anime</div></div><div class="stc"><div class="stv" style="color:${ac}">${mR+aR}</div><div class="stl">Total</div></div>`;
    root.appendChild(sr);

    const dash=h("div","dash");dash.appendChild(h("div","dash-t","Dashboard"));
    const dg=h("div","dash-g");

    // Donut
    const dc1=h("div","dash-c");dc1.appendChild(h("div","dash-cl","Distribución"));
    if(mR+aR>0){
      const total=mR+aR;const mPct=mR/total;const r=50,cx=60,cy=60;
      const mAngle=mPct*360;const gap=mR>0&&aR>0?3:0;
      const toRad=d=>d*Math.PI/180;
      function arc(start,end,color){
        const s=toRad(start-90),e=toRad(end-90);
        const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
        const lg=end-start>180?1:0;
        return`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} Z" fill="${color}"/>`;
      }
      let svgH=`<svg viewBox="0 0 120 120" width="120" height="120">`;
      if(mR>0&&aR>0){svgH+=arc(gap,mAngle-gap,theme.accentManga)+arc(mAngle+gap,360-gap,theme.accentAnime);}
      else if(mR>0){svgH+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${theme.accentManga}"/>`;}
      else{svgH+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${theme.accentAnime}"/>`;}
      svgH+=`<circle cx="${cx}" cy="${cy}" r="30" fill="var(--bg2)"/></svg>`;
      const dw=h("div","donut-wrap",svgH);dc1.appendChild(dw);
      dc1.innerHTML+=`<div class="donut-legend"><div class="donut-leg-item"><div class="donut-leg-dot" style="background:${theme.accentManga}"></div>Manga ${mR}</div><div class="donut-leg-item"><div class="donut-leg-dot" style="background:${theme.accentAnime}"></div>Anime ${aR}</div></div>`;
    }else{dc1.innerHTML+=`<div style="padding:40px;font-size:12px;color:var(--t3);text-align:center">Sin datos</div>`;}
    dg.appendChild(dc1);

    // Buckets
    const dc2=h("div","dash-c");dc2.appendChild(h("div","dash-cl","Progreso global"));
    const all=[...data.manga,...data.anime];
    const bk=[0,0,0,0,0,0];const bkL=["0%","1-25%","26-50%","51-75%","76-99%","100%"];
    all.forEach(s=>{const p=s.total>0?s.completed.length/s.total*100:0;if(p===0)bk[0]++;else if(p<=25)bk[1]++;else if(p<=50)bk[2]++;else if(p<=75)bk[3]++;else if(p<100)bk[4]++;else bk[5]++;});
    const mx=Math.max(...bk,1);
    let brH=`<div class="bucket-row">`;bk.forEach(v=>{brH+=`<div class="bucket-bar" style="height:${Math.max(v/mx*100,3)}%;background:${ac}"></div>`;});
    brH+=`</div><div class="bucket-labels">`;bkL.forEach(l=>{brH+=`<span>${l}</span>`;});brH+=`</div>`;
    dc2.innerHTML+=brH;dg.appendChild(dc2);

    // Top series
    const tops=[...all].map(s=>({name:s.title.length>20?s.title.slice(0,20)+"…":s.title,read:s.completed.length,total:s.total})).sort((a,b)=>b.read-a.read).slice(0,8);
    if(tops.length>0){
      const dc3=h("div","dash-c dash-full");dc3.appendChild(h("div","dash-cl","Top series"));
      const mxR=Math.max(...tops.map(t=>t.total),1);
      tops.forEach(t=>{
        const pct=t.total>0?t.read/t.total*100:0;
        const bi=h("div","bar-item");
        bi.innerHTML=`<div class="bar-name">${t.name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${ac}"></div></div><div class="bar-val">${t.read}/${t.total}</div>`;
        dc3.appendChild(bi);
      });
      dg.appendChild(dc3);
    }
    dash.appendChild(dg);root.appendChild(dash);
    return;
  }

  // ─── Tabs ───
  const tabs=h("div","tabs");
  tabs.appendChild(h("button",`tab ${tab==="manga"?"am":""}`,`${svg.book} Manga <span class="tab-c">(${data.manga.length})</span>`,{onclick:()=>{tab="manga";render();}}));
  tabs.appendChild(h("button",`tab ${tab==="anime"?"aa":""}`,`${svg.tv} Anime <span class="tab-c">(${data.anime.length})</span>`,{onclick:()=>{tab="anime";render();}}));
  root.appendChild(tabs);

  const list=data[tab];
  const tRead=list.reduce((s,x)=>s+x.completed.length,0);
  const tAll=list.reduce((s,x)=>s+x.total,0);

  // Stats
  if(list.length>0){
    const sr=h("div","sr");
    sr.innerHTML=`<div class="stc"><div class="stv" style="color:${ac}">${list.length}</div><div class="stl">Series</div></div><div class="stc"><div class="stv" style="color:${ac}">${tRead}</div><div class="stl">${tab==="manga"?"Leídos":"Vistos"}</div></div><div class="stc"><div class="stv" style="color:${ac}">${tAll>0?Math.round(tRead/tAll*100):0}%</div><div class="stl">Progreso</div></div>`;
    root.appendChild(sr);
  }

  // Toolbar
  const tb=h("div","tb");
  const tbl=h("div","tb-l");
  const sbar=h("div","sb");sbar.innerHTML=svg.search;
  const sinp=h("input","",null,{placeholder:"Buscar...",value:search,oninput:e=>{search=e.target.value;render();}});
  sbar.appendChild(sinp);tbl.appendChild(sbar);
  const tbr=h("div","tb-r");
  const sel=h("select","srt");
  [{key:"recent",l:"Reciente"},{key:"name-asc",l:"A→Z"},{key:"name-desc",l:"Z→A"},{key:"progress-desc",l:"Mayor %"},{key:"progress-asc",l:"Menor %"},{key:"total-desc",l:"Más cap."}].forEach(o=>{const op=h("option","",o.l,{value:o.key});if(o.key===sortKey)op.selected=true;sel.appendChild(op);});
  sel.onchange=e=>{sortKey=e.target.value;render();};
  tbr.appendChild(sel);
  tbr.appendChild(h("button",`ib ${viewMode==="list"?"on":""}`,svg.list,{onclick:()=>{viewMode="list";render();}}));
  tbr.appendChild(h("button",`ib ${viewMode==="catalog"?"on":""}`,svg.grid,{onclick:()=>{viewMode="catalog";render();}}));
  tb.append(tbl,tbr);root.appendChild(tb);

  // Add
  const addS=h("div","add");
  const addM=h("div","add-m");
  const ti=h("input","",null,{placeholder:`Título del ${tab==="manga"?"manga":"anime"}...`,id:"add-title"});
  ti.onkeydown=e=>{if(e.key==="Enter")doAdd();};
  const ni=h("input","sm",null,{placeholder:tab==="manga"?"Cap.":"Ep.",type:"number",min:"1",id:"add-total"});
  ni.onkeydown=e=>{if(e.key==="Enter")doAdd();};
  const ab=h("button","badd",svg.plus);ab.style.background=ac;ab.onclick=doAdd;
  addM.append(ti,ni,ab);addS.appendChild(addM);

  const addC=h("div","add-c");
  const fi=h("input","hidden",null,{type:"file",accept:"image/*",id:"add-cover-file"});
  fi.onchange=e=>{const f=e.target.files?.[0];if(!f)return;resizeImg(f,b=>{newCover=b;render();});e.target.value="";};
  addC.appendChild(fi);
  addC.appendChild(h("button","bup",svg.up+" Portada",{onclick:()=>document.getElementById("add-cover-file").click()}));
  if(newCover){
    addC.appendChild(Object.assign(h("img","cvmn"),{src:newCover}));
    addC.appendChild(h("span","cvnm","Imagen cargada"));
    addC.appendChild(h("button","bcx","✕",{onclick:()=>{newCover="";render();}}));
  }else{addC.appendChild(h("span","cvnm","Opcional"));addC.lastChild.style.color="var(--t3)";}
  addS.appendChild(addC);root.appendChild(addS);

  // Filter & sort
  const filtered=sortList(list.filter(s=>s.title.toLowerCase().includes(search.toLowerCase())));

  if(filtered.length===0){
    root.appendChild(h("div","empty",`<div class="icn">${icon}</div><p>${list.length===0?`Agrega tu primer ${tab==="manga"?"manga":"anime"}`:"Sin resultados"}</p>`));
    return;
  }

  // ─── Catalog view ───
  if(viewMode==="catalog"){
    const cat=h("div","catalog");
    filtered.forEach(s=>{
      const pct=s.total>0?(s.completed.length/s.total)*100:0;
      const cc=h("div","catc");
      cc.onclick=()=>{viewMode="list";expanded[s.id]=true;render();};
      cc.innerHTML=`${s.cover?`<img class="catcv" src="${s.cover}">`:`<div class="catph">${icon}</div>`}<div class="cati"><div class="catt">${s.title}</div><div class="catp">${s.completed.length}/${s.total}</div><div class="catb"><div class="catf" style="width:${pct}%;background:${ac}"></div></div></div>`;
      cat.appendChild(cc);
    });
    root.appendChild(cat);return;
  }

  // ─── List view ───
  const sl=h("div","slist");
  filtered.forEach(s=>{
    const pct=s.total>0?(s.completed.length/s.total)*100:0;
    const isExp=expanded[s.id];
    const sc=h("div","scard");

    // Header
    const sh=h("div","shdr");
    sh.onclick=()=>{expanded[s.id]=!expanded[s.id];render();};
    sh.innerHTML=`${s.cover?`<img class="cthm" src="${s.cover}">`:`<div class="cph">${icon}</div>`}<div class="sinf"><div class="stit">${s.title}</div><div class="sprg">${s.completed.length} / ${s.total} ${lbl}</div><div class="pbar"><div class="pfill" style="width:${pct}%;background:${ac}"></div></div></div>`;
    const sa=h("div","sact");
    const db=h("button","ib dng",svg.trash);db.onclick=e=>{e.stopPropagation();data[tab]=data[tab].filter(x=>x.id!==s.id);save();render();};
    sa.appendChild(db);sa.appendChild(h("div","ib",isExp?svg.chu:svg.chd));
    sh.appendChild(sa);sc.appendChild(sh);

    // Expanded
    if(isExp){
      const cp=h("div","cpnl");

      // Cover edit
      const ce=h("div","cved");
      ce.innerHTML=`${s.cover?`<img class="cvei" src="${s.cover}">`:`<div class="cvee">${svg.img}</div>`}`;
      const cec=h("div","cvec");cec.innerHTML=`<span class="lbl">Portada</span>`;
      const ceb=h("div","cveb");
      const efi=h("input","hidden",null,{type:"file",accept:"image/*",id:"ecf-"+s.id});
      efi.onchange=e=>{const f=e.target.files?.[0];if(!f)return;resizeImg(f,b=>{const x=data[tab].find(z=>z.id===s.id);if(x)x.cover=b;save();render();});e.target.value="";};
      ceb.appendChild(efi);
      ceb.appendChild(h("button","bs",svg.up+(s.cover?" Cambiar":" Subir"),{onclick:()=>document.getElementById("ecf-"+s.id).click()}));
      if(s.cover)ceb.appendChild(h("button","bs",svg.trash+" Quitar",{onclick:()=>{const x=data[tab].find(z=>z.id===s.id);if(x)x.cover="";save();render();}}));
      cec.appendChild(ceb);ce.appendChild(cec);cp.appendChild(ce);

      // Controls
      const ctl=h("div","cctl");
      ctl.appendChild(h("span","cclbl",tab==="manga"?"Capítulos":"Episodios"));
      const cbtns=h("div","",null);cbtns.style.cssText="display:flex;gap:4px;flex-wrap:wrap";
      cbtns.appendChild(h("button","bs",svg.edit+" Total",{onclick:()=>{editTotal=editTotal===s.id?null:s.id;editTotalVal=String(s.total);render();}}));
      cbtns.appendChild(h("button","bs","Marcar todos",{onclick:()=>{const x=data[tab].find(z=>z.id===s.id);if(x)x.completed=Array.from({length:x.total},(_,i)=>i+1);save();render();}}));
      cbtns.appendChild(h("button","bs","Limpiar",{onclick:()=>{const x=data[tab].find(z=>z.id===s.id);if(x)x.completed=[];save();render();}}));
      ctl.appendChild(cbtns);cp.appendChild(ctl);

      // Edit total
      if(editTotal===s.id){
        const er=h("div","erow");
        er.appendChild(h("label","",`Total ${lbl}:`));
        const einp=h("input","",null,{type:"number",min:"1",value:editTotalVal});
        einp.oninput=e=>{editTotalVal=e.target.value;};
        einp.onkeydown=e=>{if(e.key==="Enter")doUpdTotal(s.id);};
        er.appendChild(einp);
        er.appendChild(h("button","bs","Guardar",{onclick:()=>doUpdTotal(s.id)}));
        cp.appendChild(er);
      }

      // Grid
      const cg=h("div","cgrid");
      for(let n=1;n<=s.total;n++){
        const isR=s.completed.includes(n);
        const cl=h("div",`cell${isR?" rd":""}`,String(n));
        if(isR){cl.style.background=ac;cl.style.borderColor=ac;}
        cl.onclick=()=>{const x=data[tab].find(z=>z.id===s.id);if(!x)return;if(x.completed.includes(n))x.completed=x.completed.filter(c=>c!==n);else{x.completed.push(n);x.completed.sort((a,b)=>a-b);}save();render();};
        cg.appendChild(cl);
      }
      cp.appendChild(cg);sc.appendChild(cp);
    }
    sl.appendChild(sc);
  });
  root.appendChild(sl);
}

function doAdd(){
  const ti=document.getElementById("add-title");
  const ni=document.getElementById("add-total");
  const t=ti?.value.trim();if(!t)return;
  data[tab].push({id:Date.now().toString(),title:t,total:Math.max(parseInt(ni?.value)||0,1),completed:[],cover:newCover||""});
  newCover="";save();render();
}
function doUpdTotal(sid){
  const v=parseInt(editTotalVal);if(!v||v<1)return;
  const x=data[tab].find(z=>z.id===sid);
  if(x){x.total=v;x.completed=x.completed.filter(c=>c<=v);}
  editTotal=null;save();render();
}

applyTheme();
render();
</script>
</body>
</html>
